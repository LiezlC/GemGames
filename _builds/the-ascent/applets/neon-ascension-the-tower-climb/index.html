<!DOCTYPE html>
<html lang="en">
<head>
<meta name="author" content="Liezl Coetzee">
<meta name="description" content="Neon Ascension The Tower Climb - station of The Ascent pilgrimage. Originally generated by Google Gemini from source images; curated, consolidated, and extended by Liezl Coetzee.">
<meta name="generator" content="Gemini (original applets); human consolidation by Liezl Coetzee">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Ascension: The Tower Climb</title>
    <style>
        :root {
            --neon-pink: #ff00cc;
            --neon-blue: #00ffff;
            --deep-purple: #1a0b2e;
            --grid-color: rgba(0, 255, 255, 0.3);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
            touch-action: none;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .score-board {
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon-blue);
            font-weight: bold;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to bottom, var(--neon-pink), white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            filter: drop-shadow(0 0 20px var(--neon-pink));
            text-align: center;
        }

        p {
            font-size: 1.2rem;
            color: var(--neon-blue);
            margin-bottom: 30px;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        button {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px var(--neon-pink);
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* The 3D World */
        #world {
            width: 100vw;
            height: 100vh;
            perspective: 600px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Container that gets rotated */
        .scene {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Looking UP at the building */
            transform: rotateX(20deg); 
        }

        /* The Walls (Pink sides) */
        .wall {
            position: absolute;
            top: -50%;
            width: 100vw;
            height: 200vh;
            background: linear-gradient(180deg, #000 0%, var(--neon-pink) 50%, #000 100%);
            opacity: 0.8;
        }

        .wall.left {
            left: -45%;
            transform: rotateY(70deg) translateZ(-100px);
            transform-origin: right center;
            box-shadow: inset -50px 0 100px rgba(0,0,0,0.8);
        }

        .wall.right {
            right: -45%;
            transform: rotateY(-70deg) translateZ(-100px);
            transform-origin: left center;
            box-shadow: inset 50px 0 100px rgba(0,0,0,0.8);
        }

        /* The Center Tower (Blue Grid) */
        .tower-track {
            position: absolute;
            left: 50%;
            top: 0;
            width: 300px; /* Playable area width */
            height: 200vh;
            transform: translateX(-50%) rotateX(45deg) translateY(-20%);
            background: 
                linear-gradient(transparent 0%, rgba(0,255,255,0.1) 100%),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                linear-gradient(180deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 33.33% 100%, 100% 60px;
            background-position: center top;
            transform-origin: center bottom;
            /* Animation for movement */
            animation: scrollGrid 0.5s linear infinite;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border-left: 2px solid var(--neon-blue);
            border-right: 2px solid var(--neon-blue);
        }

        @keyframes scrollGrid {
            from { background-position: center 0px; }
            to { background-position: center 60px; }
        }

        /* The Player */
        #player {
            position: absolute;
            bottom: 100px;
            left: 50%; /* Starts center of the track */
            width: 40px;
            height: 40px;
            transform: translateX(-50%);
            z-index: 10;
            transition: left 0.1s ease-out;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        /* Player shape using CSS */
        #player::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid white;
        }
        
        #player::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 20px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Obstacles */
        .obstacle {
            position: absolute;
            width: 80px;
            height: 40px;
            background: rgba(255, 0, 80, 0.8);
            border: 2px solid #ff0055;
            box-shadow: 0 0 15px #ff0055;
            top: -100px;
            left: 0;
            transform-style: preserve-3d;
        }
        
        /* 3D block effect for obstacle */
        .obstacle::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -2px;
            width: 100%;
            height: 20px;
            background: rgba(255, 0, 80, 0.4);
            border: 2px solid #ff0055;
            transform: skewX(45deg);
            transform-origin: bottom;
        }

        /* Collectibles */
        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: yellow;
            border-radius: 50%;
            box-shadow: 0 0 20px yellow;
            top: -100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Stairs at bottom (Static visual anchor) */
        .stairs-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, #000, transparent);
            z-index: 50;
            pointer-events: none;
        }
        
        .stair-step {
            width: 100%;
            height: 10px;
            background: rgba(255, 0, 204, 0.1);
            margin-bottom: 5px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.5);
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--neon-blue);
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        @media (min-width: 768px) {
            #mobile-controls { display: none; }
        }

        .game-over-text {
            font-size: 3rem;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

    <!-- 3D Scene -->
    <div id="world">
        <div class="scene">
            <!-- The Building Walls -->
            <div class="wall left"></div>
            <div class="wall right"></div>
            
            <!-- The Center Grid (The Play Area) -->
            <div class="tower-track" id="track">
                <!-- Player and Objects injected here -->
                <div id="player"></div>
            </div>
        </div>
    </div>

    <!-- Visual Overlay for Stairs -->
    <div class="stairs-overlay">
        <div class="stair-step"></div>
        <div class="stair-step"></div>
        <div class="stair-step"></div>
        <div class="stair-step"></div>
        <div class="stair-step"></div>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="score-board">
            SCORE: <span id="score">0</span>
            <br>
            <span style="font-size: 14px; color: #aaa;">LEVEL: <span id="level">1</span></span>
        </div>
        
        <div id="mobile-controls">
            <div class="control-btn" id="btn-left">←</div>
            <div class="control-btn" id="btn-right">→</div>
        </div>
    </div>

    <!-- Start / Game Over Screen -->
    <div id="start-screen">
        <h1 id="title-text">NEON ASCENSION</h1>
        <p id="subtitle-text">Dodge the Red Glitches. Collect the Data Orbs.</p>
        <div class="game-over-text" id="go-text" style="display:none;">SYSTEM FAILURE</div>
        <button id="start-btn">INITIATE CLIMB</button>
    </div>

    <script>
        // Game State
        const state = {
            isPlaying: false,
            score: 0,
            speed: 5,
            lane: 1, // 0 = left, 1 = center, 2 = right
            lastTime: 0,
            spawnTimer: 0,
            spawnRate: 1500, // ms
            objects: [] // { element, type, lane, y }
        };

        // DOM Elements
        const track = document.getElementById('track');
        const player = document.getElementById('player');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const titleText = document.getElementById('title-text');
        const subText = document.getElementById('subtitle-text');
        const goText = document.getElementById('go-text');

        // Config
        const TRACK_WIDTH = 300;
        const LANE_WIDTH = TRACK_WIDTH / 3;
        const PLAYER_Y = 500; // Approximate visual position from top in px roughly

        // Controls
        function moveLeft() {
            if (!state.isPlaying) return;
            if (state.lane > 0) state.lane--;
            updatePlayerPos();
        }

        function moveRight() {
            if (!state.isPlaying) return;
            if (state.lane < 2) state.lane++;
            updatePlayerPos();
        }

        function updatePlayerPos() {
            // Calculate left percentage: 16.6%, 50%, 83.3%
            const pct = (state.lane * 33.33) + 16.66;
            player.style.left = `${pct}%`;
            
            // Tilt effect
            if(state.lane === 0) player.style.transform = `translateX(-50%) rotateZ(-15deg)`;
            else if(state.lane === 2) player.style.transform = `translateX(-50%) rotateZ(15deg)`;
            else player.style.transform = `translateX(-50%) rotateZ(0deg)`;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
        });

        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('btn-left').addEventListener('click', moveLeft);
        document.getElementById('btn-right').addEventListener('click', moveRight);

        // Game Loop
        function gameLoop(timestamp) {
            if (!state.isPlaying) return;

            const deltaTime = timestamp - state.lastTime;
            state.lastTime = timestamp;

            // Spawn Objects
            state.spawnTimer += deltaTime;
            if (state.spawnTimer > state.spawnRate) {
                spawnObject();
                state.spawnTimer = 0;
                // Increase difficulty
                if (state.spawnRate > 400) state.spawnRate -= 10;
                state.speed += 0.01;
            }

            // Move Objects
            // We iterate backwards to safely remove items
            for (let i = state.objects.length - 1; i >= 0; i--) {
                let obj = state.objects[i];
                obj.y += state.speed * (deltaTime / 16); // normalize speed
                
                // Visual Update
                obj.element.style.top = `${obj.y}px`;
                
                // Scale effect to simulate perspective (items get bigger as they get closer)
                // Simple linear scale based on Y position
                const scale = 0.5 + (obj.y / 800) * 0.8; 
                obj.element.style.transform = `scale(${scale})`;

                // Collision Detection
                // Player is roughly at Y=80% of container height. Let's say 600px in track coordinates
                // The track is transformed, but let's approximate logic.
                // The track height is 200vh. Let's assume the visible playing field is about 800px long visually.
                const playerHitY = 650; // Collision zone
                
                if (obj.y > playerHitY && obj.y < playerHitY + 50) {
                    if (obj.lane === state.lane) {
                        if (obj.type === 'obstacle') {
                            gameOver();
                        } else {
                            // Collect coin
                            scorePoint(obj);
                            state.objects.splice(i, 1);
                            continue;
                        }
                    }
                }

                // Cleanup
                if (obj.y > 1200) {
                    obj.element.remove();
                    state.objects.splice(i, 1);
                }
            }

            // Update score UI
            scoreEl.innerText = Math.floor(state.score);
            levelEl.innerText = Math.floor(state.score / 500) + 1;

            requestAnimationFrame(gameLoop);
        }

        function spawnObject() {
            const type = Math.random() > 0.3 ? 'obstacle' : 'coin';
            const lane = Math.floor(Math.random() * 3);
            
            const el = document.createElement('div');
            el.classList.add(type);
            
            // Position horizontally
            // 0 -> 0px, 1 -> 100px, 2 -> 200px (roughly)
            // We use percentages for the track
            const leftPct = (lane * 33.33) + (33.33/2) - (type === 'obstacle' ? 13 : 5); // center in lane
            el.style.left = `${leftPct}%`;
            
            if (type === 'coin') el.innerHTML = '💠';

            track.appendChild(el);

            state.objects.push({
                element: el,
                type: type,
                lane: lane,
                y: -100
            });
        }

        function scorePoint(obj) {
            state.score += 100;
            obj.element.remove();
            
            // Visual feedback
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'rgba(0,255,255,0.2)';
            flash.style.pointerEvents = 'none';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);
        }

        function gameOver() {
            state.isPlaying = false;
            startScreen.style.display = 'flex';
            titleText.style.display = 'none';
            subText.style.display = 'none';
            goText.style.display = 'block';
            startBtn.innerText = "REBOOT SYSTEM";
        }

        function resetGame() {
            // Clear objects
            state.objects.forEach(o => o.element.remove());
            state.objects = [];
            state.score = 0;
            state.speed = 5;
            state.spawnRate = 1500;
            state.lane = 1;
            updatePlayerPos();
            
            startScreen.style.display = 'none';
            state.isPlaying = true;
            state.lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', resetGame);

        // Initial Render Setup
        updatePlayerPos();

        // Ambient animation for the stairs (visual flair)
        const steps = document.querySelectorAll('.stair-step');
        steps.forEach((step, i) => {
            step.style.opacity = (i + 1) / steps.length;
            step.style.width = `${100 - (i*5)}%`;
            step.style.marginLeft = `${(i*2.5)}%`;
        });

    </script>
</body>
</html>
