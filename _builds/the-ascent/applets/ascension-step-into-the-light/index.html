<!DOCTYPE html>
<html lang="en">
<head>
<meta name="author" content="Liezl Coetzee">
<meta name="description" content="Ascension Step Into The Light - station of The Ascent pilgrimage. Originally generated by Google Gemini from source images; curated, consolidated, and extended by Liezl Coetzee.">
<meta name="generator" content="Gemini (original applets); human consolidation by Liezl Coetzee">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascension: Step Into The Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #2d2a32; /* Muted purple/grey from image shadow */
            color: white;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* The Room Atmosphere */
        .room {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            overflow: hidden;
        }

        /* The Light Beam */
        .beam-container {
            position: absolute;
            top: -10%;
            left: 20%;
            width: 200px;
            height: 120%;
            transform: rotate(25deg) skewX(-10deg);
            pointer-events: none;
            z-index: 10;
            opacity: 0.8;
            transition: all 1s ease;
        }

        .beam {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(255, 255, 220, 1) 0%, 
                rgba(255, 255, 200, 0.6) 40%, 
                rgba(255, 255, 255, 0) 100%);
            box-shadow: 0 0 50px rgba(255, 255, 200, 0.3);
            filter: blur(2px);
            transition: filter 0.5s ease, opacity 0.5s ease;
        }

        /* The Ascending Character */
        .character {
            position: absolute;
            bottom: 10%; /* Start position */
            left: 15%;   /* Start position */
            font-size: 4rem;
            z-index: 20;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transform-origin: bottom center;
        }

        .character.walking {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-10px) scale(1.05); }
        }

        /* The TV / Dashboard */
        .tv-setup {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 320px;
            z-index: 30;
        }

        .tv-frame {
            background: #1a1a1a;
            border: 4px solid #444;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }
        
        .tv-screen {
            background: #e0f7fa; /* Light cyan screen like image */
            height: 200px;
            width: 100%;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        /* TV Stand */
        .tv-stand {
            width: 200px;
            height: 80px;
            border: 2px solid #666;
            margin: 0 auto;
            border-top: none;
            position: relative;
            background: rgba(255,255,255,0.05);
        }
        .tv-stand::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 10px;
            background: #333;
        }

        /* Chart on TV */
        .chart-line {
            fill: none;
            stroke: #ff6b6b;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: d 0.5s ease;
        }
        
        .chart-area {
            fill: rgba(255, 107, 107, 0.2);
            transition: d 0.5s ease;
        }

        /* UI Overlay for Tasks */
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .task-item:hover {
            background: rgba(0,0,0,0.4);
        }
        .task-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .task-item.completed .checkbox {
            background: #4ade80;
            border-color: #4ade80;
        }

        /* Clouds/Fog */
        .fog {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
            z-index: 15;
        }

        /* Rug */
        .rug {
            position: absolute;
            bottom: 20px;
            left: 40%;
            width: 200px;
            height: 120px;
            background: #4a4a4a;
            transform: skewX(40deg) rotate(-10deg);
            border: 2px solid #666;
            opacity: 0.5;
        }

        /* Plant */
        .plant {
            position: absolute;
            bottom: 60px;
            right: 380px;
            font-size: 4rem;
            opacity: 0.4;
            filter: blur(1px);
        }

        /* Glow Animation */
        @keyframes pulseBeam {
            0% { opacity: 0.7; filter: blur(2px); }
            50% { opacity: 1; filter: blur(4px) drop-shadow(0 0 20px white); }
            100% { opacity: 0.7; filter: blur(2px); }
        }
        .beam-active {
            animation: pulseBeam 2s infinite;
        }

    </style>
</head>
<body>

    <!-- The Room Scene -->
    <div class="room" id="room">
        
        <!-- Background Elements -->
        <div class="rug"></div>
        <div class="plant">🌿</div>
        <div class="fog"></div>

        <!-- The Beam of Light -->
        <div class="beam-container" id="beamContainer">
            <div class="beam" id="beam"></div>
        </div>

        <!-- The Character -->
        <div class="character" id="character">🚶</div>

        <!-- The TV Dashboard -->
        <div class="tv-setup">
            <div class="tv-frame">
                <div class="tv-screen">
                    <!-- SVG Chart -->
                    <svg width="100%" height="100%" viewBox="0 0 100 60" preserveAspectRatio="none">
                        <!-- Background shapes on TV -->
                        <circle cx="20" cy="20" r="15" fill="#fef08a" opacity="0.8" /> <!-- Sun -->
                        <path d="M0,60 Q30,40 50,50 T100,30 V60 H0 Z" fill="#a5f3fc" opacity="0.5" /> <!-- Abstract landscape -->
                        
                        <!-- Dynamic Chart -->
                        <path id="chartArea" class="chart-area" d="M0,60 L0,50 L20,50 L40,50 L60,50 L80,50 L100,50 L100,60 Z" />
                        <path id="chartLine" class="chart-line" d="M0,50 L20,50 L40,50 L60,50 L80,50 L100,50" />
                    </svg>
                    
                    <div class="absolute top-2 right-2 text-xs text-gray-500 font-bold">STATS</div>
                    <div class="absolute bottom-2 left-2 text-xs text-gray-600 font-mono" id="progressText">0% ASCENDED</div>
                </div>
            </div>
            <div class="tv-stand"></div>
        </div>

    </div>

    <!-- Floating UI for Task Management -->
    <div class="ui-layer">
        <h2 class="text-xl font-bold mb-1 text-yellow-200">Ascension Plan</h2>
        <p class="text-xs text-gray-400 mb-4">Complete tasks to step into the light.</p>
        
        <div class="flex gap-2 mb-4">
            <input type="text" id="taskInput" placeholder="Next step..." class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-400 text-white">
            <button onclick="addTask()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-3 py-2 rounded text-sm transition">Add</button>
        </div>

        <div id="taskList" class="max-h-60 overflow-y-auto pr-1">
            <!-- Tasks go here -->
        </div>
        
        <button onclick="reset()" class="mt-4 text-xs text-gray-500 hover:text-white underline">Reset Progress</button>
    </div>

    <script>
        // State
        let tasks = [
            { id: 1, text: "Wake up early", completed: false },
            { id: 2, text: "Drink water", completed: false },
            { id: 3, text: "Read 10 pages", completed: false }
        ];

        // DOM Elements
        const taskListEl = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');
        const character = document.getElementById('character');
        const beam = document.getElementById('beam');
        const chartLine = document.getElementById('chartLine');
        const chartArea = document.getElementById('chartArea');
        const progressText = document.getElementById('progressText');

        // Render Initial State
        renderTasks();
        updateVisuals();

        // Add Task
        function addTask() {
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({ id: Date.now(), text: text, completed: false });
                taskInput.value = '';
                renderTasks();
                updateVisuals();
            }
        }

        // Toggle Task
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
                updateVisuals();
            }
        }

        // Render List
        function renderTasks() {
            taskListEl.innerHTML = '';
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;
                div.onclick = () => toggleTask(task.id);
                div.innerHTML = `
                    <div class="checkbox">${task.completed ? '✓' : ''}</div>
                    <span class="text-sm">${task.text}</span>
                `;
                taskListEl.appendChild(div);
            });
        }

        // Reset
        function reset() {
            tasks = [];
            renderTasks();
            updateVisuals();
        }

        // Core Logic: Update Visuals based on Progress
        function updateVisuals() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : (completed / total);

            // 1. Move Character
            // Start pos: bottom 10%, left 15%
            // End pos: bottom 90%, left 50% (approx following the beam angle)
            const startBottom = 10;
            const endBottom = 90;
            const startLeft = 15;
            const endLeft = 45;

            const currentBottom = startBottom + (endBottom - startBottom) * percentage;
            const currentLeft = startLeft + (endLeft - startLeft) * percentage;

            character.style.bottom = `${currentBottom}%`;
            character.style.left = `${currentLeft}%`;

            // Add walking animation briefly
            character.classList.add('walking');
            setTimeout(() => character.classList.remove('walking'), 500);

            // Change character emoji based on progress
            if (percentage < 0.3) character.innerText = "🚶";
            else if (percentage < 0.7) character.innerText = "🏃";
            else if (percentage < 1) character.innerText = "🦸";
            else character.innerText = "👼"; // Ascended

            // 2. Beam Intensity
            if (percentage > 0) {
                beam.style.opacity = 0.6 + (percentage * 0.4);
                document.getElementById('beamContainer').classList.add('beam-active');
            } else {
                beam.style.opacity = 0.4;
                document.getElementById('beamContainer').classList.remove('beam-active');
            }

            // 3. Update TV Chart
            // Generate a random-ish looking upward trend based on percentage
            const points = [];
            const steps = 6; // 0, 20, 40, 60, 80, 100
            
            let currentY = 50; // Start at bottom (SVG coords are inverted, 60 is bottom)
            
            // Create a path string
            let dLine = "M0,50 ";
            let dArea = "M0,60 L0,50 ";

            for (let i = 1; i <= steps; i++) {
                const x = i * (100/steps);
                // Target Y based on percentage. 
                // If 0%, flat line at 50. If 100%, line goes up to 10.
                const targetHeight = 50 - (percentage * 40); 
                
                // Add some noise
                const noise = (Math.random() * 10) - 5;
                let y = targetHeight + noise;
                
                // Clamp y
                if(y > 55) y = 55;
                if(y < 5) y = 5;

                // Smooth transition for the last point to match exact percentage visually
                if (i === steps) y = 50 - (percentage * 40);

                dLine += `L${x},${y} `;
                dArea += `L${x},${y} `;
            }

            dArea += "L100,60 Z";

            chartLine.setAttribute('d', dLine);
            chartArea.setAttribute('d', dArea);

            // 4. Update Text
            progressText.innerText = `${Math.round(percentage * 100)}% ASCENDED`;
            
            // 5. Background Ambiance
            // Lighten the room slightly as you ascend
            const lightVal = 45 + (percentage * 20);
            document.body.style.backgroundColor = `rgb(${lightVal}, ${lightVal - 5}, ${lightVal + 5})`;
        }

        // Allow Enter key to add task
        taskInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

    </script>
</body>
</html>
