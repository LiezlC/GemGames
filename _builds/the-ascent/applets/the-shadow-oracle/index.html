<!DOCTYPE html>
<html lang="en">
<head>
<meta name="author" content="Liezl Coetzee">
<meta name="description" content="The Shadow Oracle - station of The Ascent pilgrimage. Originally generated by Google Gemini from source images; curated, consolidated, and extended by Liezl Coetzee.">
<meta name="generator" content="Gemini (original applets); human consolidation by Liezl Coetzee">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shadow Oracle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --light-color: 255, 255, 255;
            --light-intensity: 0.8;
            --fog-speed: 20s;
            --wing-spread: 0deg;
            --float-speed: 4s;
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The Stage */
        .scene-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            overflow: hidden;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Light Source */
        .halo {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(var(--light-color), 1) 20%, rgba(var(--light-color), 0) 70%);
            border-radius: 50%;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(var(--light-intensity));
            box-shadow: 0 0 100px 40px rgba(var(--light-color), 0.5);
            z-index: 2;
            transition: all 1s ease;
            filter: blur(5px);
        }

        /* The Figure Container */
        .figure-wrapper {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -20%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: float var(--float-speed) ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -20%); }
            50% { transform: translate(-50%, -22%); }
        }

        /* SVG Elements */
        .silhouette {
            fill: #000;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            height: 500px;
            width: auto;
        }

        .wing {
            position: absolute;
            top: 60px;
            height: 300px;
            width: auto;
            fill: #000;
            z-index: -1;
            transition: transform 1s ease-out;
            transform-origin: center right;
        }

        .wing.left {
            right: 45%;
            transform-origin: 100% 30%;
            transform: rotate(calc(var(--wing-spread) * -1));
        }

        .wing.right {
            left: 45%;
            transform-origin: 0% 30%;
            transform: scaleX(-1) rotate(calc(var(--wing-spread) * -1));
        }

        /* Fog Effects */
        .fog-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.4"/></svg>');
            opacity: 0.3;
            z-index: 15;
            pointer-events: none;
            animation: drift var(--fog-speed) linear infinite;
            mix-blend-mode: screen;
            mask-image: linear-gradient(to bottom, transparent, black 40%, transparent);
        }

        .fog-layer.back {
            z-index: 3;
            opacity: 0.5;
            animation-direction: reverse;
            animation-duration: 35s;
        }

        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Floor */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to bottom, #0a0a0a 0%, #1a1a1a 100%);
            z-index: 5;
            transform-style: preserve-3d;
        }
        
        .floor::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0,
                transparent 40px,
                rgba(0,0,0,0.8) 41px,
                rgba(0,0,0,0.8) 42px
            ),
            repeating-linear-gradient(
                0deg,
                transparent 0,
                transparent 20px,
                rgba(0,0,0,0.5) 21px,
                rgba(0,0,0,0.5) 22px
            );
            transform: perspective(500px) rotateX(60deg) scale(2);
            transform-origin: top center;
            opacity: 0.3;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            z-index: 100;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .oracle-text {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            opacity: 0;
            transition: opacity 1s ease;
        }

        .oracle-text.visible {
            opacity: 1;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 5px #fff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #444;
            border-radius: 2px;
        }

        .btn-glow {
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            text-shadow: 0 0 5px white;
        }

    </style>
</head>
<body>

    <!-- Oracle Message Display -->
    <div id="oracle-display" class="oracle-text flex flex-col items-center justify-center">
        <h1 class="text-3xl md:text-5xl font-bold tracking-widest uppercase mb-2" id="oracle-title">THE ENTITY WATCHES</h1>
        <p class="text-sm md:text-lg text-gray-400 max-w-md italic" id="oracle-subtitle">"Adjust the atmosphere to reveal your fate..."</p>
    </div>

    <div class="scene-container">
        <!-- Background Fog -->
        <div class="fog-layer back"></div>

        <!-- The Light -->
        <div class="halo"></div>

        <!-- The Figure -->
        <div class="figure-wrapper">
            <!-- Left Wing -->
            <svg class="wing left" viewBox="0 0 200 300">
                <path d="M200,100 Q150,0 50,20 Q0,50 20,150 Q50,250 150,280 Q180,200 200,100 Z" />
                <path d="M200,100 Q160,40 80,60" stroke="rgba(255,255,255,0.1)" fill="none" stroke-width="2"/>
                <path d="M190,110 Q150,80 70,100" stroke="rgba(255,255,255,0.1)" fill="none" stroke-width="2"/>
            </svg>
            
            <!-- Right Wing -->
            <svg class="wing right" viewBox="0 0 200 300">
                <path d="M200,100 Q150,0 50,20 Q0,50 20,150 Q50,250 150,280 Q180,200 200,100 Z" />
            </svg>

            <!-- Main Body Silhouette -->
            <svg class="silhouette" viewBox="0 0 100 300">
                <!-- Head -->
                <circle cx="50" cy="40" r="25" />
                <!-- Shoulders/Coat -->
                <path d="M20,70 Q50,60 80,70 L90,280 Q50,300 10,280 Z" />
                <!-- Collar -->
                <path d="M30,70 L50,90 L70,70" fill="none" stroke="#111" stroke-width="2"/>
            </svg>
        </div>

        <!-- Foreground Fog -->
        <div class="fog-layer"></div>
        
        <!-- Floor -->
        <div class="floor"></div>
    </div>

    <!-- Controls -->
    <div class="ui-layer">
        <div class="grid grid-cols-1 gap-4">
            <div class="flex justify-between items-center mb-2 border-b border-gray-700 pb-2">
                <span class="text-xs uppercase tracking-widest text-gray-500">Control Panel</span>
                <div class="flex gap-2">
                    <button onclick="setPreset('angel')" class="text-xs px-2 py-1 border border-gray-600 hover:bg-gray-800 rounded">Light</button>
                    <button onclick="setPreset('demon')" class="text-xs px-2 py-1 border border-gray-600 hover:bg-gray-800 rounded">Dark</button>
                </div>
            </div>

            <!-- Sliders -->
            <div class="space-y-4">
                <div>
                    <label class="flex justify-between text-xs uppercase tracking-wider mb-1">
                        <span>Illumination</span>
                        <span id="val-light">80%</span>
                    </label>
                    <input type="range" min="0" max="200" value="80" id="input-light">
                </div>
                
                <div>
                    <label class="flex justify-between text-xs uppercase tracking-wider mb-1">
                        <span>Manifestation (Wings)</span>
                        <span id="val-wings">0%</span>
                    </label>
                    <input type="range" min="0" max="60" value="0" id="input-wings">
                </div>

                <div>
                    <label class="flex justify-between text-xs uppercase tracking-wider mb-1">
                        <span>Corruption</span>
                        <span id="val-corruption">0%</span>
                    </label>
                    <input type="range" min="0" max="100" value="0" id="input-corruption">
                </div>
            </div>

            <!-- Action Button -->
            <button id="consult-btn" class="btn-glow mt-4 w-full py-3 bg-gray-900 border border-gray-600 text-white uppercase tracking-widest text-sm font-bold rounded hover:bg-black">
                Seek Judgment
            </button>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const inputLight = document.getElementById('input-light');
        const inputWings = document.getElementById('input-wings');
        const inputCorruption = document.getElementById('input-corruption');
        const consultBtn = document.getElementById('consult-btn');
        const oracleDisplay = document.getElementById('oracle-display');
        const oracleTitle = document.getElementById('oracle-title');
        const oracleSubtitle = document.getElementById('oracle-subtitle');

        // Messages
        const lightMessages = [
            "The path is clear.",
            "Ascension awaits.",
            "Forgiveness is absolute.",
            "Be the light in the void."
        ];
        
        const darkMessages = [
            "The abyss gazes back.",
            "Power requires sacrifice.",
            "Shadows cannot be outrun.",
            "Embrace the fall."
        ];

        const neutralMessages = [
            "Balance is fragile.",
            "Silence is the only answer.",
            "You stand on the threshold.",
            "Neither here nor there."
        ];

        function updateScene() {
            const lightVal = inputLight.value;
            const wingVal = inputWings.value;
            const corruptVal = inputCorruption.value;

            // Update CSS Variables
            root.style.setProperty('--light-intensity', lightVal / 100);
            root.style.setProperty('--wing-spread', wingVal + 'deg');

            // Calculate Color based on Corruption
            // 0 = White (255,255,255), 100 = Red (255, 0, 0) or Dark Purple
            const r = 255;
            const g = Math.floor(255 * (1 - (corruptVal / 100)));
            const b = Math.floor(255 * (1 - (corruptVal / 100)));
            
            root.style.setProperty('--light-color', `${r}, ${g}, ${b}`);

            // Update Labels
            document.getElementById('val-light').innerText = lightVal + '%';
            document.getElementById('val-wings').innerText = Math.floor((wingVal/60)*100) + '%';
            document.getElementById('val-corruption').innerText = corruptVal + '%';
        }

        function setPreset(type) {
            if(type === 'angel') {
                inputLight.value = 150;
                inputWings.value = 45;
                inputCorruption.value = 0;
            } else {
                inputLight.value = 60;
                inputWings.value = 60;
                inputCorruption.value = 100;
            }
            updateScene();
        }

        function consultOracle() {
            // Visual Feedback
            oracleDisplay.classList.remove('visible');
            consultBtn.innerText = "Communing...";
            consultBtn.disabled = true;

            // Determine Alignment
            const corruption = parseInt(inputCorruption.value);
            let alignment = 'neutral';
            if (corruption > 60) alignment = 'dark';
            if (corruption < 30) alignment = 'light';

            // Pick Message
            let title = "";
            let sub = "";

            setTimeout(() => {
                if (alignment === 'dark') {
                    title = "JUDGMENT: FALLEN";
                    sub = darkMessages[Math.floor(Math.random() * darkMessages.length)];
                    // Trigger a glitch effect visual
                    root.style.setProperty('--light-intensity', 0.2);
                    setTimeout(() => updateScene(), 200);
                } else if (alignment === 'light') {
                    title = "JUDGMENT: ASCENDED";
                    sub = lightMessages[Math.floor(Math.random() * lightMessages.length)];
                    // Trigger a flare effect
                    root.style.setProperty('--light-intensity', 2);
                    setTimeout(() => updateScene(), 500);
                } else {
                    title = "JUDGMENT: PURGATORY";
                    sub = neutralMessages[Math.floor(Math.random() * neutralMessages.length)];
                }

                oracleTitle.innerText = title;
                oracleSubtitle.innerText = `"${sub}"`;
                
                oracleDisplay.classList.add('visible');
                consultBtn.innerText = "Seek Judgment";
                consultBtn.disabled = false;

            }, 1000);
        }

        // Event Listeners
        inputLight.addEventListener('input', updateScene);
        inputWings.addEventListener('input', updateScene);
        inputCorruption.addEventListener('input', updateScene);
        consultBtn.addEventListener('click', consultOracle);

        // Init
        updateScene();
        setTimeout(() => oracleDisplay.classList.add('visible'), 500);

    </script>
</body>
</html>
