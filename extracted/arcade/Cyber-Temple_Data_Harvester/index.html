<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Temple Data Harvester</title>
    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00ccff;
            --neon-purple: #aa00ff;
            --dark-bg: #050510;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
        }

        /* Background Warp Effect */
        canvas#warp-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* UI HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 50%, #000000 150%);
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px var(--neon-blue);
            pointer-events: auto;
        }

        .score-board h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-board .value {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        .controls {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-pink);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px var(--neon-pink);
            pointer-events: auto;
            text-align: right;
        }

        button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 5px;
        }

        button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 15px white;
        }

        input[type="range"] {
            width: 150px;
            accent-color: var(--neon-pink);
        }

        /* 3D Scene Container */
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #floor {
            position: absolute;
            bottom: -100px;
            width: 200%;
            height: 1000px;
            background: linear-gradient(to top, transparent 0%, rgba(0, 204, 255, 0.1) 50%, transparent 100%);
            transform: rotateX(80deg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 2s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* Pillars */
        .pillar-group {
            position: absolute;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            bottom: 10%;
            width: 100%;
            pointer-events: none; /* Allow clicks to pass through gaps */
        }

        .pillar {
            position: relative;
            width: 60px;
            margin: 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.3s ease, filter 0.3s;
            transform-origin: bottom center;
        }

        .pillar:hover {
            transform: scale(1.05) translateY(-10px);
            filter: brightness(1.3);
        }

        .pillar:active {
            transform: scale(0.95);
        }

        /* Pillar Parts */
        .capital {
            width: 80px;
            height: 25px;
            background: linear-gradient(90deg, #444, #888, #444);
            border-radius: 5px;
            box-shadow: 0 0 10px currentColor;
            position: relative;
            z-index: 2;
        }
        
        /* Ionic Scroll effect */
        .capital::before, .capital::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #fff 10%, #555 90%);
            border-radius: 50%;
            transform: translateY(-50%);
            border: 2px solid #333;
        }
        .capital::before { left: -10px; }
        .capital::after { right: -10px; }

        .shaft {
            width: 50px;
            height: 200px; /* Dynamic */
            background: repeating-linear-gradient(
                90deg,
                #222 0px,
                #222 5px,
                #555 10px,
                #222 15px
            );
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            z-index: 1;
            transition: height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .base {
            width: 70px;
            height: 20px;
            background: linear-gradient(90deg, #333, #666, #333);
            border-radius: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Floating Data Orbs (Coins) */
        .orb {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, transparent);
            border: 2px solid white;
            box-shadow: 0 0 15px currentColor, inset 0 0 10px currentColor;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            pointer-events: auto;
            animation: float 3s ease-in-out infinite;
            z-index: 20;
        }

        .orb::after {
            content: '₿';
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px black;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-20px) rotateY(180deg); }
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .pop-anim {
            animation: pop 0.3s forwards !important;
        }

        /* Notification */
        #notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid white;
            padding: 20px 40px;
            font-size: 1.5rem;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            z-index: 200;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* Scanlines overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 90;
            opacity: 0.3;
        }

    </style>
</head>
<body>

    <!-- Background Warp Canvas -->
    <canvas id="warp-canvas"></canvas>
    
    <!-- Retro Scanlines -->
    <div class="scanlines"></div>

    <!-- 3D Scene -->
    <div id="scene-container">
        <div id="floor"></div>
        <div class="pillar-group" id="pillar-container">
            <!-- Pillars generated by JS -->
        </div>
    </div>

    <!-- HUD UI -->
    <div id="hud">
        <div class="hud-top">
            <div class="score-board">
                <h1>Data Harvested</h1>
                <div class="value" id="score">0</div>
                <div style="font-size: 0.8rem; color: #aaa; margin-top:5px;">Hash Rate: <span id="hash-rate">0</span> TH/s</div>
            </div>
            <div class="controls">
                <h1>System Control</h1>
                <label for="speed-slider" style="display:block; font-size: 0.8rem; color: #aaa; margin-bottom:5px;">Warp Velocity</label>
                <input type="range" id="speed-slider" min="1" max="50" value="5">
                <br>
                <button id="stabilize-btn">Stabilize Grid</button>
            </div>
        </div>
        <div style="text-align: center; opacity: 0.7; font-size: 0.8rem;">
            CLICK PILLARS TO MINE • CATCH ORBS FOR BONUS
        </div>
    </div>

    <!-- Popups -->
    <div id="notification">SYSTEM STABILIZED</div>

    <script>
        /* --- 1. Warp Speed Background (Canvas) --- */
        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];
        let warpSpeed = 5;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initStars();
        }

        class Star {
            constructor() {
                this.x = (Math.random() - 0.5) * width * 2;
                this.y = (Math.random() - 0.5) * height * 2;
                this.z = Math.random() * width;
                this.pz = this.z; // previous z
            }

            update() {
                this.z -= warpSpeed * 2; // Speed multiplier
                if (this.z < 1) {
                    this.z = width;
                    this.x = (Math.random() - 0.5) * width * 2;
                    this.y = (Math.random() - 0.5) * height * 2;
                    this.pz = this.z;
                }
            }

            draw() {
                const sx = (this.x / this.z) * (width/2) + width / 2;
                const sy = (this.y / this.z) * (height/2) + height / 2;

                const px = (this.x / this.pz) * (width/2) + width / 2;
                const py = (this.y / this.pz) * (height/2) + height / 2;

                this.pz = this.z;

                // Determine color based on screen position (Pink left, Blue right)
                const isLeft = sx < width / 2;
                const color = isLeft ? '#ff0055' : '#00ccff';

                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.strokeStyle = color;
                ctx.lineWidth = (1 - this.z / width) * 3;
                ctx.stroke();
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 400; i++) {
                stars.push(new Star());
            }
        }

        function animateCanvas() {
            // Trail effect
            ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', resize);
        resize();
        animateCanvas();

        /* --- 2. Game Logic & UI --- */
        const pillarContainer = document.getElementById('pillar-container');
        const scoreEl = document.getElementById('score');
        const hashRateEl = document.getElementById('hash-rate');
        const speedSlider = document.getElementById('speed-slider');
        const stabilizeBtn = document.getElementById('stabilize-btn');
        const notification = document.getElementById('notification');

        let score = 0;
        let hashRate = 12;
        const pillarCount = 9; // Odd number for symmetry

        // Initialize Pillars
        function createPillars() {
            for (let i = 0; i < pillarCount; i++) {
                const pillar = document.createElement('div');
                pillar.className = 'pillar';
                
                // Determine color based on index (Left=Pink, Right=Blue, Center=Purple)
                let color = '#aa00ff'; // Center
                if (i < Math.floor(pillarCount/2)) color = '#ff0055'; // Left
                if (i > Math.floor(pillarCount/2)) color = '#00ccff'; // Right

                pillar.style.color = color; // Used for shadow/glow inheritance

                // Create parts
                const capital = document.createElement('div');
                capital.className = 'capital';
                
                const shaft = document.createElement('div');
                shaft.className = 'shaft';
                shaft.style.height = (150 + Math.random() * 150) + 'px'; // Random height

                const base = document.createElement('div');
                base.className = 'base';

                pillar.appendChild(capital);
                pillar.appendChild(shaft);
                pillar.appendChild(base);

                // Interaction
                pillar.addEventListener('click', (e) => {
                    minePillar(pillar, e.clientX, e.clientY);
                });

                pillarContainer.appendChild(pillar);
            }
        }

        function minePillar(pillar, x, y) {
            // Visual feedback
            const shaft = pillar.querySelector('.shaft');
            const currentHeight = parseInt(shaft.style.height);
            
            // "Mine" the pillar (shrink it slightly, give points)
            if (currentHeight > 50) {
                shaft.style.height = (currentHeight - 10) + 'px';
                score += 10;
                hashRate += 2;
                updateUI();
                spawnOrb(x, y - 100, pillar.style.color);
            } else {
                // Reset if too small
                shaft.style.height = '300px';
                score += 50; // Bonus for reset
                showNotification("DATA RESET: +50");
            }
        }

        function spawnOrb(x, y, color) {
            const orb = document.createElement('div');
            orb.className = 'orb';
            orb.style.left = x + 'px';
            orb.style.top = y + 'px';
            orb.style.color = color;
            orb.style.borderColor = color;
            
            // Random trajectory
            const dx = (Math.random() - 0.5) * 200;
            const dy = -100 - Math.random() * 100;

            // Animate movement manually for better control than pure CSS
            const startTime = Date.now();
            
            function moveOrb() {
                const elapsed = Date.now() - startTime;
                if (elapsed > 2000) {
                    if(orb.parentNode) orb.parentNode.removeChild(orb);
                    return;
                }
                
                // Simple physics
                const progress = elapsed / 2000;
                const curX = x + dx * progress;
                const curY = y + dy * progress + (200 * progress * progress); // Gravity

                orb.style.left = curX + 'px';
                orb.style.top = curY + 'px';
                
                requestAnimationFrame(moveOrb);
            }
            moveOrb();

            orb.addEventListener('click', (e) => {
                e.stopPropagation();
                score += 100;
                updateUI();
                orb.classList.add('pop-anim');
                setTimeout(() => {
                    if(orb.parentNode) orb.parentNode.removeChild(orb);
                }, 300);
            });

            document.body.appendChild(orb);
        }

        function updateUI() {
            scoreEl.innerText = score.toLocaleString();
            hashRateEl.innerText = hashRate;
        }

        function showNotification(text) {
            notification.innerText = text;
            notification.style.opacity = 1;
            setTimeout(() => {
                notification.style.opacity = 0;
            }, 1500);
        }

        // Auto-fluctuate pillars (Simulate live data)
        setInterval(() => {
            const pillars = document.querySelectorAll('.pillar .shaft');
            const randomPillar = pillars[Math.floor(Math.random() * pillars.length)];
            const currentH = parseInt(randomPillar.style.height);
            const change = (Math.random() - 0.5) * 40;
            let newH = currentH + change;
            if (newH < 50) newH = 50;
            if (newH > 350) newH = 350;
            randomPillar.style.height = newH + 'px';
        }, 500);

        // Speed Slider
        speedSlider.addEventListener('input', (e) => {
            warpSpeed = parseInt(e.target.value);
            // Visual feedback on grid
            document.getElementById('floor').style.animationDuration = (2.5 - (warpSpeed/25)) + 's';
        });

        // Stabilize Button
        stabilizeBtn.addEventListener('click', () => {
            const pillars = document.querySelectorAll('.pillar .shaft');
            pillars.forEach(p => {
                p.style.height = '200px';
            });
            score += 250;
            warpSpeed = 2;
            speedSlider.value = 2;
            showNotification("SYSTEM STABILIZED: +250");
            updateUI();
        });

        // Random Orb Spawner
        setInterval(() => {
            if (Math.random() > 0.7) {
                const width = window.innerWidth;
                const height = window.innerHeight;
                spawnOrb(
                    width * 0.2 + Math.random() * width * 0.6, 
                    height * 0.8, 
                    Math.random() > 0.5 ? '#ff0055' : '#00ccff'
                );
            }
        }, 2000);

        // Init
        createPillars();

    </script>
</body>
</html>
