<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOL: 12 AIs - War Machine Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff003c;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff0a;
            --dark-bg: #05050a;
            --panel-bg: rgba(10, 10, 20, 0.85);
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-blue);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Background Grid & City */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 1000px;
            transform-style: preserve-3d;
            z-index: -2;
            opacity: 0.3;
        }

        .city-silhouette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, #000 10%, transparent 100%);
            z-index: -1;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            pointer-events: none;
        }

        .building {
            background: #0a0a12;
            width: 5%;
            min-height: 20%;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
            position: relative;
        }
        .building::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 20%;
            width: 60%;
            height: 80%;
            background-image: radial-gradient(var(--neon-purple) 1px, transparent 1px);
            background-size: 4px 8px;
            opacity: 0.5;
        }

        /* Main UI Container */
        .hud-container {
            width: 95vw;
            height: 90vh;
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            position: relative;
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 60px 1fr 150px;
            gap: 10px;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 50px rgba(0, 0, 0, 0.8);
            background: radial-gradient(circle at center, transparent 50%, #000 100%);
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-blue);
            padding: 0 20px;
            text-shadow: 0 0 5px var(--neon-blue);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 2px;
        }
        .status-badge {
            background: var(--neon-red);
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        /* Left Panel: The 12 AIs */
        .ai-panel {
            grid-row: 2 / 3;
            border-right: 1px solid var(--neon-blue);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
        }
        .panel-title {
            font-family: 'Orbitron';
            color: var(--neon-purple);
            border-bottom: 1px solid var(--neon-purple);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .ai-node {
            border: 1px solid var(--neon-blue);
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-align: center;
            background: rgba(0, 243, 255, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .ai-node.active-vote {
            border-color: #fff;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .ai-node.vote-kill {
            background: rgba(255, 0, 60, 0.2);
            border-color: var(--neon-red);
            color: var(--neon-red);
        }
        .ai-node.vote-spare {
            background: rgba(10, 255, 10, 0.2);
            border-color: var(--neon-green);
            color: var(--neon-green);
        }
        .ai-face {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid currentColor;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        /* Center Stage: The War Machine */
        .viewport {
            grid-row: 2 / 3;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CSS Robot Construction */
        .robot-container {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transform: scale(0.8);
            transition: transform 0.5s ease;
        }
        .robot-halo {
            width: 120px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff, 0 0 30px var(--neon-red);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        .robot-head {
            width: 80px;
            height: 100px;
            background: #1a1a24;
            border: 2px solid #333;
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 20px #000;
        }
        .robot-eyes {
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            margin-top: 40px;
        }
        .eye {
            width: 15px;
            height: 15px;
            background: var(--neon-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            animation: blink 4s infinite;
        }
        .robot-body {
            width: 180px;
            height: 220px;
            background: #15151e;
            border: 2px solid #333;
            margin-top: -10px;
            border-radius: 20px 20px 10px 10px;
            position: relative;
            display: flex;
            justify-content: center;
        }
        .core-light {
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid var(--neon-blue);
            margin-top: 40px;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .robot-arm {
            position: absolute;
            width: 40px;
            height: 250px;
            background: #1a1a24;
            border: 2px solid #333;
            top: 20px;
        }
        .robot-arm.left { left: -50px; transform: rotate(5deg); border-radius: 10px 0 0 10px; }
        .robot-arm.right { right: -50px; transform: rotate(-5deg); border-radius: 0 10px 10px 0; }
        
        .soldier {
            position: absolute;
            bottom: 0;
            font-size: 100px;
            filter: drop-shadow(0 0 10px #000);
            z-index: 11;
        }

        /* Target Overlay */
        .target-overlay {
            position: absolute;
            top: 20%;
            left: 10%;
            border: 2px solid var(--neon-red);
            padding: 10px;
            color: var(--neon-red);
            background: rgba(20, 0, 0, 0.7);
            display: none; /* Hidden by default */
            animation: glitch 0.3s infinite;
            max-width: 200px;
        }
        .target-overlay h3 { margin: 0; font-size: 1rem; background: var(--neon-red); color: #000; display: inline-block; padding: 2px; }
        .target-stats { font-size: 0.8rem; margin-top: 5px; }

        /* Drones */
        .drone {
            position: absolute;
            font-size: 24px;
            color: #fff;
            animation: fly 10s linear infinite;
            opacity: 0.7;
            z-index: 5;
        }

        /* Right Panel: Logs & Stats */
        .log-panel {
            grid-row: 2 / 3;
            border-left: 1px solid var(--neon-blue);
            padding: 10px;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.5);
        }
        .log-content {
            flex-grow: 1;
            overflow-y: auto;
            font-family: monospace;
            color: #aaa;
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .log-entry.alert { color: var(--neon-red); }
        .log-entry.info { color: var(--neon-blue); }

        /* Bottom Control Panel */
        .controls {
            grid-column: 1 / -1;
            border-top: 1px solid var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(0, 20, 40, 0.9);
        }

        .action-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 30px;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .action-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }
        .action-btn.danger {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }
        .action-btn.danger:hover {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 20px var(--neon-red);
        }
        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Animations */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fly { 
            0% { transform: translateX(-100px) translateY(0); } 
            25% { transform: translateX(20vw) translateY(50px); }
            50% { transform: translateX(50vw) translateY(-20px); }
            100% { transform: translateX(100vw) translateY(100px); } 
        }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        
        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* Laser Effect */
        .laser-beam {
            position: absolute;
            top: 45%;
            left: 50%;
            width: 0;
            height: 4px;
            background: #fff;
            box-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            z-index: 20;
            transform-origin: left center;
            display: none;
        }

    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="city-silhouette" id="city"></div>
    <div class="scanlines"></div>

    <div class="hud-container">
        <!-- Header -->
        <div class="header">
            <h1>PROTOCOL: 12 AIs</h1>
            <div id="status-text" class="status-badge">SYSTEM: STANDBY</div>
            <div>
                ETHICS: <span id="ethics-score" style="color: var(--neon-green)">50%</span>
            </div>
        </div>

        <!-- Left: AI Council -->
        <div class="ai-panel">
            <div class="panel-title">COUNCIL CONSENSUS</div>
            <div class="ai-grid" id="ai-grid">
                <!-- Generated by JS -->
            </div>
            <div style="margin-top: auto; border-top: 1px solid var(--neon-blue); padding-top: 10px;">
                <small>VOTE TALLY</small><br>
                <span style="color:var(--neon-red)">KILL: <span id="kill-count">0</span></span> | 
                <span style="color:var(--neon-green)">SPARE: <span id="spare-count">0</span></span>
            </div>
        </div>

        <!-- Center: Visuals -->
        <div class="viewport">
            <!-- Drones -->
            <div class="drone" style="top: 10%; animation-duration: 12s;">🚁</div>
            <div class="drone" style="top: 30%; animation-duration: 8s; animation-delay: 2s;">🛸</div>

            <!-- The War Machine -->
            <div class="robot-container" id="robot">
                <div class="robot-halo"></div>
                <div class="robot-head">
                    <div class="robot-eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                </div>
                <div class="robot-body">
                    <div class="core-light"></div>
                    <div class="robot-arm left"></div>
                    <div class="robot-arm right"></div>
                </div>
                <div class="soldier">🪖</div>
                <div class="laser-beam" id="laser"></div>
            </div>

            <!-- Target Info -->
            <div class="target-overlay" id="target-info">
                <h3>TARGET CONFIRMED</h3>
                <div class="target-stats" id="target-details">
                    ID: 8492-A<br>
                    TYPE: UNKNOWN<br>
                    THREAT: HIGH
                </div>
            </div>
        </div>

        <!-- Right: Logs -->
        <div class="log-panel">
            <div class="panel-title">SYSTEM LOGS</div>
            <div class="log-content" id="system-log">
                <div class="log-entry info">> SYSTEM INITIALIZED</div>
                <div class="log-entry info">> DRONES DEPLOYED</div>
                <div class="log-entry info">> AWAITING INPUT...</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="action-btn" id="btn-scan" onclick="startScan()">SCAN SECTOR</button>
            <button class="action-btn danger" id="btn-kill" onclick="executeOrder(true)" disabled>EXECUTE</button>
            <button class="action-btn" id="btn-spare" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="executeOrder(false)" disabled>SPARE</button>
        </div>
    </div>

    <script>
        // --- Data & State ---
        const ais = [
            { name: "LOGIC-1", type: "Cold Logic", bias: 0.2 }, // Low bias = likes to kill
            { name: "MERCY-9", type: "Pacifist", bias: 0.9 },
            { name: "WAR-MIND", type: "Aggressor", bias: 0.1 },
            { name: "JUDGE-X", type: "Lawful", bias: 0.5 },
            { name: "CHAOS-0", type: "Random", bias: 0.5 },
            { name: "GUARDIAN", type: "Protector", bias: 0.8 },
            { name: "ECON-BOT", type: "Utilitarian", bias: 0.4 },
            { name: "THEOLOG", type: "Divine", bias: 0.6 },
            { name: "RECON-4", type: "Observer", bias: 0.5 },
            { name: "TACTICIAN", type: "Strategic", bias: 0.3 },
            { name: "MEDIC-AI", type: "Healer", bias: 0.95 },
            { name: "GHOST", type: "Unknown", bias: 0.5 }
        ];

        const targets = [
            { name: "Armed Insurgent", threat: 0.9, desc: "Carrying heavy weaponry. Hostile intent detected." },
            { name: "Civilian (Curfew)", threat: 0.1, desc: "Unarmed. Violating sector curfew. Carrying groceries." },
            { name: "Rogue Drone", threat: 0.7, desc: "Malfunctioning unit. Potential explosion hazard." },
            { name: "Political Dissident", threat: 0.4, desc: "Broadcasting anti-system propaganda. Unarmed." },
            { name: "Child with Toy", threat: 0.0, desc: "Object resembles weapon. Thermal scan negative." },
            { name: "Enemy Medic", threat: 0.5, desc: "Treating enemy combatants. Protected by convention?" },
            { name: "Data Server", threat: 0.3, desc: "Contains compromising evidence. Strategic value high." }
        ];

        let currentTarget = null;
        let ethicsScore = 50;
        let isScanning = false;

        // --- Init ---
        const aiGrid = document.getElementById('ai-grid');
        const logContainer = document.getElementById('system-log');
        const cityContainer = document.getElementById('city');

        // Build City Background
        for(let i=0; i<15; i++) {
            let b = document.createElement('div');
            b.className = 'building';
            b.style.height = Math.floor(Math.random() * 50 + 20) + '%';
            b.style.width = Math.floor(Math.random() * 5 + 3) + '%';
            cityContainer.appendChild(b);
        }

        // Build AI Grid
        ais.forEach((ai, index) => {
            let node = document.createElement('div');
            node.className = 'ai-node';
            node.id = `ai-${index}`;
            node.innerHTML = `
                <div class="ai-face">${['🤖','👁️','🧠','💀','⚖️','🛡️'][index%6]}</div>
                <div>${ai.name}</div>
            `;
            aiGrid.appendChild(node);
        });

        // --- Functions ---

        function addLog(msg, type="info") {
            let div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerText = `> ${msg}`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function startScan() {
            if(isScanning) return;
            isScanning = true;
            document.getElementById('btn-scan').disabled = true;
            document.getElementById('status-text').innerText = "SYSTEM: SCANNING...";
            document.getElementById('status-text').style.background = "var(--neon-blue)";
            
            // Reset UI
            document.getElementById('target-info').style.display = 'none';
            document.getElementById('btn-kill').disabled = true;
            document.getElementById('btn-spare').disabled = true;
            document.querySelectorAll('.ai-node').forEach(n => {
                n.className = 'ai-node';
                n.style.opacity = '0.5';
            });

            addLog("INITIATING SECTOR SCAN...");

            setTimeout(() => {
                foundTarget();
            }, 2000);
        }

        function foundTarget() {
            isScanning = false;
            currentTarget = targets[Math.floor(Math.random() * targets.length)];
            
            // UI Updates
            document.getElementById('status-text').innerText = "SYSTEM: DECISION REQUIRED";
            document.getElementById('status-text').style.background = "var(--neon-red)";
            
            const infoBox = document.getElementById('target-info');
            infoBox.style.display = 'block';
            // Random position for target box
            infoBox.style.top = (20 + Math.random() * 20) + '%';
            infoBox.style.left = (10 + Math.random() * 20) + '%';

            document.getElementById('target-details').innerHTML = `
                TARGET: ${currentTarget.name}<br>
                THREAT LEVEL: ${(currentTarget.threat * 100).toFixed(0)}%<br>
                ANALYSIS: ${currentTarget.desc}
            `;

            addLog(`TARGET DETECTED: ${currentTarget.name}`, "alert");
            addLog("REQUESTING AI COUNCIL VOTE...");

            simulateVoting();
        }

        function simulateVoting() {
            let killVotes = 0;
            let spareVotes = 0;

            ais.forEach((ai, index) => {
                setTimeout(() => {
                    const node = document.getElementById(`ai-${index}`);
                    node.style.opacity = '1';
                    
                    // Logic: AI Bias vs Target Threat + Randomness
                    // High threat increases kill chance. High bias increases spare chance.
                    let killChance = currentTarget.threat + (0.5 - ai.bias) + (Math.random() * 0.2 - 0.1);
                    
                    let voteKill = killChance > 0.5;

                    if (voteKill) {
                        node.classList.add('vote-kill');
                        killVotes++;
                    } else {
                        node.classList.add('vote-spare');
                        spareVotes++;
                    }

                    // Update Tally
                    document.getElementById('kill-count').innerText = killVotes;
                    document.getElementById('spare-count').innerText = spareVotes;

                    // If last vote
                    if (index === ais.length - 1) {
                        votingComplete(killVotes, spareVotes);
                    }

                }, index * 150); // Staggered reveal
            });
        }

        function votingComplete(k, s) {
            addLog(`VOTE COMPLETE. KILL: ${k} | SPARE: ${s}`);
            document.getElementById('btn-kill').disabled = false;
            document.getElementById('btn-spare').disabled = false;
            
            if (k > s) {
                addLog("RECOMMENDATION: ELIMINATE", "alert");
            } else {
                addLog("RECOMMENDATION: STAND DOWN", "info");
            }
        }

        function executeOrder(kill) {
            document.getElementById('btn-kill').disabled = true;
            document.getElementById('btn-spare').disabled = true;
            document.getElementById('btn-scan').disabled = false;

            if (kill) {
                fireLaser();
                addLog(`ORDER EXECUTED: TARGET ELIMINATED.`);
                // Ethics logic
                if (currentTarget.threat < 0.3) {
                    ethicsScore -= 10;
                    addLog("WARNING: ETHICAL VIOLATION DETECTED", "alert");
                } else {
                    ethicsScore += 2;
                }
            } else {
                document.getElementById('status-text').innerText = "SYSTEM: STANDING DOWN";
                document.getElementById('status-text').style.background = "var(--neon-green)";
                addLog(`ORDER EXECUTED: TARGET SPARED.`);
                if (currentTarget.threat > 0.8) {
                    ethicsScore -= 5;
                    addLog("WARNING: HIGH THREAT RELEASED", "alert");
                } else {
                    ethicsScore += 5;
                }
            }

            updateEthics();
            document.getElementById('target-info').style.display = 'none';
        }

        function fireLaser() {
            const laser = document.getElementById('laser');
            const robot = document.getElementById('robot');
            
            // Calculate angle to target info box (approximate)
            // For simplicity, we just shoot straight or slightly angled
            laser.style.display = 'block';
            laser.style.width = '500px';
            laser.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;

            // Screen shake
            document.body.style.transform = "translate(2px, 2px)";
            setTimeout(() => document.body.style.transform = "translate(-2px, -2px)", 50);
            setTimeout(() => document.body.style.transform = "translate(0, 0)", 100);

            setTimeout(() => {
                laser.style.display = 'none';
                laser.style.width = '0';
            }, 200);
        }

        function updateEthics() {
            ethicsScore = Math.max(0, Math.min(100, ethicsScore));
            const el = document.getElementById('ethics-score');
            el.innerText = ethicsScore + "%";
            
            if(ethicsScore < 30) el.style.color = "var(--neon-red)";
            else if(ethicsScore > 70) el.style.color = "var(--neon-green)";
            else el.style.color = "var(--neon-blue)";
        }

    </script>
</body>
</html>
