<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventures of Elara - Interactive Storybook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;600;700&display=swap');

        :root {
            --page-bg: #fdfbf7;
            --text-color: #2c3e50;
            --accent-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
        }

        body {
            background-color: #1a202c;
            background-image: radial-gradient(#2d3748 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }

        /* Book Container 3D Effect */
        .book-container {
            width: 90vw;
            max-width: 1000px;
            height: 85vh;
            background: var(--page-bg);
            border-radius: 12px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                0 0 0 10px #4a5568 inset; /* Binder look */
            display: flex;
            overflow: hidden;
            position: relative;
            perspective: 1500px;
        }

        .page-content {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Left Side: Interactive Stage */
        .stage-panel {
            flex: 1;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid #cbd5e0;
        }

        /* Right Side: Story Text */
        .story-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        h1, h2 {
            font-family: 'Lora', serif;
            color: #1a202c;
        }

        p {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4a5568;
            margin-bottom: 1.5rem;
        }

        /* Navigation Buttons */
        .nav-btn {
            position: absolute;
            bottom: 20px;
            padding: 10px 20px;
            background: #2d3748;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {
            background: #4a5568;
            transform: translateY(-2px);
        }

        .prev-btn { left: 40px; }
        .next-btn { right: 40px; }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Game Elements */
        .character-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
            margin: 10px;
            width: 140px;
        }
        .character-card:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(255, 255, 255, 0.9);
        }
        .emoji-lg { font-size: 4rem; display: block; margin-bottom: 10px; }
        
        /* Scene Specifics */
        .scene-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            transition: background 0.5s;
        }

        .game-layer {
            z-index: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Pattern Game */
        .pattern-grid {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.3);
            padding: 20px;
            border-radius: 20px;
        }
        .pattern-slot {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .pattern-slot.correct { border-color: #48bb78; background: #d1fae5; }
        .pattern-slot.wrong { border-color: #f56565; animation: shake 0.3s; }

        /* Village Game */
        .village-area {
            width: 300px;
            height: 300px;
            position: relative;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            border: 4px dashed rgba(0,0,0,0.1);
        }
        .house {
            position: absolute;
            font-size: 3rem;
            cursor: grab;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .house.fixed {
            cursor: default;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        /* Garden Game */
        .flower-bed {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .flower {
            font-size: 3.5rem;
            cursor: pointer;
            filter: grayscale(100%) brightness(0.8);
            transition: all 0.5s;
            transform-origin: bottom center;
        }
        .flower.bloomed {
            filter: grayscale(0%);
            transform: scale(1.2);
            animation: float 3s infinite ease-in-out;
        }

        /* Cloud Game */
        .cloud-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .creature {
            position: absolute;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
            animation: float 2s infinite alternate;
        }
        .creature:active { transform: scale(0.8); }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback-msg {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .feedback-msg.show { opacity: 1; }

    </style>
</head>
<body>

    <div class="book-container">
        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        
        <!-- Left Page: Interactive -->
        <div class="stage-panel" id="stagePanel">
            <div class="scene-bg" id="sceneBg"></div>
            <div class="feedback-msg" id="feedbackMsg">Great Job!</div>
            <div class="game-layer" id="gameLayer">
                <!-- Game content injected by JS -->
            </div>
        </div>

        <!-- Right Page: Story -->
        <div class="story-panel">
            <div id="storyContent">
                <!-- Text content injected by JS -->
            </div>
            <div style="margin-top: auto; text-align: right; font-size: 0.8rem; color: #a0aec0;">
                Page <span id="pageNumber">1</span>
            </div>
        </div>

        <!-- Navigation -->
        <button class="nav-btn prev-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
        <button class="nav-btn next-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>

    <script>
        // State
        let currentPage = 0;
        const totalPages = 6;

        // Data
        const storyData = [
            {
                title: "The Trio",
                text: "In a world of numbers and stories lived Elara. She wasn't just one thing, but a mix of many. With her were two special friends: Cogsworth, a robot who loved order and facts, and Whisper, a magical cat who understood the language of the heart. Together, they were ready for anything.",
                bg: "linear-gradient(135deg, #fdfbf7 0%, #e2e8f0 100%)",
                type: "intro"
            },
            {
                title: "The Tangled Forest",
                text: "They came to a forest where the trees were tangled together. The animals were lost. Cogsworth tried counting the trees, but it was Elara who saw the patterns. <br><br><strong>Help Elara complete the pattern to guide them through!</strong>",
                bg: "linear-gradient(180deg, #2f855a 0%, #276749 100%)",
                type: "forest"
            },
            {
                title: "The Jumbled Village",
                text: "Next, they found a village where the houses were all jumbled up. The people were sad because they didn't have space. Whisper listened to their worries, and Elara designed a new plan.<br><br><strong>Click the floating houses to organize the village!</strong>",
                bg: "linear-gradient(135deg, #ed8936 0%, #dd6b20 100%)",
                type: "village"
            },
            {
                title: "The Thirsty Garden",
                text: "In a distant land, they found a garden where flowers were drooping. Elara created a special system to give each flower exactly what it needed.<br><br><strong>Tap the grey flowers to water them and make them bloom!</strong>",
                bg: "linear-gradient(180deg, #4fd1c5 0%, #319795 100%)",
                type: "garden"
            },
            {
                title: "The Cloud",
                text: "Now, Elara works in a magical place called The Cloud. She helps little digital creatures be helpful and friendly. She makes sure that when people ask questions, they get the best answers.<br><br><strong>Catch the flying data bugs to help Elara!</strong>",
                bg: "linear-gradient(135deg, #63b3ed 0%, #4299e1 100%)",
                type: "cloud"
            },
            {
                title: "A New Adventure",
                text: "Elara, Cogsworth, and Whisper have had many amazing adventures. But they know the biggest one is still to come. They are ready for a new challenge.<br><br>Where will they go next?",
                bg: "linear-gradient(135deg, #a0aec0 0%, #718096 100%)",
                type: "end"
            }
        ];

        // DOM Elements
        const storyContent = document.getElementById('storyContent');
        const gameLayer = document.getElementById('gameLayer');
        const sceneBg = document.getElementById('sceneBg');
        const pageNumber = document.getElementById('pageNumber');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const feedbackMsg = document.getElementById('feedbackMsg');
        const progressBar = document.getElementById('progressBar');

        // Initialization
        function init() {
            renderPage(0);
        }

        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage >= 0 && newPage < storyData.length) {
                currentPage = newPage;
                renderPage(currentPage);
            }
        }

        function showFeedback(text) {
            feedbackMsg.textContent = text;
            feedbackMsg.classList.add('show');
            setTimeout(() => feedbackMsg.classList.remove('show'), 2000);
        }

        function renderPage(index) {
            const data = storyData[index];
            
            // Update Text
            storyContent.innerHTML = `
                <h1 class="text-3xl font-bold mb-4 text-slate-800">${data.title}</h1>
                <p>${data.text}</p>
            `;
            pageNumber.textContent = index + 1;

            // Update Visuals
            sceneBg.style.background = data.bg;
            gameLayer.innerHTML = ''; // Clear previous game

            // Update Nav State
            prevBtn.disabled = index === 0;
            prevBtn.style.opacity = index === 0 ? 0.5 : 1;
            nextBtn.textContent = index === storyData.length - 1 ? "Restart" : "Next";
            if(index === storyData.length -1) {
                nextBtn.onclick = () => { currentPage = 0; renderPage(0); };
            } else {
                nextBtn.onclick = () => changePage(1);
            }

            // Progress Bar
            progressBar.style.width = `${((index + 1) / totalPages) * 100}%`;

            // Init Game Logic
            switch(data.type) {
                case 'intro': initIntro(); break;
                case 'forest': initForest(); break;
                case 'village': initVillage(); break;
                case 'garden': initGarden(); break;
                case 'cloud': initCloud(); break;
                case 'end': initEnd(); break;
            }
        }

        // --- Game Logic Functions ---

        function initIntro() {
            const chars = [
                { emoji: '👱‍♀️', name: 'Elara', role: 'The Creator' },
                { emoji: '🤖', name: 'Cogsworth', role: 'The Logic' },
                { emoji: '🐱', name: 'Whisper', role: 'The Heart' }
            ];
            
            const container = document.createElement('div');
            container.className = 'flex flex-wrap justify-center';
            
            chars.forEach((char, i) => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.style.animation = `popIn 0.5s ease-out ${i * 0.2}s backwards`;
                card.innerHTML = `
                    <span class="emoji-lg">${char.emoji}</span>
                    <h3 class="font-bold text-slate-800">${char.name}</h3>
                    <p class="text-xs text-slate-500 mt-1">${char.role}</p>
                `;
                card.onclick = () => {
                    card.style.transform = "scale(1.1) rotate(5deg)";
                    setTimeout(() => card.style.transform = "", 200);
                    showFeedback(`Hello ${char.name}!`);
                };
                container.appendChild(card);
            });
            gameLayer.appendChild(container);
        }

        function initForest() {
            const sequence = ['🌲', '🍄', '🌲', '🍄', '?'];
            const options = ['🌵', '🍄', '🌲'];
            
            const container = document.createElement('div');
            container.className = 'flex flex-col items-center gap-8';

            const grid = document.createElement('div');
            grid.className = 'pattern-grid';
            
            sequence.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'pattern-slot';
                slot.textContent = item;
                if (item === '?') slot.id = 'targetSlot';
                grid.appendChild(slot);
            });

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'flex gap-4';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'bg-white/80 hover:bg-white p-4 rounded-full text-3xl shadow-lg transition-all hover:-translate-y-1';
                btn.textContent = opt;
                btn.onclick = () => {
                    if(opt === '🌲') {
                        document.getElementById('targetSlot').textContent = '🌲';
                        document.getElementById('targetSlot').classList.add('correct');
                        showFeedback("Pattern Complete!");
                        confettiEffect(btn);
                    } else {
                        btn.style.background = '#feb2b2';
                        setTimeout(() => btn.style.background = '', 500);
                        showFeedback("Try again!");
                    }
                };
                optionsDiv.appendChild(btn);
            });

            container.appendChild(grid);
            container.appendChild(optionsDiv);
            gameLayer.appendChild(container);
        }

        function initVillage() {
            const area = document.createElement('div');
            area.className = 'village-area';
            
            // Grid positions
            const positions = [
                {top: '60px', left: '60px'},
                {top: '60px', left: '160px'},
                {top: '160px', left: '110px'}
            ];

            const houses = ['🏠', '🏡', '🏫'];
            
            houses.forEach((h, i) => {
                const el = document.createElement('div');
                el.className = 'house';
                el.textContent = h;
                
                // Random start pos
                const randRot = Math.random() * 60 - 30;
                const randX = Math.random() * 150 + 20;
                const randY = Math.random() * 150 + 20;
                
                el.style.transform = `translate(${randX}px, ${randY}px) rotate(${randRot}deg)`;
                
                el.onclick = () => {
                    el.style.transform = `translate(${positions[i].left}, ${positions[i].top}) rotate(0deg)`;
                    el.classList.add('fixed');
                    showFeedback("Perfect spot!");
                };
                
                area.appendChild(el);
            });
            
            gameLayer.appendChild(area);
        }

        function initGarden() {
            const bed = document.createElement('div');
            bed.className = 'flower-bed';
            
            const flowers = ['🌻', '🌷', '🌹', '🌼', '🌺', '🌸'];
            let bloomedCount = 0;

            flowers.forEach(f => {
                const el = document.createElement('div');
                el.className = 'flower';
                el.textContent = f;
                el.onclick = () => {
                    if(!el.classList.contains('bloomed')) {
                        el.classList.add('bloomed');
                        bloomedCount++;
                        if(bloomedCount === flowers.length) showFeedback("The garden is alive!");
                    }
                };
                bed.appendChild(el);
            });
            gameLayer.appendChild(bed);
        }

        function initCloud() {
            const container = document.createElement('div');
            container.className = 'cloud-container';
            
            const bugs = ['👾', '🤖', '👻', '👽', '🎃'];
            
            // Spawn bugs periodically
            const spawner = setInterval(() => {
                if(currentPage !== 4) { clearInterval(spawner); return; } // Stop if page changed
                
                const bug = document.createElement('div');
                bug.className = 'creature';
                bug.textContent = bugs[Math.floor(Math.random() * bugs.length)];
                bug.style.left = Math.random() * 80 + 10 + '%';
                bug.style.top = '110%';
                bug.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                // Animate upwards
                let pos = 100;
                const mover = setInterval(() => {
                    pos -= 0.5;
                    bug.style.top = pos + '%';
                    if(pos < -10) {
                        bug.remove();
                        clearInterval(mover);
                    }
                }, 20);

                bug.onclick = () => {
                    bug.textContent = '✨';
                    bug.style.transform = 'scale(1.5)';
                    setTimeout(() => bug.remove(), 300);
                    showFeedback("Sorted!");
                };

                container.appendChild(bug);
            }, 800);

            gameLayer.appendChild(container);
        }

        function initEnd() {
            const el = document.createElement('div');
            el.className = 'text-center';
            el.innerHTML = `
                <div style="font-size: 5rem; animation: spinSlow 10s infinite linear;">🌍</div>
                <h2 class="text-xl font-bold text-white mt-4">The End</h2>
                <p class="text-white/80">Thank you for reading!</p>
            `;
            gameLayer.appendChild(el);
        }

        // Utility: Simple Confetti
        function confettiEffect(element) {
            for(let i=0; i<10; i++) {
                const c = document.createElement('div');
                c.style.position = 'absolute';
                c.style.width = '8px';
                c.style.height = '8px';
                c.style.background = ['#f00', '#0f0', '#00f', '#ff0'][Math.floor(Math.random()*4)];
                c.style.left = element.offsetLeft + 20 + 'px';
                c.style.top = element.offsetTop + 'px';
                c.style.transition = 'all 0.5s';
                document.body.appendChild(c);
                
                setTimeout(() => {
                    c.style.transform = `translate(${Math.random()*100-50}px, ${Math.random()*100-50}px)`;
                    c.style.opacity = 0;
                }, 10);
                setTimeout(() => c.remove(), 500);
            }
        }

        // Start
        init();

    </script>
</body>
</html>
