<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Desk: Canine Chaos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #050505;
            color: #33ff00;
            font-family: 'VT323', monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Neon Glow Effects */
        .neon-text {
            text-shadow: 0 0 5px #33ff00, 0 0 10px #33ff00;
        }
        .neon-box {
            box-shadow: 0 0 10px #33ff00, inset 0 0 10px #33ff00;
            border: 2px solid #33ff00;
        }
        .monitor-glow {
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.5);
        }

        /* Room Lighting Simulation */
        .room-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 10%, rgba(51, 255, 0, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Game Elements */
        .entity {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 20;
        }
        .entity:active {
            transform: scale(0.9);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .dog-anim {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-hard {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
        }

        /* Custom Scrollbar for aesthetic */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #33ff00; }

        .mirror-reflection {
            transform: scaleX(-1);
            opacity: 0.3;
            filter: blur(2px);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative">

    <!-- Ambient Green Light Overlay -->
    <div class="room-light"></div>

    <!-- HUD -->
    <div class="absolute top-4 left-4 z-50 bg-black/80 p-4 border border-[#33ff00] rounded neon-box w-64">
        <h1 class="text-2xl font-bold mb-2 neon-text">DESK DEFENDER</h1>
        <div class="flex justify-between mb-1">
            <span>CHAOS:</span>
            <span id="chaos-val">0%</span>
        </div>
        <div class="w-full bg-gray-900 h-4 border border-[#33ff00] mb-4">
            <div id="chaos-bar" class="h-full bg-[#33ff00] transition-all duration-200" style="width: 0%"></div>
        </div>
        <div class="flex justify-between">
            <span>SCORE:</span>
            <span id="score-val">0</span>
        </div>
        <div class="text-xs mt-2 text-gray-400">
            <p>1. Click items to clean clutter.</p>
            <p>2. Click dogs to calm them.</p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="hidden absolute inset-0 z-[100] bg-black/90 flex flex-col items-center justify-center">
        <h1 class="text-6xl text-red-500 font-bold mb-4 neon-text">SYSTEM CRASH</h1>
        <p class="text-2xl text-[#33ff00] mb-8">The dogs took over the workstation.</p>
        <p class="text-xl text-white mb-8">Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()" class="px-8 py-4 bg-[#33ff00] text-black font-bold text-xl hover:bg-white transition-colors">REBOOT SYSTEM</button>
    </div>

    <!-- The "Room" -->
    <div class="relative flex-1 w-full h-full flex items-end justify-center pb-0 perspective-1000">
        
        <!-- Background Wall Elements -->
        <div class="absolute top-10 right-10 w-1/3 h-2/3 border-4 border-yellow-600 bg-gray-900/50 z-0">
            <!-- The Mirror -->
            <div class="w-full h-full relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-transparent to-white/10 pointer-events-none"></div>
                <!-- Reflection of the room (simplified) -->
                <div class="absolute bottom-0 left-0 w-full h-1/2 bg-green-900/20 blur-md"></div>
            </div>
        </div>

        <!-- LED Strip -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-500 via-green-300 to-green-500 shadow-[0_0_20px_#33ff00]"></div>

        <!-- The Desk Surface -->
        <div class="relative w-full max-w-6xl h-[40vh] bg-[#1a1a1a] border-t-8 border-[#4a3b2a] flex items-end justify-center shadow-2xl z-10">
            
            <!-- Left Monitor (The Laptop/Screen) -->
            <div class="absolute bottom-20 left-10 md:left-32 w-64 h-40 bg-gray-800 border-4 border-gray-600 rounded-t-lg monitor-glow flex items-center justify-center overflow-hidden">
                <div class="w-full h-full bg-gradient-to-b from-blue-900 to-blue-600 flex flex-col items-center justify-center text-blue-200">
                    <div class="text-3xl font-bold" id="clock">11:24</div>
                    <div class="text-xs mt-1">Monday, March 9</div>
                    <div class="text-[8px] mt-4 animate-pulse">System Stable...</div>
                </div>
            </div>

            <!-- Keyboard -->
            <div class="absolute bottom-4 left-1/3 w-64 h-8 bg-gray-800 border-b-4 border-gray-900 transform skew-x-12 rounded flex justify-center items-center">
                <div class="flex gap-1">
                    <div class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></div>
                    <div class="w-1 h-1 bg-green-500 rounded-full animate-pulse delay-75"></div>
                    <div class="w-1 h-1 bg-green-500 rounded-full animate-pulse delay-150"></div>
                </div>
            </div>

            <!-- Speaker -->
            <div class="absolute bottom-32 left-4 w-24 h-32 bg-gray-900 border-2 border-gray-700 rounded-lg flex flex-col items-center justify-center">
                <div class="w-16 h-16 rounded-full border-4 border-gray-600 bg-black relative">
                    <div class="absolute inset-0 m-auto w-8 h-8 rounded-full bg-gray-800"></div>
                </div>
            </div>

            <!-- Right Shelf/Structure -->
            <div class="absolute bottom-0 right-0 w-64 h-full bg-[#2a1b0a] border-l-4 border-[#1a0b00] flex flex-col justify-end p-4">
                <div class="w-full h-12 bg-orange-900/50 mb-4 rounded border border-orange-800"></div>
                <div class="w-full h-12 bg-orange-900/50 mb-4 rounded border border-orange-800"></div>
            </div>

            <!-- Play Area for Clutter -->
            <div id="desk-surface" class="absolute inset-0 overflow-hidden">
                <!-- Clutter spawns here -->
            </div>

            <!-- DOG 1: The Climber (Left) -->
            <div id="dog-left" class="absolute bottom-[180px] left-[50px] text-[80px] dog-anim cursor-pointer z-30 select-none transition-transform" onclick="petDog('left')">
                🐕
                <div id="dog-left-status" class="absolute -top-4 left-0 w-full text-center text-sm text-white bg-black/50 rounded hidden">Good Boy!</div>
            </div>

            <!-- DOG 2: The Looker (Right) -->
            <div id="dog-right" class="absolute bottom-[50px] right-[200px] text-[90px] dog-anim cursor-pointer z-30 select-none transition-transform scale-x-[-1]" style="animation-delay: 1s;" onclick="petDog('right')">
                🐩
                <div id="dog-right-status" class="absolute -top-4 left-0 w-full text-center text-sm text-white bg-black/50 rounded hidden transform scale-x-[-1]">Good Girl!</div>
            </div>

        </div>
    </div>

    <script>
        // Game State
        let score = 0;
        let chaos = 0;
        let gameActive = true;
        let difficultyMultiplier = 1;
        
        // Dog States
        const dogs = {
            left: { calm: false, timer: null, el: document.getElementById('dog-left') },
            right: { calm: false, timer: null, el: document.getElementById('dog-right') }
        };

        // Assets
        const clutterEmojis = ['🥤', '💊', '📦', '🔌', '🕶️', '🖱️', '📱', '🗞️', '🔦', '🎧', '🎮', '🍟'];
        const barkTexts = ['WOOF!', 'BARK!', '*crash*', '*thump*'];

        // DOM Elements
        const chaosBar = document.getElementById('chaos-bar');
        const chaosVal = document.getElementById('chaos-val');
        const scoreVal = document.getElementById('score-val');
        const deskSurface = document.getElementById('desk-surface');
        const clockEl = document.getElementById('clock');

        // Clock Logic
        setInterval(() => {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // Game Loop
        function startGame() {
            // Chaos increase loop
            setInterval(() => {
                if (!gameActive) return;
                
                // Base chaos increase
                let increase = 0.5 * difficultyMultiplier;
                
                // Dogs add chaos if not calm
                if (!dogs.left.calm) increase += 0.5;
                if (!dogs.right.calm) increase += 0.5;

                updateChaos(increase);
                difficultyMultiplier += 0.001; // Slowly gets harder

            }, 100);

            // Spawner Loop
            setInterval(() => {
                if (!gameActive) return;
                
                // Chance to spawn item based on chaos
                // Higher chaos = more items
                const spawnChance = 0.3 + (chaos / 100); 
                
                if (Math.random() < spawnChance) {
                    // Pick a dog to cause trouble
                    const sourceDog = Math.random() > 0.5 ? 'left' : 'right';
                    if (!dogs[sourceDog].calm) {
                        spawnClutter(sourceDog);
                        dogBark(sourceDog);
                    }
                }
            }, 1500);
        }

        function updateChaos(amount) {
            chaos = Math.min(100, Math.max(0, chaos + amount));
            chaosBar.style.width = `${chaos}%`;
            chaosVal.innerText = `${Math.floor(chaos)}%`;
            
            // Visual feedback on chaos bar color
            if (chaos < 50) chaosBar.style.backgroundColor = '#33ff00';
            else if (chaos < 80) chaosBar.style.backgroundColor = '#ffff00';
            else chaosBar.style.backgroundColor = '#ff0000';

            if (chaos >= 100) {
                gameOver();
            }
        }

        function spawnClutter(source) {
            const item = document.createElement('div');
            item.className = 'entity text-4xl animate-bounce';
            item.innerText = clutterEmojis[Math.floor(Math.random() * clutterEmojis.length)];
            
            // Random position on desk
            // Desk is roughly 0% to 100% width, bottom aligned
            const x = Math.random() * 80 + 10; // 10% to 90% width
            const y = Math.random() * 30; // 0 to 30% from bottom
            
            item.style.left = `${x}%`;
            item.style.bottom = `${y}%`;
            
            // Random rotation
            const rot = Math.random() * 360;
            item.style.transform = `rotate(${rot}deg)`;

            item.onclick = (e) => {
                e.stopPropagation();
                cleanItem(item);
            };

            deskSurface.appendChild(item);
            
            // Chaos jumps up slightly when item appears
            updateChaos(2);
        }

        function cleanItem(el) {
            if (!gameActive) return;
            
            // Create particle effect (simple text fade up)
            const floatText = document.createElement('div');
            floatText.innerText = "+10";
            floatText.className = 'absolute text-[#33ff00] font-bold text-xl pointer-events-none';
            floatText.style.left = el.style.left;
            floatText.style.bottom = el.style.bottom;
            floatText.style.transition = "all 0.5s";
            deskSurface.appendChild(floatText);
            
            setTimeout(() => {
                floatText.style.transform = "translateY(-50px)";
                floatText.style.opacity = "0";
            }, 10);
            setTimeout(() => floatText.remove(), 500);

            el.remove();
            score += 10;
            scoreVal.innerText = score;
            updateChaos(-5); // Cleaning reduces chaos
        }

        function dogBark(side) {
            const dogEl = dogs[side].el;
            
            // Shake animation
            dogEl.classList.add('shake-hard');
            setTimeout(() => dogEl.classList.remove('shake-hard'), 500);

            // Bark bubble
            const bubble = document.createElement('div');
            bubble.innerText = barkTexts[Math.floor(Math.random() * barkTexts.length)];
            bubble.className = 'absolute -top-10 left-0 bg-white text-black px-2 py-1 rounded text-sm font-bold z-40 whitespace-nowrap';
            if(side === 'right') bubble.style.transform = "scaleX(-1)"; // Fix text for flipped dog
            
            dogEl.appendChild(bubble);
            setTimeout(() => bubble.remove(), 1000);
        }

        window.petDog = function(side) {
            if (!gameActive) return;
            
            const dog = dogs[side];
            
            // Visual feedback
            const status = document.getElementById(`dog-${side}-status`);
            status.classList.remove('hidden');
            
            // Hearts effect
            const heart = document.createElement('div');
            heart.innerText = "❤️";
            heart.className = 'absolute -top-16 left-4 text-4xl animate-ping pointer-events-none';
            dog.el.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);

            // Logic
            if (!dog.calm) {
                dog.calm = true;
                dog.el.style.filter = "grayscale(0%) drop-shadow(0 0 10px gold)";
                updateChaos(-10); // Big chaos reduction
                score += 50;
                scoreVal.innerText = score;
                
                // Reset calm timer
                if (dog.timer) clearTimeout(dog.timer);
                dog.timer = setTimeout(() => {
                    dog.calm = false;
                    dog.el.style.filter = "none";
                    status.classList.add('hidden');
                }, 3000); // Calm for 3 seconds
            }
        };

        function gameOver() {
            gameActive = false;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        // Start
        startGame();

    </script>
</body>
</html>
