<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector 9 Hangar Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #ff9000;
            --primary-dim: #b86600;
            --accent: #00f2ff;
            --bg-dark: #050505;
            --bg-panel: rgba(10, 10, 12, 0.85);
            --grid-color: rgba(255, 144, 0, 0.1);
            --fog-density: 0.6;
            --light-intensity: 1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* --- SCENE BACKGROUND (CSS ART) --- */
        .scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 50% -20%, #1a1a1a, #000000);
        }

        /* The Planet */
        .planet {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 60vh;
            height: 60vh;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #444, #000);
            box-shadow: inset -20px -20px 100px rgba(0,0,0,0.9), 0 0 50px rgba(255, 144, 0, 0.1);
            opacity: 0.4;
            z-index: 1;
        }

        /* Fog Layers */
        .fog {
            position: absolute;
            width: 200%;
            height: 100%;
            background: linear-gradient(to top, rgba(255, 144, 0, 0.1), transparent);
            opacity: var(--fog-density);
            animation: drift 60s linear infinite;
            z-index: 2;
            pointer-events: none;
        }
        .fog-2 {
            background: linear-gradient(to right, rgba(0, 242, 255, 0.05), transparent);
            animation: drift 80s linear infinite reverse;
            z-index: 2;
        }

        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Industrial Structures */
        .structure {
            position: absolute;
            background: #0f0f11;
            z-index: 3;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        .wall-left {
            top: 0; left: 0; width: 25%; height: 100%;
            clip-path: polygon(0 0, 100% 0, 80% 20%, 80% 100%, 0 100%);
            background: linear-gradient(90deg, #050505, #151515);
        }
        
        .wall-right {
            top: 0; right: 0; width: 25%; height: 100%;
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 20% 100%, 0 20%);
            background: linear-gradient(-90deg, #050505, #151515);
        }

        .floor {
            bottom: 0; left: 0; width: 100%; height: 30%;
            background: linear-gradient(to bottom, #111, #050505);
            perspective: 1000px;
            transform-style: preserve-3d;
            z-index: 3;
            border-top: 2px solid var(--primary-dim);
        }

        .floor-grid {
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) scale(2);
            transform-origin: top center;
            opacity: 0.3;
        }

        /* The Ship (Abstract Shapes) */
        .ship-container {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 150px;
            z-index: 10;
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ship-body {
            width: 100%; height: 100%;
            background: #222;
            clip-path: polygon(10% 40%, 30% 0, 70% 0, 90% 40%, 100% 60%, 80% 100%, 20% 100%, 0 60%);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        
        .ship-window {
            position: absolute;
            top: 20%; left: 35%; width: 30%; height: 15%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            opacity: 0.8;
        }

        .thruster {
            position: absolute;
            bottom: -10px;
            width: 20px;
            height: 40px;
            background: var(--accent);
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .thruster.active { opacity: 1; }

        /* Ambient Lights */
        .light-source {
            position: absolute;
            width: 10px; height: 100px;
            background: var(--primary);
            box-shadow: 0 0 40px 10px var(--primary);
            opacity: var(--light-intensity);
            transition: opacity 0.3s;
        }

        /* --- UI OVERLAY --- */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 80px 1fr 200px;
            padding: 20px;
            gap: 20px;
            pointer-events: none; /* Let clicks pass through to scene if needed, but we'll enable pointer events on panels */
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--primary-dim);
            backdrop-filter: blur(5px);
            padding: 15px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        
        /* Decorative corners */
        .panel::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px;
            border-top: 2px solid var(--primary); border-left: 2px solid var(--primary);
        }
        .panel::after {
            content: ''; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px;
            border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary);
        }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--primary-dim);
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
        }

        /* Controls */
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px; height: 15px;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }

        button.action-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            width: 100%;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
        }
        button.action-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }
        
        button.danger-btn {
            border-color: #ff3333;
            color: #ff3333;
        }
        button.danger-btn:hover {
            background: #ff3333;
            color: #fff;
            box-shadow: 0 0 20px #ff3333;
        }

        /* Terminal */
        .terminal-output {
            flex: 1;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #aaa;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #111;
        }
        .log-entry { margin-bottom: 4px; }
        .log-warn { color: var(--primary); }
        .log-err { color: #ff3333; }
        .log-success { color: var(--accent); }

        /* Scanlines Overlay */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        /* Animations */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .blink { animation: blink 2s infinite; }

        /* Launch Animation Class */
        .launching {
            animation: launchShip 5s forwards ease-in;
        }
        @keyframes launchShip {
            0% { transform: translateX(-50%) translateY(0); }
            10% { transform: translateX(-50%) translateY(5px); } /* Rumble */
            20% { transform: translateX(-50%) translateY(-5px); }
            30% { transform: translateX(-50%) translateY(5px); }
            100% { transform: translateX(-50%) translateY(-200vh); }
        }

        /* Responsive adjustments */
        @media (max-width: 1000px) {
            .ui-layer {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                overflow-y: auto;
                pointer-events: auto;
            }
            .scene-container { position: fixed; }
        }
    </style>
</head>
<body>

    <!-- Visual Scene (Background) -->
    <div class="scene-container">
        <div class="planet"></div>
        <div class="fog"></div>
        <div class="fog-2"></div>
        
        <!-- Structure Walls -->
        <div class="structure wall-left">
            <!-- Lights on wall -->
            <div class="light-source" style="top: 20%; right: -5px;"></div>
            <div class="light-source" style="top: 50%; right: -5px;"></div>
        </div>
        <div class="structure wall-right">
            <div class="light-source" style="top: 30%; left: -5px;"></div>
            <div class="light-source" style="top: 60%; left: -5px;"></div>
        </div>

        <!-- Floor -->
        <div class="floor">
            <div class="floor-grid"></div>
        </div>

        <!-- The Ship -->
        <div class="ship-container" id="ship">
            <div class="ship-body">
                <div class="ship-window"></div>
            </div>
            <div class="thruster" style="left: 20%;"></div>
            <div class="thruster" style="right: 20%;"></div>
        </div>
    </div>

    <!-- UI Overlay -->
    <div class="ui-layer">
        
        <!-- Header -->
        <div class="panel" style="grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between;">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 bg-orange-500 rounded-full animate-pulse box-shadow-glow"></div>
                <div>
                    <h1 class="text-2xl font-bold tracking-widest text-white">SECTOR 9 HANGAR</h1>
                    <div class="text-xs text-orange-400">SYS.VER.4.9.2 // ONLINE</div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-4xl font-mono" id="clock">00:00:00</div>
                <div class="text-xs text-cyan-400">LOCAL TIME</div>
            </div>
        </div>

        <!-- Left Panel: Ship Status -->
        <div class="panel" style="grid-row: 2 / 4;">
            <h2>Ship Diagnostics</h2>
            
            <div class="mb-6 text-center relative h-32 border border-gray-800 bg-black/50 flex items-center justify-center">
                <!-- SVG Abstract Ship Wireframe -->
                <svg viewBox="0 0 100 60" class="w-full h-full p-4 stroke-orange-500 fill-none" style="stroke-width: 1;">
                    <path d="M10,40 L30,10 L70,10 L90,40 L80,50 L20,50 Z" />
                    <line x1="30" y1="10" x2="20" y2="50" />
                    <line x1="70" y1="10" x2="80" y2="50" />
                    <rect x="40" y="20" width="20" height="10" stroke="cyan" />
                </svg>
                <div class="absolute top-2 right-2 text-xs text-green-500">READY</div>
            </div>

            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>HULL INTEGRITY</span>
                        <span class="text-cyan-400">100%</span>
                    </div>
                    <div class="w-full h-2 bg-gray-800">
                        <div class="h-full bg-cyan-400 w-full shadow-[0_0_10px_cyan]"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>FUEL CELLS</span>
                        <span class="text-orange-500" id="fuel-val">87%</span>
                    </div>
                    <div class="w-full h-2 bg-gray-800">
                        <div class="h-full bg-orange-500 w-[87%] shadow-[0_0_10px_orange]" id="fuel-bar"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>THRUSTER TEMP</span>
                        <span class="text-red-500" id="temp-val">340K</span>
                    </div>
                    <div class="w-full h-2 bg-gray-800">
                        <div class="h-full bg-red-500 w-[20%] shadow-[0_0_10px_red]" id="temp-bar"></div>
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-4 border-t border-gray-800">
                <button class="action-btn mb-2" onclick="refuel()">Refuel</button>
                <button class="action-btn" onclick="runDiagnostics()">Scan Systems</button>
            </div>
        </div>

        <!-- Middle Spacer (Empty for view) -->
        <div style="grid-row: 2 / 4;"></div>

        <!-- Right Panel: Environment -->
        <div class="panel" style="grid-row: 2 / 3;">
            <h2>Atmosphere Control</h2>
            
            <div class="control-group">
                <label>LIGHTING INTENSITY</label>
                <input type="range" min="0" max="1" step="0.1" value="1" oninput="updateLight(this.value)">
            </div>
            
            <div class="control-group">
                <label>FOG DENSITY</label>
                <input type="range" min="0" max="1" step="0.1" value="0.6" oninput="updateFog(this.value)">
            </div>

            <div class="control-group">
                <label>GRAVITY GENERATOR</label>
                <div class="flex gap-2">
                    <button class="action-btn text-xs" onclick="log('Gravity set to 0.5G', 'warn')">0.5G</button>
                    <button class="action-btn text-xs bg-orange-500 text-black" onclick="log('Gravity set to 1.0G', 'success')">1.0G</button>
                    <button class="action-btn text-xs" onclick="log('Gravity set to 1.5G', 'warn')">1.5G</button>
                </div>
            </div>

            <div class="mt-8 p-4 border border-orange-900 bg-orange-900/20">
                <div class="text-xs text-orange-500 mb-2 blink">⚠ RESTRICTED ACCESS</div>
                <button class="action-btn danger-btn" id="launch-btn" onclick="initiateLaunch()">INITIATE LAUNCH</button>
            </div>
        </div>

        <!-- Bottom Right: Terminal -->
        <div class="panel" style="grid-row: 3 / 4;">
            <h2>System Log</h2>
            <div class="terminal-output" id="terminal">
                <div class="log-entry">> System initialized...</div>
                <div class="log-entry">> Connection established with Sector 9.</div>
                <div class="log-entry log-success">> Life support: NOMINAL</div>
            </div>
        </div>

    </div>

    <div class="scanlines"></div>

    <script>
        // --- UTILS ---
        const terminal = document.getElementById('terminal');
        const ship = document.getElementById('ship');
        const launchBtn = document.getElementById('launch-btn');
        
        function log(msg, type = 'normal') {
            const div = document.createElement('div');
            div.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString('en-GB', { hour12: false });
            
            if (type === 'warn') div.classList.add('log-warn');
            if (type === 'err') div.classList.add('log-err');
            if (type === 'success') div.classList.add('log-success');
            
            div.innerText = `[${timestamp}] > ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // --- CLOCK ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }, 1000);

        // --- INTERACTIVITY ---

        function updateLight(val) {
            document.documentElement.style.setProperty('--light-intensity', val);
            // Also change primary color slightly based on intensity
            if(val < 0.3) {
                document.documentElement.style.setProperty('--primary', '#ff5500');
                log('Lighting switched to EMERGENCY MODE', 'err');
            } else {
                document.documentElement.style.setProperty('--primary', '#ff9000');
            }
        }

        function updateFog(val) {
            document.documentElement.style.setProperty('--fog-density', val);
            log(`Fog density adjusted to ${Math.round(val * 100)}%`);
        }

        function refuel() {
            const bar = document.getElementById('fuel-bar');
            const val = document.getElementById('fuel-val');
            let current = parseInt(val.innerText);
            
            log('Refueling sequence started...', 'warn');
            
            const interval = setInterval(() => {
                if(current >= 100) {
                    clearInterval(interval);
                    log('Refueling complete.', 'success');
                    return;
                }
                current++;
                val.innerText = current + '%';
                bar.style.width = current + '%';
            }, 50);
        }

        function runDiagnostics() {
            log('Running full system scan...', 'normal');
            const systems = ['Navigation', 'Life Support', 'Hyperdrive', 'Shields', 'Comms'];
            let i = 0;
            
            const interval = setInterval(() => {
                if(i >= systems.length) {
                    clearInterval(interval);
                    log('Scan complete. All systems GREEN.', 'success');
                    return;
                }
                log(`Scanning ${systems[i]}... OK`, 'success');
                i++;
            }, 600);
        }

        let isLaunched = false;

        function initiateLaunch() {
            if(isLaunched) return;
            
            const fuel = parseInt(document.getElementById('fuel-val').innerText);
            if(fuel < 20) {
                log('ERROR: INSUFFICIENT FUEL FOR LAUNCH', 'err');
                return;
            }

            if(!confirm("CONFIRM LAUNCH SEQUENCE? This action cannot be undone.")) return;

            isLaunched = true;
            launchBtn.disabled = true;
            launchBtn.innerText = "LAUNCHING...";
            
            log('LAUNCH SEQUENCE INITIATED', 'warn');
            log('Retracting umbilicals...', 'normal');
            
            // Visual FX sequence
            setTimeout(() => {
                log('Thrusters igniting...', 'warn');
                document.querySelectorAll('.thruster').forEach(t => t.classList.add('active'));
                
                // Increase temp
                document.getElementById('temp-val').innerText = "850K";
                document.getElementById('temp-bar').style.width = "80%";
                document.getElementById('temp-bar').classList.add('blink');
            }, 1000);

            setTimeout(() => {
                log('Release clamps.', 'normal');
                ship.classList.add('launching');
            }, 2500);

            setTimeout(() => {
                log('Ship has cleared the tower.', 'success');
                log('Orbit achieved.', 'success');
                launchBtn.innerText = "LAUNCHED";
                launchBtn.classList.remove('danger-btn');
                launchBtn.style.borderColor = 'var(--accent)';
                launchBtn.style.color = 'var(--accent)';
            }, 7500);
        }

        // --- RANDOM AMBIENT LOGS ---
        setInterval(() => {
            if(Math.random() > 0.8) {
                const msgs = [
                    "Atmospheric pressure stabilizing.",
                    "Incoming transmission blocked.",
                    "Sector 7 reporting minor fluctuations.",
                    "Maintenance drone #42 returning to dock.",
                    "Scanning perimeter..."
                ];
                log(msgs[Math.floor(Math.random() * msgs.length)]);
            }
        }, 8000);

    </script>
</body>
</html>
