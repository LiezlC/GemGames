<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Serpent: Data Eater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-orange: #ff4d00;
            --bg-dark: #050510;
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        /* Background Matrix Effect */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.3;
        }

        /* Game Container */
        #game-container {
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            background: rgba(5, 5, 16, 0.8);
            backdrop-filter: blur(10px);
        }

        canvas#game-canvas {
            display: block;
            border-radius: 6px;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .start-screen, .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            box-shadow: 0 0 30px var(--neon-blue);
            pointer-events: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 300px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(90deg, var(--neon-blue), #fff, var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glitch 3s infinite;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 24px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .hidden {
            display: none !important;
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--neon-pink), -2px -2px var(--neon-orange); }
            20% { text-shadow: -2px -2px var(--neon-pink), 2px 2px var(--neon-orange); }
            40% { text-shadow: none; }
            100% { text-shadow: none; }
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        .controls-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        /* Mobile Controls */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
            z-index: 30;
        }
        @media (max-width: 768px) {
            .mobile-controls { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; }
            .m-btn { width: 60px; height: 60px; background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; active: background: var(--neon-blue); }
            .m-up { grid-column: 2; grid-row: 1; }
            .m-left { grid-column: 1; grid-row: 2; }
            .m-down { grid-column: 2; grid-row: 2; }
            .m-right { grid-column: 3; grid-row: 2; }
        }
    </style>
</head>
<body>

    <!-- Background Matrix Rain -->
    <canvas id="bg-canvas"></canvas>

    <!-- CRT Scanlines -->
    <div class="scanlines"></div>

    <!-- Game Area -->
    <div id="game-container">
        <canvas id="game-canvas" width="600" height="600"></canvas>
        
        <div class="ui-layer">
            <div class="hud-top">
                <div>SCORE: <span id="score">0</span></div>
                <div>HIGH: <span id="high-score">0</span></div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="start-screen">
            <h1>CYBER SERPENT</h1>
            <p>The Data Snake hungers for glitches.</p>
            <p>Eat the <span style="color:var(--neon-orange)">Data Goats 🐐</span> to grow.</p>
            <p>Avoid the <span style="color:var(--neon-pink)">Firewalls 🧱</span>.</p>
            <button class="btn" onclick="startGame()">INITIALIZE</button>
            <div class="controls-hint">Use Arrow Keys or WASD</div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="game-over-screen hidden">
            <h1 style="color: var(--neon-orange)">SYSTEM FAILURE</h1>
            <p>Data Stream Corrupted</p>
            <p>Final Score: <span id="final-score">0</span></p>
            <button class="btn" onclick="resetGame()">REBOOT SYSTEM</button>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div class="mobile-controls">
        <div class="m-btn m-up" onclick="handleMobileInput('up')">▲</div>
        <div class="m-btn m-left" onclick="handleMobileInput('left')">◀</div>
        <div class="m-btn m-down" onclick="handleMobileInput('down')">▼</div>
        <div class="m-btn m-right" onclick="handleMobileInput('right')">▶</div>
    </div>

    <script>
        /* --- VISUALS: Background Matrix Rain --- */
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        
        let width, height;
        let columns;
        let drops = [];

        function resizeBg() {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
            columns = Math.floor(width / 20);
            drops = Array(columns).fill(1);
        }

        window.addEventListener('resize', resizeBg);
        resizeBg();

        function drawMatrix() {
            bgCtx.fillStyle = 'rgba(5, 5, 16, 0.1)'; // Fade effect
            bgCtx.fillRect(0, 0, width, height);

            bgCtx.fillStyle = '#00f3ff'; // Text color
            bgCtx.font = '15px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96); // Matrix chars
                // Randomly draw numbers to match the input image theme
                const char = Math.random() > 0.8 ? Math.floor(Math.random()*10) : text;
                
                bgCtx.fillText(char, i * 20, drops[i] * 20);

                if (drops[i] * 20 > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }
        drawMatrix();


        /* --- GAME LOGIC: Cyber Snake --- */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize; // 30x30 grid

        let score = 0;
        let highScore = localStorage.getItem('cyberSnakeHighScore') || 0;
        document.getElementById('high-score').innerText = highScore;

        let velocity = { x: 0, y: 0 };
        let snake = [];
        let food = { x: 15, y: 15 };
        let particles = [];
        let gameInterval;
        let isGameRunning = false;
        let gameSpeed = 100;

        // Initialize Snake
        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            velocity = { x: 1, y: 0 };
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            score = 0;
            document.getElementById('score').innerText = score;
            initSnake();
            spawnFood();
            isGameRunning = true;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        function resetGame() {
            startGame();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('cyberSnakeHighScore', highScore);
                document.getElementById('high-score').innerText = highScore;
            }
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Ensure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                }
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x * gridSize + gridSize/2,
                    y: y * gridSize + gridSize/2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1.0,
                    color: color
                });
            }
        }

        function update() {
            // Move Snake
            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            // Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self Collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Eat Food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                createParticles(food.x, food.y, '#ff4d00'); // Orange explosion
                spawnFood();
                // Speed up slightly
                if (gameSpeed > 50) {
                    clearInterval(gameInterval);
                    gameSpeed -= 1;
                    gameInterval = setInterval(gameLoop, gameSpeed);
                }
            } else {
                snake.pop();
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= 0.05;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Clear Canvas
            ctx.fillStyle = 'rgba(5, 5, 16, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid (Subtle)
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw Food (Goat Emoji + Glow)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff4d00';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Using a Goat emoji as requested by the image analysis
            ctx.fillText('🐐', food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2);
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((segment, index) => {
                // Head
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00f3ff';
                } 
                // Body
                else {
                    // Gradient effect based on index
                    const alpha = 1 - (index / snake.length);
                    ctx.fillStyle = `rgba(0, 243, 255, ${Math.max(0.3, alpha)})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00f3ff';
                }

                // Draw segment as a "circuit" block
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
                
                // Draw "code" inside the snake segments if large enough
                if (index < 5) {
                    ctx.fillStyle = '#000';
                    ctx.font = '10px monospace';
                    ctx.fillText(index % 2 === 0 ? '1' : '0', segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2 + 1);
                }
            });
            ctx.shadowBlur = 0;

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 77, 0, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            if (!isGameRunning) return;
            update();
            draw();
        }

        // Input Handling
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            switch(e.key) {
                case 'ArrowUp': case 'w':
                    if (velocity.y === 0) velocity = { x: 0, y: -1 };
                    break;
                case 'ArrowDown': case 's':
                    if (velocity.y === 0) velocity = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft': case 'a':
                    if (velocity.x === 0) velocity = { x: -1, y: 0 };
                    break;
                case 'ArrowRight': case 'd':
                    if (velocity.x === 0) velocity = { x: 1, y: 0 };
                    break;
            }
        });

        function handleMobileInput(dir) {
            if (!isGameRunning) return;
            switch(dir) {
                case 'up': if (velocity.y === 0) velocity = { x: 0, y: -1 }; break;
                case 'down': if (velocity.y === 0) velocity = { x: 0, y: 1 }; break;
                case 'left': if (velocity.x === 0) velocity = { x: -1, y: 0 }; break;
                case 'right': if (velocity.x === 0) velocity = { x: 1, y: 0 }; break;
            }
        }

        // Initial Draw
        draw();

    </script>
</body>
</html>
