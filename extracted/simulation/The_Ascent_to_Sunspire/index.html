<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascent to Sunspire</title>
    <style>
        :root {
            --bg-sky: #e0e4e8;
            --bg-sunset: #f4a261;
            --mountain-dark: #1a1a1a;
            --mountain-mid: #2d3436;
            --gold-path: #ffb703;
            --gold-glow: #fb8500;
            --text-color: #ecf0f1;
            --ui-bg: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(to bottom, var(--bg-sky) 0%, #dcdcdc 30%, var(--bg-sunset) 60%, #264653 100%);
            color: var(--text-color);
            user-select: none;
        }

        /* --- SCENE LAYERS --- */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        /* Background Clouds/Fog */
        .fog {
            position: absolute;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 200px 200px;
            animation: drift 60s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes drift {
            from { transform: translateX(-50%); }
            to { transform: translateX(0%); }
        }

        /* The Castle (CSS Art) */
        .castle-container {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(255, 165, 0, 0.6));
            transition: transform 0.5s ease;
        }

        .spire {
            position: absolute;
            bottom: 0;
            background: #5e4b35;
            width: 40px;
            height: 100px;
            border-radius: 5px 5px 0 0;
        }
        .spire::after {
            content: '';
            position: absolute;
            top: -40px;
            left: -5px;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #8d2d2d; /* Roof color */
        }

        .spire.main { height: 160px; width: 60px; left: -30px; z-index: 3; background: #6d563d; }
        .spire.main::after { top: -50px; left: -10px; border-width: 40px; border-bottom-color: #a33333; }
        
        .spire.left { height: 100px; left: -90px; z-index: 2; }
        .spire.right { height: 110px; left: 50px; z-index: 2; }

        .castle-window {
            position: absolute;
            top: 30px;
            left: 15px;
            width: 30px;
            height: 30px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffcc00;
            z-index: 4;
        }

        /* The Mountain & Path */
        .mountain-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            z-index: 3;
            pointer-events: none;
        }

        /* SVG for Mountain Shape and Path */
        #mountain-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 -10px 20px rgba(0,0,0,0.5));
        }

        .mountain-shape {
            fill: var(--mountain-dark);
        }

        .golden-path {
            fill: none;
            stroke: url(#goldGradient);
            stroke-width: 15;
            stroke-linecap: round;
            filter: blur(1px);
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000; /* Animated via JS */
            transition: stroke-dashoffset 0.5s ease;
        }

        /* The Hero */
        #hero {
            position: absolute;
            width: 40px;
            height: 60px;
            background: black;
            bottom: 10px; 
            left: 10%; /* Starting position */
            z-index: 10;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); /* Rough cape shape */
            transform: scale(0.8);
            transition: all 0.5s ease;
        }
        #hero::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: black;
            border-radius: 50%; /* Head */
        }

        /* --- UI OVERLAY --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none; /* Let clicks pass through to buttons */
        }

        .hud {
            display: flex;
            gap: 20px;
            background: var(--ui-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: auto;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label { font-size: 10px; color: #aaa; }
        .stat-val { font-size: 18px; font-weight: bold; color: var(--gold-path); }

        .log-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            padding-bottom: 20px;
            max-width: 400px;
        }

        .log-entry {
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            margin-top: 5px;
            border-radius: 4px;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            border-left: 3px solid var(--gold-path);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
            justify-content: center;
            background: var(--ui-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { background: #444; border-color: #777; }
        button:active { transform: translateY(2px); }
        
        button.primary {
            background: linear-gradient(to bottom, #d35400, #a04000);
            border-color: #e67e22;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.4);
        }
        button.primary:hover {
            box-shadow: 0 0 15px rgba(230, 126, 34, 0.6);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Victory Screen */
        #victory-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #victory-screen h1 { color: var(--gold-path); font-size: 3em; margin-bottom: 10px; }
        #victory-screen p { max-width: 600px; line-height: 1.6; }

    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- Background/Atmosphere -->
        <div class="fog"></div>

        <!-- The Castle -->
        <div class="castle-container">
            <div class="spire left"></div>
            <div class="spire right"></div>
            <div class="spire main">
                <div class="castle-window"></div>
            </div>
        </div>

        <!-- Mountain & Path SVG -->
        <div class="mountain-layer">
            <svg id="mountain-svg" viewBox="0 0 800 600" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:rgb(255,255,200);stop-opacity:1" />
                        <stop offset="50%" style="stop-color:rgb(255, 183, 3);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:rgb(255, 140, 0);stop-opacity:0" />
                    </linearGradient>
                </defs>
                <!-- Mountain Silhouette -->
                <path class="mountain-shape" d="M0,600 L0,300 Q150,250 300,400 Q450,100 550,150 L600,100 L800,200 L800,600 Z" />
                <!-- The Golden Path (Winding) -->
                <path id="path-line" class="golden-path" d="M650,600 C600,500 700,450 550,300 C450,200 550,150 500,120" />
            </svg>
        </div>

        <!-- The Hero -->
        <div id="hero"></div>

        <!-- UI Layer -->
        <div id="ui-layer">
            <div class="hud">
                <div class="stat">
                    <span class="stat-label">DISTANCE</span>
                    <span class="stat-val" id="dist-val">0m</span>
                </div>
                <div class="stat">
                    <span class="stat-label">STAMINA</span>
                    <span class="stat-val" id="stamina-val">100%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">WILLPOWER</span>
                    <span class="stat-val" id="will-val">10</span>
                </div>
            </div>

            <div class="log-container" id="log-box">
                <div class="log-entry">The castle looms above. The path is steep.</div>
            </div>

            <div class="controls">
                <button onclick="game.rest()" id="btn-rest">Rest ⛺</button>
                <button onclick="game.scout()" id="btn-scout">Scout 👁️</button>
                <button class="primary" onclick="game.climb()" id="btn-climb">ASCEND 🧗</button>
            </div>
        </div>

        <!-- Victory Overlay -->
        <div id="victory-screen">
            <h1>SUNSPIRE REACHED</h1>
            <p>You stand before the golden gates. The journey was long, but the view is eternal.</p>
            <br>
            <button class="primary" onclick="location.reload()">Journey Again</button>
        </div>

    </div>

    <script>
        class Game {
            constructor() {
                this.distance = 0;
                this.maxDistance = 1000;
                this.stamina = 100;
                this.willpower = 10;
                this.isGameOver = false;
                
                // DOM Elements
                this.hero = document.getElementById('hero');
                this.pathLine = document.getElementById('path-line');
                this.logBox = document.getElementById('log-box');
                
                // Initialize Path Length for animation
                this.pathLength = this.pathLine.getTotalLength();
                this.pathLine.style.strokeDasharray = this.pathLength;
                this.pathLine.style.strokeDashoffset = this.pathLength;

                this.updateUI();
                this.setHeroPosition(0);
            }

            log(msg) {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerText = msg;
                this.logBox.appendChild(div);
                // Keep only last 5 logs
                if (this.logBox.children.length > 5) {
                    this.logBox.removeChild(this.logBox.children[0]);
                }
            }

            updateUI() {
                document.getElementById('dist-val').innerText = Math.floor(this.distance) + 'm';
                document.getElementById('stamina-val').innerText = Math.floor(this.stamina) + '%';
                document.getElementById('will-val').innerText = this.willpower;

                // Visual feedback on buttons
                const climbBtn = document.getElementById('btn-climb');
                if (this.stamina < 10) {
                    climbBtn.disabled = true;
                    climbBtn.innerText = "Too Tired...";
                } else {
                    climbBtn.disabled = false;
                    climbBtn.innerText = "ASCEND 🧗";
                }
            }

            setHeroPosition(progress) {
                // progress is 0 to 1
                const point = this.pathLine.getPointAtLength(this.pathLength * (1 - progress));
                
                // Map SVG coordinates to screen percentage roughly
                // The SVG is 800x600. 
                const xPercent = (point.x / 800) * 100;
                const yPercent = (point.y / 600) * 100;

                // Offset hero to center on path
                this.hero.style.left = `calc(${xPercent}% - 20px)`;
                this.hero.style.top = `calc(${yPercent}% - 60px)`;

                // Fill the path with gold as we go
                this.pathLine.style.strokeDashoffset = this.pathLength * (1 - progress);
                
                // Scale hero down as he gets further away
                const scale = 1 - (progress * 0.6); // Ends at 0.4 scale
                this.hero.style.transform = `scale(${scale})`;
            }

            climb() {
                if (this.isGameOver) return;
                if (this.stamina < 10) {
                    this.log("You are too exhausted to climb. Rest a moment.");
                    return;
                }

                const progress = Math.random() * 40 + 20; // Climb 20-60m
                this.distance += progress;
                this.stamina -= 15;
                
                // Random Event Chance
                if (Math.random() > 0.7) this.triggerEvent();

                this.checkWin();
                this.updateUI();
                
                // Animate
                const pct = Math.min(this.distance / this.maxDistance, 1);
                this.setHeroPosition(pct);
            }

            rest() {
                if (this.isGameOver) return;
                if (this.stamina >= 100) {
                    this.log("You are fully rested.");
                    return;
                }
                this.stamina = Math.min(100, this.stamina + 40);
                this.log("You catch your breath by a rock.");
                this.updateUI();
            }

            scout() {
                if (this.isGameOver) return;
                this.log("You gaze up at the Sunspire. It glows with ancient magic.");
                // Small chance to find something
                if (Math.random() > 0.8) {
                    this.willpower += 1;
                    this.log("You found a hidden shortcut! Willpower +1");
                    this.distance += 20;
                }
                this.updateUI();
            }

            triggerEvent() {
                const events = [
                    { text: "A loose rock tumbles down. You slip!", stam: -10, dist: -10 },
                    { text: "The wind howls, pushing you back.", stam: -5, dist: 0 },
                    { text: "You find an old walking stick.", stam: 10, dist: 0 },
                    { text: "A mountain goat judges you silently.", stam: 0, dist: 0 },
                    { text: "The air grows thin. It's hard to breathe.", stam: -15, dist: 0 }
                ];
                const ev = events[Math.floor(Math.random() * events.length)];
                this.log(ev.text);
                this.stamina += ev.stam;
                this.distance += ev.dist;
                if (this.distance < 0) this.distance = 0;
            }

            checkWin() {
                if (this.distance >= this.maxDistance) {
                    this.distance = this.maxDistance;
                    this.isGameOver = true;
                    this.setHeroPosition(1);
                    setTimeout(() => {
                        document.getElementById('victory-screen').style.display = 'flex';
                    }, 1000);
                }
            }
        }

        const game = new Game();

        // Initial Animation
        setTimeout(() => {
            game.log("The journey begins...");
        }, 500);

    </script>
</body>
</html>
