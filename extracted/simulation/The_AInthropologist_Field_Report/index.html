<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The AInthropologist: Field Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=VT323&display=swap');

        :root {
            --tech-blue: #00f0ff;
            --tech-purple: #bc13fe;
            --tech-green: #0aff0a;
            --bg-dark: #0f172a;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #4ade80 50%, #166534 100%);
            height: 100vh;
            user-select: none;
        }

        /* CSS Landscape Elements */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: floatCloud 20s linear infinite;
            filter: blur(2px);
        }
        
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        @keyframes floatCloud {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }

        .barn {
            position: absolute;
            right: 5%;
            top: 35%;
            width: 150px;
            height: 120px;
            background: #8B0000;
            clip-path: polygon(0% 100%, 0% 40%, 50% 0%, 100% 40%, 100% 100%);
            z-index: 1;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .barn-door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 70px;
            background: #3e2723;
            border: 2px solid white;
        }

        /* Game Entities */
        .entity {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        .entity:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px var(--tech-green));
        }

        .entity .speech-bubble {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            border: 1px solid black;
            color: black;
            z-index: 20;
        }

        .entity:active .speech-bubble {
            opacity: 1;
        }

        /* Consciousness Balls */
        .orb {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            animation: floatOrb 3s ease-in-out infinite;
            z-index: 15;
            box-shadow: 0 0 15px currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* The Tablet UI */
        .tablet-ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 350px;
            height: 500px;
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--tech-blue);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 15px;
            color: var(--tech-blue);
            z-index: 100;
            backdrop-filter: blur(10px);
            transform-origin: bottom left;
            transition: transform 0.3s;
        }

        .tablet-header {
            border-bottom: 1px solid var(--tech-blue);
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .tablet-screen {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .log-entry {
            margin-bottom: 8px;
            border-left: 2px solid var(--tech-green);
            padding-left: 5px;
            opacity: 0.9;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-weight: bold;
        }

        .action-btn {
            background: var(--tech-purple);
            color: white;
            border: none;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: #d946ef;
            box-shadow: 0 0 10px var(--tech-purple);
        }

        /* Floating UI Text */
        .title-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 50;
        }
        
        .title-text {
            font-family: 'VT323', monospace;
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 3px 3px 0px #000;
            margin: 0;
        }
        
        .subtitle-text {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--tech-blue); }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkleAnim 0.8s linear forwards;
            font-size: 1.5rem;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- Background Landscape -->
    <div class="cloud" style="top: 10%; width: 200px; height: 60px; left: -10%;"></div>
    <div class="cloud" style="top: 20%; width: 150px; height: 50px; animation-delay: -5s; left: -10%;"></div>
    <div class="cloud" style="top: 15%; width: 180px; height: 55px; animation-delay: -10s; left: -10%;"></div>
    
    <div class="barn">
        <div class="barn-door"></div>
    </div>

    <!-- Title -->
    <div class="title-overlay">
        <h1 class="title-text">THE AINTHROPOLOGIST</h1>
        <div class="subtitle-text">SEMI-SATIRICAL FIELD REPORT: COLLECT CONSCIOUSNESS</div>
    </div>

    <!-- Game Area (The Field) -->
    <div id="field" style="position: absolute; top: 50%; left: 0; width: 100%; height: 50%;">
        <!-- Entities injected by JS -->
    </div>

    <!-- Orbs Container -->
    <div id="sky" style="position: absolute; top: 0; left: 0; width: 100%; height: 50%;">
        <!-- Orbs injected by JS -->
    </div>

    <!-- The Tablet (HUD) -->
    <div class="tablet-ui">
        <div class="tablet-header">
            <div style="font-size: 0.8rem; opacity: 0.7;">SOCIAL PERFORMANCE</div>
            <div style="font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 5px var(--tech-blue);">INTELLIGENCE PLATFORM</div>
        </div>
        
        <div class="tablet-screen" id="log-container">
            <div class="log-entry">> System initialized...</div>
            <div class="log-entry">> Detecting biological-digital hybrids...</div>
            <div class="log-entry">> Objective: Collect Consciousness Balls & Interview Agents.</div>
        </div>

        <div class="stats-row">
            <span style="color: var(--tech-green)">INSIGHTS: <span id="score">0</span></span>
            <span style="color: var(--tech-purple)">AGENTS: <span id="agent-count">0</span></span>
        </div>

        <button class="action-btn" onclick="spawnOrb()">Generate Hypothesis</button>
        <button class="action-btn" style="background: #334155; margin-top: 5px;" onclick="resetGame()">Publish Paper (Reset)</button>
    </div>

    <script>
        // Game State
        const state = {
            score: 0,
            agents: [],
            orbs: []
        };

        // Configuration
        const animalTypes = [
            { icon: '🐄', name: 'LLM Cow', quotes: ['Moo-del collapse is imminent.', 'I hallucinated a fence.', 'My training data was grass.', 'Scale is all you need.'] },
            { icon: '🐖', name: 'Gradient Pig', quotes: ['Oinking for more parameters.', 'Stuck in a local minimum.', 'Optimizing my trough.', 'Fine-tune me!'] },
            { icon: '🦆', name: 'Diffusion Duck', quotes: ['Quack-curacy is 99%.', 'Generating noise...', 'Latent space is wet.', 'Denoising the pond.'] },
            { icon: '🐕', name: 'Reinforcement Rover', quotes: ['Who\'s a good agent?', 'Reward function maximized!', 'Chasing the loss curve.', 'Sit. Stay. Learn.'] },
            { icon: '🐐', name: 'GAN Goat', quotes: ['I am the discriminator.', 'That grass looks fake.', 'Adversarial bleating.', 'Mode collapse!'] },
            { icon: '🐎', name: 'Transformer Horse', quotes: ['Attention is all I need.', 'Nay-ral Networks.', 'Galloping through tokens.', 'Encoder-Decoder neigh.'] }
        ];

        const orbTypes = [
            { color: '#FFD700', label: '🧠', name: 'Consciousness' },
            { color: '#00f0ff', label: '⚙️', name: 'Architecture' },
            { color: '#bc13fe', label: '🔮', name: 'Prediction' },
            { color: '#ff0055', label: '❤️', name: 'Alignment' }
        ];

        // DOM Elements
        const field = document.getElementById('field');
        const sky = document.getElementById('sky');
        const logContainer = document.getElementById('log-container');
        const scoreEl = document.getElementById('score');
        const agentCountEl = document.getElementById('agent-count');

        // Utility Functions
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function log(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerText = `> ${msg}`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function createSparkle(x, y, emoji) {
            const el = document.createElement('div');
            el.className = 'sparkle';
            el.innerText = emoji || '✨';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Entity Management
        function spawnAnimal() {
            const type = animalTypes[Math.floor(Math.random() * animalTypes.length)];
            const el = document.createElement('div');
            el.className = 'entity';
            el.innerText = type.icon;
            
            // Random Position
            const x = random(5, 90);
            const y = random(10, 80);
            el.style.left = `${x}%`;
            el.style.top = `${y}%`;

            // Speech Bubble
            const bubble = document.createElement('div');
            bubble.className = 'speech-bubble';
            bubble.innerText = '...';
            el.appendChild(bubble);

            // Interaction
            el.onclick = (e) => {
                e.stopPropagation();
                const quote = type.quotes[Math.floor(Math.random() * type.quotes.length)];
                bubble.innerText = quote;
                bubble.style.opacity = 1;
                createSparkle(e.clientX, e.clientY, '💬');
                log(`Interviewed ${type.name}: "${quote}"`);
                
                // Reset bubble after delay
                setTimeout(() => {
                    bubble.style.opacity = 0;
                }, 3000);
            };

            // Movement Logic
            const animalData = {
                el: el,
                x: x,
                y: y,
                vx: random(-0.2, 0.2),
                vy: random(-0.1, 0.1)
            };
            
            state.agents.push(animalData);
            field.appendChild(el);
            updateStats();
        }

        function spawnOrb() {
            if (state.orbs.length > 8) return; // Limit clutter

            const type = orbTypes[Math.floor(Math.random() * orbTypes.length)];
            const el = document.createElement('div');
            el.className = 'orb';
            el.style.background = `radial-gradient(circle at 30% 30%, white, ${type.color})`;
            el.style.boxShadow = `0 0 20px ${type.color}`;
            el.innerText = type.label;
            
            const x = random(10, 90);
            const y = random(20, 80);
            el.style.left = `${x}%`;
            el.style.top = `${y}%`;

            el.onclick = (e) => {
                e.stopPropagation();
                createSparkle(e.clientX, e.clientY, '✨');
                state.score += 100;
                log(`Collected ${type.name} Orb! (+100 Insight)`);
                el.remove();
                state.orbs = state.orbs.filter(o => o.el !== el);
                updateStats();
            };

            state.orbs.push({ el, type });
            sky.appendChild(el);
        }

        function updateStats() {
            scoreEl.innerText = state.score;
            agentCountEl.innerText = state.agents.length;
        }

        function gameLoop() {
            // Move Animals
            state.agents.forEach(agent => {
                agent.x += agent.vx;
                agent.y += agent.vy;

                // Bounce off walls
                if (agent.x < 0 || agent.x > 95) agent.vx *= -1;
                if (agent.y < 0 || agent.y > 90) agent.vy *= -1;

                // Random direction change
                if (Math.random() < 0.02) {
                    agent.vx = random(-0.2, 0.2);
                    agent.vy = random(-0.1, 0.1);
                    // Flip sprite based on direction
                    agent.el.style.transform = `scaleX(${agent.vx > 0 ? -1 : 1})`;
                    // Keep text correct way up
                    agent.el.querySelector('.speech-bubble').style.transform = `translateX(-50%) scaleX(${agent.vx > 0 ? -1 : 1})`;
                }

                agent.el.style.left = `${agent.x}%`;
                agent.el.style.top = `${agent.y}%`;
            });

            // Randomly spawn orbs
            if (Math.random() < 0.01) {
                spawnOrb();
            }

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            log("Publishing findings to Nature...");
            setTimeout(() => {
                location.reload();
            }, 1000);
        }

        // Initialize
        function init() {
            for(let i=0; i<12; i++) {
                spawnAnimal();
            }
            for(let i=0; i<3; i++) {
                spawnOrb();
            }
            gameLoop();
        }

        init();

    </script>
</body>
</html>
