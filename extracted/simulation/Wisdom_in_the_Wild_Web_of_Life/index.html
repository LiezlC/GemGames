<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom in the Wild: Web of Life</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --moon-color: #ffeebb;
            --sky-top: #0f172a;
            --sky-bottom: #2c5364;
            --water-top: #203a43;
            --water-bottom: #0f172a;
            --accent: #4ade80;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* --- SCENE LAYERS --- */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom) 60%, var(--water-top) 60%, var(--water-bottom));
            overflow: hidden;
            z-index: 1;
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 10%;
            right: 20%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--moon-color));
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 238, 187, 0.6);
            transition: all 1s ease-in-out;
            cursor: pointer;
            z-index: 2;
            animation: float 6s ease-in-out infinite;
        }
        .moon:hover {
            box-shadow: 0 0 100px rgba(255, 238, 187, 0.9);
            transform: scale(1.05);
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(20px);
            z-index: 2;
            animation: drift 60s linear infinite;
        }

        /* Mountains */
        .mountain {
            position: absolute;
            bottom: 40%;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 300px solid #1e293b;
            z-index: 3;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        .mountain-bg {
            bottom: 40%;
            border-bottom-color: #334155;
            opacity: 0.6;
            z-index: 2;
        }

        /* Lake Reflection */
        .lake {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, rgba(32, 58, 67, 0.8), rgba(15, 23, 42, 0.95));
            z-index: 4;
            backdrop-filter: blur(2px);
            overflow: hidden;
        }
        .ripple {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: scaleY(0.3);
            animation: ripple 4s linear infinite;
            pointer-events: none;
        }

        /* Trees */
        .tree {
            position: absolute;
            bottom: 35%;
            z-index: 5;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .tree svg {
            fill: #064e3b;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.7));
        }
        .tree:hover {
            transform: scale(1.05) translateY(-5px);
            filter: brightness(1.2);
        }

        /* Person Silhouette */
        .person {
            position: absolute;
            bottom: 30%;
            left: 20%;
            width: 40px;
            height: 100px;
            background: #9a3412; /* Dark orange dress */
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border-radius: 20px 20px 0 0;
            z-index: 6;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .person-head {
            position: absolute;
            bottom: 38%; /* relative to screen, adjusted via JS or CSS nesting */
            left: 20.5%;
            width: 30px;
            height: 30px;
            background: #1a1a1a;
            border-radius: 50%;
            z-index: 7;
            pointer-events: none;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .title-container {
            text-align: center;
            margin-top: 5vh;
            pointer-events: auto;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: #bef264;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            margin: 0;
            opacity: 0;
            animation: fadeIn 2s forwards 0.5s;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ecfccb;
            text-shadow: 0 1px 5px rgba(0,0,0,0.8);
            opacity: 0;
            animation: fadeIn 2s forwards 1s;
        }

        /* Interactive Cards */
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 1rem;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .card h2 {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .btn {
            background: var(--accent);
            color: #064e3b;
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            font-weight: bold;
            margin-top: 1.5rem;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }

        /* Connection Lines (Web of Life) */
        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
        }
        path.connector {
            fill: none;
            stroke: rgba(74, 222, 128, 0.4);
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 2s forwards;
        }

        /* Logo */
        .logo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .logo svg {
            width: 40px;
            height: 40px;
            fill: #15803d;
        }
        .logo span {
            color: #15803d;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 4px;
        }

        /* Progress Bar */
        .progress-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
            z-index: 101;
        }
        .orb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s;
        }
        .orb.collected {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Fireflies */
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #bef264;
            border-radius: 50%;
            box-shadow: 0 0 10px #bef264;
            opacity: 0;
            animation: fly 5s infinite;
            pointer-events: none;
            z-index: 20;
        }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes drift { from { transform: translateX(-100px); } to { transform: translateX(100vw); } }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 0.5; } 100% { width: 500px; height: 100px; opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes fly {
            0% { opacity: 0; transform: translate(0, 0); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
        }

    </style>
</head>
<body>

    <!-- Scene Container -->
    <div class="scene" id="scene">
        <!-- Clouds -->
        <div class="cloud" style="top: 10%; left: 10%; width: 200px; height: 60px;"></div>
        <div class="cloud" style="top: 20%; left: 60%; width: 300px; height: 80px; animation-duration: 80s;"></div>

        <!-- Moon -->
        <div class="moon" id="moon" onclick="interact('moon')"></div>

        <!-- Mountains -->
        <div class="mountain mountain-bg" style="left: -50px; border-bottom-width: 400px;"></div>
        <div class="mountain mountain-bg" style="right: -50px; border-bottom-width: 350px;"></div>
        <div class="mountain" style="left: 20%; bottom: 38%; border-bottom-width: 250px; border-left-width: 120px; border-right-width: 120px;" onclick="interact('mountain')"></div>
        <div class="mountain" style="right: 30%; bottom: 38%; border-bottom-width: 200px; border-left-width: 100px; border-right-width: 100px;" onclick="interact('mountain')"></div>

        <!-- Trees -->
        <!-- Left Tree Group -->
        <div class="tree" style="left: 5%; bottom: 30%; transform: scale(1.5);" onclick="interact('tree')">
            <svg width="100" height="200" viewBox="0 0 100 200">
                <path d="M50 0 L80 60 L60 60 L90 120 L70 120 L100 200 L0 200 L30 120 L10 120 L40 60 L20 60 Z" />
            </svg>
        </div>
        <!-- Right Tree Group -->
        <div class="tree" style="right: 5%; bottom: 25%; transform: scale(1.8);" onclick="interact('tree')">
            <svg width="100" height="200" viewBox="0 0 100 200">
                <path d="M50 0 L80 60 L60 60 L90 120 L70 120 L100 200 L0 200 L30 120 L10 120 L40 60 L20 60 Z" />
            </svg>
        </div>

        <!-- Person -->
        <div class="person" id="person" onclick="interact('person')"></div>
        <div class="person-head" style="bottom: calc(30% + 95px); left: calc(20% + 5px);"></div>

        <!-- Lake -->
        <div class="lake" id="lake" onclick="interact('water')">
            <div id="ripples-container"></div>
        </div>
    </div>

    <!-- SVG Layer for Connections -->
    <svg class="connections" id="connections-svg"></svg>

    <!-- UI Overlay -->
    <div class="ui-layer">
        <div class="title-container">
            <h1>Find Your Place</h1>
            <div class="subtitle">in the Web of Life</div>
        </div>

        <!-- Progress Orbs -->
        <div class="progress-container">
            <div class="orb" id="orb-moon" title="Moon"></div>
            <div class="orb" id="orb-mountain" title="Mountain"></div>
            <div class="orb" id="orb-tree" title="Forest"></div>
            <div class="orb" id="orb-water" title="Water"></div>
            <div class="orb" id="orb-person" title="Self"></div>
        </div>

        <!-- Logo -->
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 22h20L12 2zm0 4l6 14H6l6-14zM12 8l3 8H9l3-8z"/>
                <path d="M12 14l-1 3h2l-1-3z" fill="#15803d"/>
            </svg>
            <span>Wisdom in the Wild</span>
        </div>
    </div>

    <!-- Interaction Modal -->
    <div class="card" id="modal">
        <h2 id="modal-title">Element</h2>
        <p id="modal-text" class="text-gray-300 mb-4">Wisdom text goes here.</p>
        <button class="btn" onclick="closeModal()">Connect</button>
    </div>

    <script>
        // Game State
        const state = {
            moon: false,
            mountain: false,
            tree: false,
            water: false,
            person: false
        };

        const wisdomData = {
            moon: {
                title: "The Moon",
                text: "You are guided by intuition. Like the moon influences the tides, allow your inner feelings to move you without resistance.",
                color: "#ffeebb"
            },
            mountain: {
                title: "The Mountain",
                text: "Stand firm in your truth. Even when the storms rage around you, your core remains unshaken and grounded.",
                color: "#94a3b8"
            },
            tree: {
                title: "The Forest",
                text: "Growth takes patience. Root yourself deeply in the present moment so you may reach high towards your potential.",
                color: "#4ade80"
            },
            water: {
                title: "The Water",
                text: "Be adaptable. Water finds a way around every obstacle, not by force, but by persistence and flow.",
                color: "#60a5fa"
            },
            person: {
                title: "The Self",
                text: "You are the observer. You are not separate from this web, but the consciousness that brings it all together.",
                color: "#fb923c"
            }
        };

        // DOM Elements
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const connectionsSvg = document.getElementById('connections-svg');

        // Firefly System
        function createFireflies() {
            const scene = document.getElementById('scene');
            for(let i=0; i<30; i++) {
                const fly = document.createElement('div');
                fly.className = 'firefly';
                fly.style.left = Math.random() * 100 + 'vw';
                fly.style.top = Math.random() * 80 + 10 + 'vh';
                fly.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
                fly.style.setProperty('--ty', (Math.random() * 200 - 100) + 'px');
                fly.style.animationDelay = Math.random() * 5 + 's';
                scene.appendChild(fly);
            }
        }

        // Ripple System
        function createRipples() {
            const container = document.getElementById('ripples-container');
            setInterval(() => {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = Math.random() * 80 + 10 + '%';
                ripple.style.top = Math.random() * 80 + '%';
                container.appendChild(ripple);
                setTimeout(() => ripple.remove(), 4000);
            }, 2000);
        }

        // Interaction Logic
        let currentElement = null;

        function interact(elementKey) {
            currentElement = elementKey;
            const data = wisdomData[elementKey];
            
            modalTitle.innerText = data.title;
            modalText.innerText = data.text;
            modalTitle.style.color = data.color;
            
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            
            if (currentElement && !state[currentElement]) {
                state[currentElement] = true;
                document.getElementById(`orb-${currentElement}`).classList.add('collected');
                drawConnections();
                checkCompletion();
            }
        }

        function getCenter(elementId) {
            // Map logical IDs to DOM selectors
            let selector = '';
            if(elementId === 'moon') selector = '.moon';
            if(elementId === 'mountain') selector = '.mountain:nth-of-type(3)'; // Picking one mountain
            if(elementId === 'tree') selector = '.tree:first-of-type'; // Picking left tree
            if(elementId === 'water') selector = '.lake';
            if(elementId === 'person') selector = '.person';

            const el = document.querySelector(selector);
            const rect = el.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }

        function drawConnections() {
            // Clear existing lines
            connectionsSvg.innerHTML = '';
            
            const collectedKeys = Object.keys(state).filter(k => state[k]);
            
            // Draw lines between all collected nodes
            for (let i = 0; i < collectedKeys.length; i++) {
                for (let j = i + 1; j < collectedKeys.length; j++) {
                    const start = getCenter(collectedKeys[i]);
                    const end = getCenter(collectedKeys[j]);
                    
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const d = `M ${start.x} ${start.y} L ${end.x} ${end.y}`;
                    path.setAttribute("d", d);
                    path.setAttribute("class", "connector");
                    connectionsSvg.appendChild(path);
                }
            }
        }

        function checkCompletion() {
            const allCollected = Object.values(state).every(val => val === true);
            if (allCollected) {
                setTimeout(() => {
                    modalTitle.innerText = "The Web is Complete";
                    modalText.innerText = "You have found your place. Everything is connected. You are nature, observing itself.";
                    modalTitle.style.color = "#fff";
                    document.querySelector('#modal button').innerText = "Breathe";
                    document.querySelector('#modal button').onclick = startBreathingMode;
                    modal.classList.add('active');
                }, 1000);
            }
        }

        function startBreathingMode() {
            modal.classList.remove('active');
            const moon = document.getElementById('moon');
            // Change animation to breathing
            moon.style.animation = "none";
            setTimeout(() => {
                moon.style.transition = "transform 4s ease-in-out, box-shadow 4s ease-in-out";
                
                setInterval(() => {
                    // Inhale (4s)
                    moon.style.transform = "scale(1.3)";
                    moon.style.boxShadow = "0 0 150px rgba(255, 238, 187, 1)";
                    
                    setTimeout(() => {
                        // Exhale (4s)
                        moon.style.transform = "scale(1)";
                        moon.style.boxShadow = "0 0 60px rgba(255, 238, 187, 0.6)";
                    }, 4000);
                }, 8000);
            }, 100);

            const title = document.querySelector('h1');
            title.innerText = "Breathe with the Moon";
            document.querySelector('.subtitle').innerText = "Inhale as it glows, exhale as it dims.";
        }

        // Init
        window.onload = () => {
            createFireflies();
            createRipples();
        };

        // Handle resize for SVG lines
        window.onresize = () => {
            if(Object.values(state).some(x => x)) {
                drawConnections();
            }
        };

    </script>
</body>
</html>
