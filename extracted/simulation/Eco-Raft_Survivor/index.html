<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Raft Survivor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --water-dark: #0f172a;
            --water-light: #1e3a8a;
            --raft-pink: rgba(236, 72, 153, 0.15);
            --raft-border: rgba(236, 72, 153, 0.4);
        }

        body {
            background: linear-gradient(180deg, #020617 0%, #172554 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* Water Animation */
        .water-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 1px, transparent 1px),
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }

        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* The Raft */
        #raft-container {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .raft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 30px);
            gap: 2px;
            padding: 10px;
            background: var(--raft-pink);
            border: 4px solid var(--raft-border);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            /* Simulating the plastic wrap texture */
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.05) 10px,
                rgba(255, 255, 255, 0.01) 10px,
                rgba(255, 255, 255, 0.01) 20px
            );
        }

        /* CSS Bottle Art */
        .bottle-node {
            width: 30px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            position: relative;
            margin: 2px;
            transition: transform 0.2s;
        }
        .bottle-node:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
        }
        .bottle-node::before { /* Cap */
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 4px;
            background: #ef4444;
            border-radius: 2px;
        }
        .bottle-node::after { /* Label */
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 15px;
            background: rgba(220, 38, 38, 0.4);
        }

        /* Floating Bottle (Collectable) */
        .floater {
            position: absolute;
            cursor: pointer;
            animation: bob 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .floater:hover {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(10deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* Characters */
        .character {
            font-size: 3rem;
            position: absolute;
            z-index: 20;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transition: transform 0.3s;
        }
        
        .dog-bubble {
            position: absolute;
            background: white;
            color: black;
            padding: 8px 12px;
            border-radius: 12px;
            border-bottom-left-radius: 0;
            font-size: 0.8rem;
            font-weight: bold;
            top: -40px;
            left: 20px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* Ripple Effect on Click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 0%;
            transition: width 0.1s linear;
        }

    </style>
</head>
<body>

    <!-- Background Water -->
    <div class="water-bg"></div>

    <!-- Game Container -->
    <div class="relative w-full h-full flex flex-col items-center justify-center overflow-hidden" id="game-area">
        
        <!-- HUD -->
        <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-50 pointer-events-none">
            <div class="glass-panel p-4 rounded-2xl flex flex-col gap-2 pointer-events-auto">
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-pink-400">
                    Raft Builder
                </h1>
                <div class="flex gap-4 text-sm font-mono text-gray-300">
                    <div>
                        <span class="block text-xs text-gray-500">DISTANCE</span>
                        <span id="score-dist" class="text-white font-bold text-lg">0m</span>
                    </div>
                    <div>
                        <span class="block text-xs text-gray-500">BOTTLES</span>
                        <span id="score-bottles" class="text-white font-bold text-lg">0</span>
                    </div>
                </div>
                <div class="progress-container">
                    <div id="progress" class="progress-bar"></div>
                </div>
                <div class="text-xs text-gray-500 mt-1">Next expansion: <span id="next-level">10</span> bottles</div>
            </div>

            <div class="glass-panel p-2 rounded-full pointer-events-auto cursor-pointer hover:bg-white/10 transition" onclick="toggleSound()">
                <span class="text-xl p-2">🔊</span>
            </div>
        </div>

        <!-- The Raft -->
        <div id="raft-container" class="relative z-30 transition-all duration-500">
            <!-- Player -->
            <div class="character" style="top: -40px; left: 50%; transform: translateX(-50%);">
                🧢
                <!-- Simple body rep using CSS -->
                <div style="width: 30px; height: 20px; background: #4f46e5; border-radius: 10px; position: absolute; top: 35px; left: 10px; z-index: -1;"></div>
            </div>

            <!-- Dog -->
            <div class="character" id="dog" style="top: -30px; right: -20px;">
                🐺
                <div id="dog-speech" class="dog-bubble">Woof!</div>
            </div>

            <!-- Raft Grid -->
            <div class="raft-grid" id="raft-grid">
                <!-- Initial Bottles -->
                <div class="bottle-node"></div>
                <div class="bottle-node"></div>
                <div class="bottle-node"></div>
                <div class="bottle-node"></div>
                <div class="bottle-node"></div>
                <div class="bottle-node"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="absolute bottom-8 z-50 flex gap-4">
            <button id="paddle-btn" class="glass-panel px-8 py-4 rounded-full text-2xl font-bold active:scale-95 transition hover:bg-blue-500/20 border-blue-400/30 flex items-center gap-2 group">
                <span class="group-hover:-rotate-12 transition-transform duration-300">🛶</span> PADDLE
            </button>
        </div>

        <!-- Tutorial Overlay -->
        <div id="tutorial" class="absolute inset-0 z-[60] bg-black/80 flex items-center justify-center backdrop-blur-sm">
            <div class="glass-panel p-8 rounded-2xl max-w-md text-center">
                <div class="text-6xl mb-4">🐺🛶</div>
                <h2 class="text-2xl font-bold mb-2">River Survival</h2>
                <p class="text-gray-300 mb-6">
                    You and your husky are stranded! <br>
                    1. Click floating bottles <span class="inline-block w-4 h-8 bg-white/20 border border-white/50 rounded mx-1 align-middle"></span> to collect them.<br>
                    2. Your raft grows automatically.<br>
                    3. Click <b>PADDLE</b> to move faster.
                </p>
                <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-full transition shadow-lg shadow-blue-500/50">
                    Start Floating
                </button>
            </div>
        </div>

    </div>

    <script>
        // Game State
        const state = {
            bottles: 0,
            distance: 0,
            speed: 1,
            raftSize: 6,
            level: 1,
            isPlaying: false,
            nextLevelThreshold: 10
        };

        // DOM Elements
        const gameArea = document.getElementById('game-area');
        const raftGrid = document.getElementById('raft-grid');
        const distEl = document.getElementById('score-dist');
        const bottlesEl = document.getElementById('score-bottles');
        const dogSpeech = document.getElementById('dog-speech');
        const progressBar = document.getElementById('progress');
        const nextLevelEl = document.getElementById('next-level');
        const paddleBtn = document.getElementById('paddle-btn');

        // Dog Dialogues
        const barks = [
            "Woof!", "More plastic!", "Good job!", "Paddle!", "I see land!", "Aroo!", "Keep going!"
        ];

        function startGame() {
            document.getElementById('tutorial').style.display = 'none';
            state.isPlaying = true;
            gameLoop();
            spawnLoop();
            dogLoop();
        }

        // Core Game Loop
        function gameLoop() {
            if (!state.isPlaying) return;

            // Increase distance
            state.distance += (0.1 * state.speed);
            distEl.innerText = Math.floor(state.distance) + 'm';

            // Decay speed
            if (state.speed > 1) {
                state.speed *= 0.98;
            } else {
                state.speed = 1;
            }

            // Update Background Speed based on paddle
            document.querySelector('.water-bg').style.animationDuration = `${20 / state.speed}s`;

            requestAnimationFrame(gameLoop);
        }

        // Spawning Bottles
        function spawnLoop() {
            if (!state.isPlaying) return;
            
            // Random interval
            const delay = Math.random() * 2000 + 500; // 0.5s to 2.5s
            setTimeout(() => {
                spawnBottle();
                spawnLoop();
            }, delay / state.speed); // Spawn faster if moving faster
        }

        function spawnBottle() {
            const bottle = document.createElement('div');
            bottle.className = 'bottle-node floater';
            
            // Random Position
            const startX = Math.random() * (window.innerWidth - 50);
            bottle.style.left = startX + 'px';
            bottle.style.top = '-60px'; // Start above screen
            
            // Random Rotation
            const rot = Math.random() * 360;
            bottle.style.transform = `rotate(${rot}deg)`;

            // Click Event
            bottle.addEventListener('mousedown', (e) => {
                collectBottle(bottle, e.clientX, e.clientY);
            });

            gameArea.appendChild(bottle);

            // Animate falling down
            let posY = -60;
            const speed = 2 * state.speed;
            
            function fall() {
                if (!state.isPlaying) return;
                posY += speed;
                bottle.style.top = posY + 'px';

                if (posY > window.innerHeight) {
                    bottle.remove();
                } else {
                    requestAnimationFrame(fall);
                }
            }
            requestAnimationFrame(fall);
        }

        // Collection Logic
        function collectBottle(element, x, y) {
            // Visual feedback
            createRipple(x, y);
            element.remove();

            // Update State
            state.bottles++;
            bottlesEl.innerText = state.bottles;

            // Check Level Up
            const progress = (state.bottles % state.nextLevelThreshold) / state.nextLevelThreshold * 100;
            progressBar.style.width = `${progress}%`;

            if (state.bottles >= state.level * state.nextLevelThreshold) {
                expandRaft();
            }

            // Dog reaction
            if (Math.random() > 0.7) bark();
        }

        function expandRaft() {
            state.level++;
            state.nextLevelThreshold = Math.floor(state.nextLevelThreshold * 1.5);
            nextLevelEl.innerText = (state.level * state.nextLevelThreshold) - state.bottles;
            
            // Add visual bottles to raft
            const newBottlesCount = 4; // Add 4 bottles per level
            for(let i=0; i<newBottlesCount; i++) {
                const b = document.createElement('div');
                b.className = 'bottle-node';
                b.style.opacity = '0';
                raftGrid.appendChild(b);
                
                // Fade in
                setTimeout(() => {
                    b.style.opacity = '1';
                }, i * 100);
            }

            // Visual flair
            bark("Raft Upgrade!");
            progressBar.style.width = '0%';
        }

        // Paddle Logic
        paddleBtn.addEventListener('click', (e) => {
            state.speed = 5; // Burst of speed
            createRipple(window.innerWidth/2, window.innerHeight - 100);
            
            // Tilt raft
            const raft = document.getElementById('raft-container');
            raft.style.transform = 'translateY(-10px) rotate(2deg)';
            setTimeout(() => {
                raft.style.transform = 'translateY(0) rotate(0deg)';
            }, 300);
        });

        // Dog Logic
        function dogLoop() {
            setInterval(() => {
                if(Math.random() > 0.8) bark();
            }, 5000);
        }

        function bark(text = null) {
            const msg = text || barks[Math.floor(Math.random() * barks.length)];
            dogSpeech.innerText = msg;
            dogSpeech.style.opacity = 1;
            dogSpeech.style.transform = 'translateY(-10px)';
            
            setTimeout(() => {
                dogSpeech.style.opacity = 0;
                dogSpeech.style.transform = 'translateY(0)';
            }, 2000);
        }

        // Utilities
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '50px';
            ripple.style.height = '50px';
            gameArea.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function toggleSound() {
            // Placeholder for sound toggle
            bark("Silent mode!");
        }

        // Initial Raft Setup
        // (Already populated in HTML for initial load)

    </script>
</body>
</html>
