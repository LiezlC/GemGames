<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth-Sprout: Digital Restoration</title>
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --dark-bg: #050510;
            --glass-color: rgba(200, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
            cursor: none; /* Custom cursor */
        }

        /* Cyberpunk City Background Grid */
        .city-grid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            background: 
                linear-gradient(transparent 0%, var(--neon-pink) 2%, transparent 3%),
                linear-gradient(90deg, transparent 0%, var(--neon-blue) 2%, transparent 3%);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(100px) scale(2);
            opacity: 0.3;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-blue);
            padding: 10px 20px;
            margin-bottom: 10px;
            box-shadow: 0 0 10px var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 5px 0;
            color: var(--neon-green);
        }

        .bar-container {
            width: 200px;
            height: 10px;
            background: #333;
            margin-top: 5px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--neon-green);
            width: 0%;
            transition: width 0.3s;
        }

        #energy-fill { background: var(--neon-blue); }
        #health-fill { background: var(--neon-pink); }

        /* Controls */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        button {
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: none; /* We use custom cursor */
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px var(--neon-green);
            transition: all 0.2s;
            pointer-events: auto;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            box-shadow: none;
            background: rgba(0,0,0,0.8);
        }

        /* The Plant Container */
        #plant-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 600px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        .plant-svg {
            filter: drop-shadow(0 0 10px var(--neon-green));
            overflow: visible;
        }

        .stem {
            fill: none;
            stroke: var(--neon-green);
            stroke-width: 4;
            stroke-linecap: round;
        }

        .leaf {
            fill: var(--neon-green);
            opacity: 0.8;
        }

        .flower {
            fill: white;
            filter: drop-shadow(0 0 15px white);
            opacity: 0;
            transition: opacity 1s;
        }

        /* Glass Shards (Enemies) */
        .shard {
            position: absolute;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
            z-index: 50;
            cursor: none;
            pointer-events: auto;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); /* Triangle default */
            animation: floatDown linear forwards;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .shard:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: red;
        }

        @keyframes floatDown {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        /* Custom Robot Hand Cursor */
        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }
        
        /* Robot Hand SVG inside cursor */
        #cursor svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 5px var(--neon-blue));
        }

        /* Particle Effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 60;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translate(var(--tx), var(--ty)); }
        }

        /* Win Overlay */
        #win-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s;
        }

        #win-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #win-screen h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 0 0 20px var(--neon-green);
        }

    </style>
</head>
<body>

    <!-- Background -->
    <div class="city-grid"></div>

    <!-- Game UI -->
    <div id="ui-layer">
        <div class="stat-box">
            <h1>SYSTEM INTEGRITY</h1>
            <div class="bar-container">
                <div id="health-fill" class="bar-fill" style="width: 100%;"></div>
            </div>
        </div>
        <div class="stat-box">
            <h1>DATA ENERGY</h1>
            <div class="bar-container">
                <div id="energy-fill" class="bar-fill" style="width: 0%;"></div>
            </div>
            <div style="margin-top:5px; font-size: 0.8rem; color: #aaa;">Click falling glitches to harvest data.</div>
        </div>
        <div class="stat-box">
            <h1>GROWTH STAGE: <span id="stage-text">1</span>/5</h1>
        </div>
    </div>

    <!-- The Plant -->
    <div id="plant-container">
        <svg class="plant-svg" width="400" height="600" viewBox="0 0 400 600" id="plant-svg">
            <!-- Dynamic content will be injected here -->
            <path d="M200,600 Q200,500 200,450" class="stem" id="main-stem" />
        </svg>
    </div>

    <!-- Controls -->
    <div id="controls">
        <button id="grow-btn" onclick="evolvePlant()">INJECT BIO-CODE (Cost: 20 Data)</button>
    </div>

    <!-- Win Screen -->
    <div id="win-screen">
        <h1>SIMULATION RESTORED</h1>
        <p style="color: var(--neon-blue)">Life finds a way through the digital noise.</p>
        <button onclick="location.reload()" style="margin-top:20px;">REBOOT SYSTEM</button>
    </div>

    <!-- Custom Cursor Element -->
    <div id="cursor">
        <!-- Simple Robot Hand SVG -->
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="#00f3ff" stroke-width="2" fill="rgba(0, 243, 255, 0.1)" />
            <circle cx="50" cy="50" r="5" fill="#00f3ff" />
            <line x1="50" y1="10" x2="50" y2="30" stroke="#00f3ff" stroke-width="2" />
            <line x1="50" y1="90" x2="50" y2="70" stroke="#00f3ff" stroke-width="2" />
            <line x1="10" y1="50" x2="30" y2="50" stroke="#00f3ff" stroke-width="2" />
            <line x1="90" y1="50" x2="70" y2="50" stroke="#00f3ff" stroke-width="2" />
            <!-- Fingers -->
            <path d="M20,20 L40,40" stroke="#00f3ff" stroke-width="2" />
            <path d="M80,20 L60,40" stroke="#00f3ff" stroke-width="2" />
        </svg>
    </div>

    <script>
        // Game State
        const state = {
            energy: 0,
            health: 100,
            stage: 1,
            maxStages: 5,
            gameActive: true,
            costPerStage: 20
        };

        // DOM Elements
        const energyFill = document.getElementById('energy-fill');
        const healthFill = document.getElementById('health-fill');
        const stageText = document.getElementById('stage-text');
        const growBtn = document.getElementById('grow-btn');
        const plantSvg = document.getElementById('plant-svg');
        const cursor = document.getElementById('cursor');
        const winScreen = document.getElementById('win-screen');

        // Custom Cursor Logic
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        // Game Loop
        function updateUI() {
            energyFill.style.width = Math.min(state.energy, 100) + '%';
            healthFill.style.width = state.health + '%';
            stageText.innerText = state.stage;

            if (state.energy >= state.costPerStage && state.stage < state.maxStages) {
                growBtn.disabled = false;
                growBtn.innerText = `INJECT BIO-CODE (Cost: ${state.costPerStage})`;
            } else if (state.stage >= state.maxStages) {
                growBtn.disabled = true;
                growBtn.innerText = "MAXIMUM GROWTH";
            } else {
                growBtn.disabled = true;
                growBtn.innerText = `NEED DATA (${state.energy}/${state.costPerStage})`;
            }

            if (state.health <= 0) {
                gameOver();
            }
        }

        function spawnShard() {
            if (!state.gameActive || state.stage >= state.maxStages) return;

            const shard = document.createElement('div');
            shard.classList.add('shard');
            
            // Random shape via clip-path
            const shapes = [
                'polygon(50% 0%, 0% 100%, 100% 100%)', // Triangle
                'polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%)', // Trapezoid
                'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)' // Diamond
            ];
            shard.style.clipPath = shapes[Math.floor(Math.random() * shapes.length)];
            
            const size = Math.random() * 40 + 20;
            shard.style.width = size + 'px';
            shard.style.height = size + 'px';
            
            // Random start position
            const startX = Math.random() * window.innerWidth;
            shard.style.left = startX + 'px';
            shard.style.top = '-50px';

            // Animation duration based on difficulty
            const duration = 3 + Math.random() * 2;
            shard.style.animationDuration = duration + 's';

            // Interaction
            shard.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                destroyShard(shard, true);
            });

            // Check collision with bottom
            shard.addEventListener('animationend', () => {
                if (shard.parentNode) {
                    damagePlant();
                    shard.remove();
                }
            });

            document.body.appendChild(shard);
        }

        function destroyShard(shard, byPlayer) {
            // Create explosion particles
            const rect = shard.getBoundingClientRect();
            createParticles(rect.left + rect.width/2, rect.top + rect.height/2);

            shard.remove();
            
            if (byPlayer) {
                state.energy += 5;
                // Play sound effect visual (screen flash)
                const flash = document.createElement('div');
                flash.style.position = 'absolute';
                flash.style.top = '0'; flash.style.left = '0';
                flash.style.width = '100%'; flash.style.height = '100%';
                flash.style.background = 'rgba(0, 243, 255, 0.1)';
                flash.style.pointerEvents = 'none';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 50);
                updateUI();
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 50 + 20;
                const tx = Math.cos(angle) * dist + 'px';
                const ty = Math.sin(angle) * dist + 'px';
                
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function damagePlant() {
            state.health -= 10;
            // Red flash
            document.body.style.boxShadow = "inset 0 0 50px red";
            setTimeout(() => document.body.style.boxShadow = "none", 200);
            updateUI();
        }

        function evolvePlant() {
            if (state.energy >= state.costPerStage) {
                state.energy -= state.costPerStage;
                state.stage++;
                state.costPerStage += 10; // Increase cost for next level
                state.health = Math.min(100, state.health + 20); // Heal on evolve
                renderPlant();
                
                // Visual feedback
                createParticles(window.innerWidth/2, window.innerHeight - 200);
                
                if (state.stage === state.maxStages) {
                    winGame();
                }
                updateUI();
            }
        }

        function renderPlant() {
            // Clear existing except main stem
            plantSvg.innerHTML = '';
            
            // Base Stem
            const stem = document.createElementNS("http://www.w3.org/2000/svg", "path");
            stem.setAttribute("d", "M200,600 Q200,500 200,400");
            stem.setAttribute("class", "stem");
            plantSvg.appendChild(stem);

            // Procedural generation based on stage
            if (state.stage > 1) {
                // Add branches
                addBranch(200, 400, -40, 100);
                addBranch(200, 400, 40, 100);
            }
            if (state.stage > 2) {
                // Grow taller
                stem.setAttribute("d", "M200,600 Q200,500 200,300");
                addBranch(200, 350, -60, 120);
                addBranch(200, 350, 60, 120);
                addLeaf(160, 320);
                addLeaf(240, 320);
            }
            if (state.stage > 3) {
                // More complex
                stem.setAttribute("d", "M200,600 Q180,450 200,200");
                addBranch(200, 250, -30, 80);
                addBranch(200, 250, 30, 80);
                addLeaf(180, 220);
                addLeaf(220, 220);
                addLeaf(200, 300);
            }
            if (state.stage >= 5) {
                // Flower
                const flower = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                flower.setAttribute("cx", "200");
                flower.setAttribute("cy", "200");
                flower.setAttribute("r", "15");
                flower.setAttribute("class", "flower");
                flower.style.opacity = "1";
                plantSvg.appendChild(flower);
                
                // Glow effect
                const glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                glow.setAttribute("cx", "200");
                glow.setAttribute("cy", "200");
                glow.setAttribute("r", "40");
                glow.setAttribute("fill", "url(#glowGradient)");
                glow.setAttribute("opacity", "0.5");
                
                // Define gradient
                const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
                const radial = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
                radial.setAttribute("id", "glowGradient");
                radial.innerHTML = `<stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="transparent"/>`;
                defs.appendChild(radial);
                plantSvg.appendChild(defs);
                plantSvg.appendChild(glow);
            }
        }

        function addBranch(startX, startY, angleDeg, length) {
            const rad = (angleDeg - 90) * (Math.PI / 180);
            const endX = startX + Math.cos(rad) * length;
            const endY = startY + Math.sin(rad) * length;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M${startX},${startY} Q${startX},${startY-50} ${endX},${endY}`);
            path.setAttribute("class", "stem");
            plantSvg.appendChild(path);
            
            // Add leaf at end
            addLeaf(endX, endY);
        }

        function addLeaf(x, y) {
            const leaf = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            leaf.setAttribute("cx", x);
            leaf.setAttribute("cy", y);
            leaf.setAttribute("rx", "10");
            leaf.setAttribute("ry", "20");
            leaf.setAttribute("class", "leaf");
            plantSvg.appendChild(leaf);
        }

        function winGame() {
            state.gameActive = false;
            setTimeout(() => {
                winScreen.classList.add('visible');
            }, 1000);
        }

        function gameOver() {
            state.gameActive = false;
            alert("SYSTEM FAILURE: The plant has withered. Refresh to retry.");
            location.reload();
        }

        // Start Spawning
        setInterval(spawnShard, 1000);
        updateUI();
        renderPlant(); // Initial render

    </script>
</body>
</html>
