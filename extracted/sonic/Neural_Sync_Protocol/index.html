<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Sync Protocol</title>
    <style>
        :root {
            --rust-bg: #c05020;
            --rust-dark: #6e2508;
            --metal-dark: #1a1a1a;
            --metal-light: #333;
            --glow-blue: #00f0ff;
            --glow-orange: #ff5e00;
            --glow-green: #00ff41;
            --glow-red: #ff003c;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, var(--rust-bg), var(--rust-dark));
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        /* Rust Texture Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Scratches and imperfections */
        .scratch {
            position: absolute;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        #game-container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            height: 400px;
        }

        /* The Heads */
        .head-wrapper {
            width: 250px;
            height: 350px;
            position: relative;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        .head-svg {
            width: 100%;
            height: 100%;
            fill: var(--metal-dark);
            stroke: #000;
            stroke-width: 2;
            filter: drop-shadow(inset 2px 2px 5px rgba(0,0,0,0.8)) drop-shadow(inset -1px -1px 2px rgba(255,255,255,0.1));
        }

        .head-right {
            transform: scaleX(-1);
        }

        /* Brain Nodes (Buttons) */
        .brain-node {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #222;
            border: 2px solid #444;
            box-shadow: inset 1px 1px 3px #000;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .brain-node.active {
            background: #fff;
            box-shadow: 0 0 15px var(--active-color), inset 0 0 5px var(--active-color);
            border-color: #fff;
        }

        /* Node Positions (Relative to 250x350 container) */
        /* Adjusted for the specific SVG path shape */
        .n1 { top: 90px; left: 100px; --active-color: var(--glow-red); }
        .n2 { top: 130px; left: 130px; --active-color: var(--glow-blue); }
        .n3 { top: 130px; left: 70px; --active-color: var(--glow-green); }
        .n4 { top: 170px; left: 100px; --active-color: var(--glow-orange); }

        /* Connection Beam */
        #connection-beam {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 4px;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            transition: width 0.5s ease-out;
            z-index: 5;
            opacity: 0;
        }
        
        #connection-beam.connected {
            width: 160px;
            opacity: 1;
        }

        /* UI Panel */
        #ui-panel {
            margin-top: 40px;
            z-index: 2;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            color: #e0e0e0;
        }

        .status-text {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            min-height: 1.2em;
        }

        button {
            background: linear-gradient(to bottom, #444, #222);
            border: 1px solid #555;
            color: #fff;
            padding: 10px 25px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            box-shadow: 0 4px 0 #111;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #111;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        /* Circuit Lines (Decorative) */
        .circuit-line {
            position: absolute;
            background: rgba(0,0,0,0.3);
            z-index: 2;
        }

    </style>
</head>
<body>

    <!-- Decorative Scratches -->
    <div class="scratch" style="top: 10%; left: 20%; width: 100px; height: 2px; transform: rotate(15deg);"></div>
    <div class="scratch" style="top: 80%; left: 80%; width: 50px; height: 3px; transform: rotate(-45deg);"></div>
    <div class="scratch" style="top: 50%; left: 5%; width: 8px; height: 8px;"></div>

    <div id="game-container">
        <!-- Left Head (Sender/Human) -->
        <div class="head-wrapper" id="head-left">
            <svg class="head-svg" viewBox="0 0 200 300">
                <!-- Stylized Profile Path -->
                <path d="M 60 280 L 160 280 L 150 220 C 150 220 170 220 170 180 C 170 140 150 100 150 100 C 150 100 150 20 90 20 C 30 20 30 100 30 100 C 30 100 20 140 30 180 C 40 220 60 220 60 220 L 50 280 Z" />
                <!-- Eye Indent -->
                <path d="M 130 130 L 145 130 L 140 135 Z" fill="rgba(0,0,0,0.3)" />
                <!-- Ear Indent -->
                <circle cx="90" cy="150" r="10" fill="rgba(0,0,0,0.2)" />
            </svg>
            
            <!-- Brain Nodes -->
            <div class="brain-node n1" id="l-n1"></div>
            <div class="brain-node n2" id="l-n2"></div>
            <div class="brain-node n3" id="l-n3"></div>
            <div class="brain-node n4" id="l-n4"></div>
        </div>

        <!-- The Beam -->
        <div id="connection-beam"></div>

        <!-- Right Head (Receiver/Machine) -->
        <div class="head-wrapper head-right" id="head-right">
            <svg class="head-svg" viewBox="0 0 200 300">
                <!-- Same path, flipped via CSS -->
                <path d="M 60 280 L 160 280 L 150 220 C 150 220 170 220 170 180 C 170 140 150 100 150 100 C 150 100 150 20 90 20 C 30 20 30 100 30 100 C 30 100 20 140 30 180 C 40 220 60 220 60 220 L 50 280 Z" />
                <!-- Mechanical Eye -->
                <circle cx="135" cy="130" r="8" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <!-- Mechanical Lines -->
                <path d="M 90 150 L 130 150 M 90 150 L 90 100" stroke="rgba(0,0,0,0.3)" stroke-width="2" fill="none"/>
            </svg>

            <!-- Interactive Brain Nodes -->
            <div class="brain-node n1" data-id="1" onclick="handleInput(1)"></div>
            <div class="brain-node n2" data-id="2" onclick="handleInput(2)"></div>
            <div class="brain-node n3" data-id="3" onclick="handleInput(3)"></div>
            <div class="brain-node n4" data-id="4" onclick="handleInput(4)"></div>
        </div>
    </div>

    <div id="ui-panel">
        <h1>Neural Sync Protocol</h1>
        <div class="status-text" id="status">Initialize connection sequence...</div>
        <button id="start-btn" onclick="startGame()">Initiate Link</button>
        <div style="margin-top: 10px; font-size: 0.8rem; color: #666;">Score: <span id="score">0</span></div>
    </div>

    <script>
        // Game State
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isPlaying = false;
        let isShowingSequence = false;
        let score = 0;

        // DOM Elements
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const scoreEl = document.getElementById('score');
        const beam = document.getElementById('connection-beam');
        const rightHead = document.getElementById('head-right');

        // Sounds (Synthesized)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type='sine', duration=0.3) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const nodeTones = {
            1: 261.63, // C4
            2: 329.63, // E4
            3: 392.00, // G4
            4: 523.25  // C5
        };

        function startGame() {
            sequence = [];
            playerSequence = [];
            level = 1;
            score = 0;
            scoreEl.innerText = score;
            isPlaying = true;
            startBtn.disabled = true;
            startBtn.innerText = "Link Active";
            beam.classList.remove('connected');
            
            nextRound();
        }

        function nextRound() {
            playerSequence = [];
            statusEl.innerText = `Transmitting Sequence (Length: ${level})...`;
            
            // Add new step to sequence
            const nextNode = Math.floor(Math.random() * 4) + 1;
            sequence.push(nextNode);

            // Play sequence
            isShowingSequence = true;
            let i = 0;
            const interval = setInterval(() => {
                activateNode('l', sequence[i]);
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        isShowingSequence = false;
                        statusEl.innerText = "Awaiting Response...";
                    }, 500);
                }
            }, 800);
        }

        function activateNode(side, id) {
            const prefix = side === 'l' ? 'l-n' : ''; // Right side nodes don't have IDs, we select by data-id
            let node;
            
            if (side === 'l') {
                node = document.getElementById(`l-n${id}`);
            } else {
                node = document.querySelector(`.head-right .brain-node[data-id="${id}"]`);
            }

            if (node) {
                node.classList.add('active');
                playTone(nodeTones[id]);
                setTimeout(() => {
                    node.classList.remove('active');
                }, 400);
            }
        }

        function handleInput(id) {
            if (!isPlaying || isShowingSequence) return;

            activateNode('r', id);
            playerSequence.push(id);

            // Check correctness
            const currentIndex = playerSequence.length - 1;
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            // Check completion of round
            if (playerSequence.length === sequence.length) {
                score += level * 10;
                scoreEl.innerText = score;
                level++;
                statusEl.innerText = "Sync Successful. Strengthening Link...";
                
                // Visual Reward
                beam.classList.add('connected');
                playTone(880, 'triangle', 0.5); // High pitch success sound

                setTimeout(() => {
                    beam.classList.remove('connected');
                    nextRound();
                }, 1000);
            }
        }

        function gameOver() {
            isPlaying = false;
            statusEl.innerText = "Link Ruptured. Connection Lost.";
            startBtn.disabled = false;
            startBtn.innerText = "Re-Initiate";
            
            // Shake effect
            rightHead.classList.add('shake');
            playTone(100, 'sawtooth', 0.5); // Error buzz
            
            setTimeout(() => {
                rightHead.classList.remove('shake');
            }, 500);
        }

    </script>
</body>
</html>
