<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Sync: Overdrive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00aa;
            --neon-orange: #ffaa00;
            --bg-dark: #05050a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace; /* Cyber vibe */
            overflow: hidden;
            margin: 0;
            height: 100vh;
            user-select: none;
        }

        /* --- Background Grid Animation --- */
        .cyber-grid {
            position: absolute;
            width: 200vw;
            height: 200vh;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* --- The Core (Abstract Character Representation) --- */
        .core-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none; /* Click through to background if needed */
        }

        .core-avatar {
            width: 80px;
            height: 120px;
            background: linear-gradient(180deg, var(--neon-cyan), #1a1a2e);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%, 0% 20%);
            position: relative;
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: float 3s ease-in-out infinite;
        }
        
        /* Head */
        .core-avatar::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 10px;
            width: 60px;
            height: 60px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Scarf/Coat Accents */
        .core-avatar::after {
            content: '';
            position: absolute;
            top: 10px;
            left: -20px;
            width: 120px;
            height: 40px;
            background: var(--neon-orange);
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
            z-index: 2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* --- Energy Rings --- */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .ring-1 {
            width: 200px;
            height: 200px;
            border-top: 4px solid var(--neon-cyan);
            border-bottom: 4px solid var(--neon-cyan);
            animation: spin 4s linear infinite;
        }

        .ring-2 {
            width: 280px;
            height: 280px;
            border-left: 4px solid var(--neon-pink);
            border-right: 4px solid var(--neon-pink);
            animation: spinReverse 6s linear infinite;
        }

        .ring-3 {
            width: 350px;
            height: 350px;
            border: 1px dashed var(--neon-cyan);
            animation: spin 12s linear infinite;
            opacity: 0.5;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

        /* --- Game Elements --- */
        .node {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: transform 0.1s;
            z-index: 20;
        }
        .node:active { transform: scale(0.9); }
        
        .node-data {
            background: rgba(0, 243, 255, 0.2);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            animation: pulse 1s infinite;
        }

        .node-glitch {
            background: rgba(255, 0, 170, 0.2);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            animation: shake 0.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }

        /* --- UI --- */
        .hud-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            transition: width 0.2s ease-out;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(2); }
        }

        /* Overdrive Mode */
        .overdrive-active .core-avatar {
            animation: shake 0.2s infinite;
            filter: drop-shadow(0 0 20px white);
        }
        .overdrive-active .cyber-grid {
            animation: gridMove 2s linear infinite; /* Faster */
            filter: hue-rotate(90deg);
        }
    </style>
</head>
<body>

    <!-- Background Grid -->
    <div class="cyber-grid"></div>

    <!-- Game UI Layer -->
    <div class="absolute top-0 left-0 w-full h-full p-6 flex flex-col justify-between pointer-events-none z-50">
        <!-- Top Header -->
        <div class="flex justify-between items-start">
            <div class="hud-panel p-4 pointer-events-auto">
                <h1 class="text-2xl font-bold text-cyan-400 tracking-widest">NEON SYNC</h1>
                <div class="text-xs text-gray-400">SYSTEM STATUS: <span id="status-text" class="text-green-400">STABLE</span></div>
            </div>
            <div class="hud-panel p-4 text-right pointer-events-auto min-w-[150px]">
                <div class="text-sm text-gray-400">SCORE</div>
                <div id="score" class="text-3xl font-mono font-bold text-white">0</div>
            </div>
        </div>

        <!-- Bottom Stats -->
        <div class="flex justify-center w-full pointer-events-auto">
            <div class="hud-panel p-4 w-full max-w-md">
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-cyan-400">SYNC RATE</span>
                    <span id="sync-percent" class="text-white">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div id="sync-bar" class="progress-bar"></div>
                </div>
                <div class="text-xs text-center mt-2 text-gray-500">CLICK NODES TO CHARGE CORE</div>
            </div>
        </div>
    </div>

    <!-- Central Character/Core Representation -->
    <div class="core-container">
        <div class="ring ring-3"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-1"></div>
        <div class="core-avatar"></div>
    </div>

    <!-- Game Area (Nodes spawn here) -->
    <div id="game-area" class="absolute top-0 left-0 w-full h-full overflow-hidden z-30"></div>

    <!-- Start Overlay -->
    <div id="start-screen" class="absolute top-0 left-0 w-full h-full bg-black/80 z-[60] flex flex-col items-center justify-center backdrop-blur-md">
        <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 mb-4 tracking-tighter" style="filter: drop-shadow(0 0 10px rgba(0,243,255,0.5));">
            OVERDRIVE
        </h1>
        <p class="text-gray-300 mb-8 text-center max-w-md">
            The system is destabilizing. <br>
            Click <span class="text-cyan-400">DATA ORBS (🔵)</span> to sync.<br>
            Destroy <span class="text-pink-500">GLITCHES (🟥)</span> before they drain you.
        </p>
        <button onclick="startGame()" class="px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-sm shadow-[0_0_20px_rgba(0,243,255,0.6)] transition-all transform hover:scale-105">
            INITIATE SEQUENCE
        </button>
    </div>

    <script>
        // Game State
        let score = 0;
        let syncLevel = 0;
        let isPlaying = false;
        let spawnInterval;
        let difficulty = 1000;
        let overdriveMode = false;

        // DOM Elements
        const gameArea = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const syncBar = document.getElementById('sync-bar');
        const syncPercent = document.getElementById('sync-percent');
        const statusText = document.getElementById('status-text');
        const body = document.body;

        // Audio Context (Simple Synth)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'collect') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'glitch') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'overdrive') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            score = 0;
            syncLevel = 50; // Start at 50%
            isPlaying = true;
            updateUI();
            gameLoop();
            spawnLoop();
        }

        function spawnLoop() {
            if (!isPlaying) return;
            
            // Spawn logic
            spawnNode();

            // Difficulty scaling
            let currentSpeed = overdriveMode ? 400 : Math.max(400, 1000 - (score * 5));
            
            setTimeout(spawnLoop, currentSpeed);
        }

        function spawnNode() {
            const node = document.createElement('div');
            const isGlitch = Math.random() > 0.7; // 30% chance of glitch
            
            node.classList.add('node');
            node.classList.add(isGlitch ? 'node-glitch' : 'node-data');
            
            // Random Position (avoid center core somewhat)
            const x = Math.random() * (window.innerWidth - 60);
            const y = Math.random() * (window.innerHeight - 60);
            
            node.style.left = `${x}px`;
            node.style.top = `${y}px`;

            // Content
            node.innerHTML = isGlitch ? '⚡' : '✦';

            // Click Handler
            node.onmousedown = (e) => {
                e.stopPropagation();
                handleNodeClick(node, isGlitch, x, y);
            };

            // Auto-remove after time (Missed node)
            setTimeout(() => {
                if (node.parentNode) {
                    node.remove();
                    if (!isGlitch) {
                        // Penalty for missing data
                        syncLevel = Math.max(0, syncLevel - 5);
                        createFloatingText(x, y, "-5%", "red");
                        updateUI();
                    }
                }
            }, overdriveMode ? 1500 : 3000);

            gameArea.appendChild(node);
        }

        function handleNodeClick(node, isGlitch, x, y) {
            node.remove();
            createExplosion(x, y, isGlitch ? '#ff00aa' : '#00f3ff');

            if (isGlitch) {
                // Good job destroying glitch
                score += 50;
                syncLevel = Math.min(100, syncLevel + 2);
                playSound('glitch');
                createFloatingText(x, y, "+50", "#ff00aa");
            } else {
                // Collected Data
                score += 10;
                syncLevel = Math.min(100, syncLevel + 5);
                playSound('collect');
                createFloatingText(x, y, "+10", "#00f3ff");
            }

            checkOverdrive();
            updateUI();
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = `${x + 20}px`;
                p.style.top = `${y + 20}px`;
                p.style.width = '6px';
                p.style.height = '6px';
                p.style.backgroundColor = color;
                p.style.borderRadius = '50%';
                
                // Random direction
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 50 + 20;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                p.style.transform = `translate(${tx}px, ${ty}px)`;
                p.style.transition = 'all 0.5s ease-out';
                
                gameArea.appendChild(p);
                
                // Trigger reflow
                requestAnimationFrame(() => {
                    p.style.transform = `translate(${tx * 2}px, ${ty * 2}px) scale(0)`;
                    p.style.opacity = 0;
                });

                setTimeout(() => p.remove(), 500);
            }
        }

        function createFloatingText(x, y, text, color) {
            const el = document.createElement('div');
            el.innerText = text;
            el.style.position = 'absolute';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.color = color;
            el.style.fontWeight = 'bold';
            el.style.pointerEvents = 'none';
            el.style.transition = 'all 0.8s ease-out';
            el.style.zIndex = 100;
            gameArea.appendChild(el);

            requestAnimationFrame(() => {
                el.style.transform = 'translateY(-50px)';
                el.style.opacity = 0;
            });

            setTimeout(() => el.remove(), 800);
        }

        function checkOverdrive() {
            if (syncLevel >= 100 && !overdriveMode) {
                activateOverdrive();
            } else if (syncLevel <= 0) {
                gameOver();
            }
        }

        function activateOverdrive() {
            overdriveMode = true;
            body.classList.add('overdrive-active');
            statusText.innerText = "OVERDRIVE!!!";
            statusText.className = "text-pink-500 animate-pulse";
            playSound('overdrive');
            
            // Bonus points over time
            let bonusInterval = setInterval(() => {
                if (!overdriveMode) clearInterval(bonusInterval);
                score += 5;
                updateUI();
            }, 100);

            // Lasts 5 seconds then resets
            setTimeout(() => {
                overdriveMode = false;
                body.classList.remove('overdrive-active');
                statusText.innerText = "STABLE";
                statusText.className = "text-green-400";
                syncLevel = 50; // Reset to half
                updateUI();
            }, 5000);
        }

        function gameOver() {
            isPlaying = false;
            gameArea.innerHTML = ''; // Clear nodes
            document.getElementById('start-screen').style.display = 'flex';
            document.querySelector('#start-screen h1').innerText = "SYSTEM FAILURE";
            document.querySelector('#start-screen p').innerHTML = `Final Score: <span class="text-cyan-400">${score}</span><br>Try again to stabilize the core.`;
            document.querySelector('#start-screen button').innerText = "REBOOT SYSTEM";
        }

        function gameLoop() {
            if (!isPlaying) return;
            
            // Passive drain
            if (!overdriveMode) {
                syncLevel -= 0.05; 
                if (syncLevel <= 0) gameOver();
            }
            
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            scoreEl.innerText = Math.floor(score);
            syncBar.style.width = `${Math.max(0, Math.min(100, syncLevel))}%`;
            syncPercent.innerText = `${Math.floor(syncLevel)}%`;
            
            // Color change based on health
            if (syncLevel < 30) {
                syncBar.style.background = 'red';
            } else if (overdriveMode) {
                syncBar.style.background = 'white';
            } else {
                syncBar.style.background = 'linear-gradient(90deg, var(--neon-cyan), var(--neon-pink))';
            }
        }
    </script>
</body>
</html>
