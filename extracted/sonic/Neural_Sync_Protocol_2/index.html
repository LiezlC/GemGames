<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Sync Protocol</title>
    <style>
        :root {
            --human-color: #00f3ff;
            --human-dim: #004d52;
            --ai-color: #ff0055;
            --ai-dim: #52001b;
            --bg-color: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        /* Background Ambiance */
        .ambient-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 243, 255, 0.1), transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(255, 0, 85, 0.15), transparent 60%);
            z-index: -1;
            transition: background 2s ease;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.03);
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* Main Interface Layout */
        .interface-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1000px;
            height: 60vh;
            position: relative;
        }

        /* Profiles */
        .profile {
            width: 300px;
            height: 400px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        /* Human Styling */
        .human-path {
            fill: #0a0a0a;
            stroke: var(--human-color);
            stroke-width: 2;
            transition: fill 0.5s;
        }
        .human-glow {
            filter: drop-shadow(0 0 5px var(--human-color));
        }

        /* AI Styling */
        .ai-path {
            fill: #0a0a0a;
            stroke: var(--ai-color);
            stroke-width: 2;
        }
        .ai-glow {
            filter: drop-shadow(0 0 8px var(--ai-color));
        }

        /* Neural Nodes (Game Buttons) */
        .node-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .node {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: var(--ai-dim);
            border: 1px solid var(--ai-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 5px var(--ai-dim);
        }

        .node.active {
            background-color: #fff;
            box-shadow: 0 0 15px var(--ai-color), 0 0 30px var(--ai-color);
            transform: scale(1.3);
            border-color: white;
        }

        .node:active {
            transform: scale(0.9);
        }

        /* Center HUD */
        .hud {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 300px;
            z-index: 10;
        }

        .sync-meter-container {
            width: 100%;
            height: 4px;
            background: #333;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .sync-meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--human-color), var(--ai-color));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--human-color);
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .status-text {
            font-size: 0.8rem;
            color: #888;
            min-height: 1.2em;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--human-color);
            color: var(--human-color);
            padding: 10px 30px;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--human-color);
            color: black;
            box-shadow: 0 0 20px var(--human-color);
        }

        .btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
            box-shadow: none;
            background: transparent;
        }

        /* Glitch Effect Class */
        .glitch {
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: var(--ai-color);
        }

        @keyframes glitch-anim {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        /* Success State */
        .synced .ambient-light {
            background: radial-gradient(circle at 50% 50%, rgba(200, 100, 255, 0.2), transparent 80%);
        }
        .synced .human-path { stroke: white; }
        .synced .ai-path { stroke: white; }

        /* Responsive */
        @media (max-width: 768px) {
            .interface-container {
                flex-direction: column;
                height: 80vh;
            }
            .profile {
                width: 200px;
                height: 250px;
            }
            .hud {
                position: relative;
                transform: none;
                left: auto;
                top: auto;
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-light" id="bg-light"></div>
    <div class="scanline"></div>

    <div class="interface-container">
        
        <!-- Left: Human -->
        <div class="profile" id="human-profile">
            <svg viewBox="0 0 200 300" class="human-glow">
                <!-- Abstract Human Profile -->
                <path class="human-path" d="M 80 50 C 60 50, 40 70, 40 100 L 40 180 C 40 220, 70 250, 100 250 L 120 250 L 120 280 L 160 280 L 160 250 C 180 250, 190 230, 190 200 L 190 150 C 190 150, 195 140, 160 140 L 160 100 C 160 60, 130 50, 80 50 Z" />
                <!-- Glasses -->
                <path fill="none" stroke="rgba(0,243,255,0.5)" stroke-width="2" d="M 155 125 L 190 120 M 155 125 C 145 125, 145 145, 155 145" />
            </svg>
        </div>

        <!-- Center: HUD -->
        <div class="hud">
            <h1 id="title">NEURAL SYNC</h1>
            <div class="status-text" id="status">WAITING FOR CONNECTION...</div>
            <div class="sync-meter-container">
                <div class="sync-meter-fill" id="sync-bar"></div>
            </div>
            <button class="btn" id="start-btn" onclick="startGame()">INITIATE HANDSHAKE</button>
        </div>

        <!-- Right: AI -->
        <div class="profile" id="ai-profile">
            <svg viewBox="0 0 200 300" class="ai-glow">
                <!-- Abstract Robot Profile (Facing Left) -->
                <path class="ai-path" d="M 120 50 C 140 50, 160 70, 160 100 L 160 150 C 160 180, 150 200, 120 200 L 120 230 L 100 250 C 70 250, 40 220, 40 180 L 40 120 C 40 80, 80 50, 120 50 Z" />
                <!-- Mechanical details -->
                <path fill="none" stroke="rgba(255,0,85,0.3)" stroke-width="1" d="M 60 120 L 140 120 M 60 160 L 120 160 M 100 55 L 100 100" />
                <circle cx="70" cy="140" r="15" fill="none" stroke="rgba(255,0,85,0.5)" stroke-width="2" />
            </svg>
            
            <!-- Interactive Nodes Overlay -->
            <div class="node-container" id="node-grid">
                <!-- Nodes positioned roughly over the robot head SVG area -->
                <!-- Using percentages to position relative to the 300x400 container -->
                <div class="node" style="top: 25%; left: 50%;" data-id="0"></div>
                <div class="node" style="top: 35%; left: 30%;" data-id="1"></div>
                <div class="node" style="top: 35%; left: 70%;" data-id="2"></div>
                <div class="node" style="top: 50%; left: 25%;" data-id="3"></div>
                <div class="node" style="top: 50%; left: 50%;" data-id="4"></div>
                <div class="node" style="top: 65%; left: 40%;" data-id="5"></div>
            </div>
        </div>

    </div>

    <script>
        // Game State
        const gameState = {
            sequence: [],
            playerInput: [],
            level: 0,
            isPlaying: false,
            isPlayerTurn: false,
            syncPercentage: 0
        };

        // Audio Context for Synthesis (Simple Beeps)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type = 'sine', duration = 0.2) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // DOM Elements
        const nodes = document.querySelectorAll('.node');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const syncBar = document.getElementById('sync-bar');
        const title = document.getElementById('title');

        // Setup Nodes
        nodes.forEach(node => {
            node.addEventListener('mousedown', () => {
                if (!gameState.isPlayerTurn) return;
                
                const id = parseInt(node.dataset.id);
                activateNode(id, true); // true = player action
                gameState.playerInput.push(id);
                
                checkInput();
            });
        });

        function activateNode(id, isPlayer) {
            const node = document.querySelector(`.node[data-id="${id}"]`);
            node.classList.add('active');
            
            // Sound
            const baseFreq = isPlayer ? 440 : 220; // Higher for human, lower for AI
            const note = baseFreq + (id * 50);
            playTone(note, isPlayer ? 'sine' : 'square');

            setTimeout(() => {
                node.classList.remove('active');
            }, 300);
        }

        function startGame() {
            gameState.level = 0;
            gameState.syncPercentage = 0;
            gameState.isPlaying = true;
            syncBar.style.width = '0%';
            document.body.classList.remove('synced');
            startBtn.disabled = true;
            startBtn.innerText = "LINK ACTIVE";
            
            statusText.innerText = "ESTABLISHING NEURAL LINK...";
            statusText.classList.remove('glitch');
            
            setTimeout(nextLevel, 1000);
        }

        function nextLevel() {
            gameState.level++;
            gameState.playerInput = [];
            gameState.sequence = [];
            
            // Update Status
            statusText.innerText = `SYNC SEQUENCE: ${gameState.level}`;
            
            // Generate Sequence
            const length = 2 + gameState.level;
            for(let i=0; i<length; i++) {
                gameState.sequence.push(Math.floor(Math.random() * 6));
            }

            playSequence();
        }

        function playSequence() {
            gameState.isPlayerTurn = false;
            let i = 0;
            
            const interval = setInterval(() => {
                activateNode(gameState.sequence[i], false);
                i++;
                
                if(i >= gameState.sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        gameState.isPlayerTurn = true;
                        statusText.innerText = "REPLICATE PATTERN";
                    }, 500);
                }
            }, 600);
        }

        function checkInput() {
            const currentIdx = gameState.playerInput.length - 1;
            
            if(gameState.playerInput[currentIdx] !== gameState.sequence[currentIdx]) {
                // Mistake
                gameOver();
                return;
            }

            if(gameState.playerInput.length === gameState.sequence.length) {
                // Level Complete
                gameState.isPlayerTurn = false;
                gameState.syncPercentage += 20;
                if(gameState.syncPercentage > 100) gameState.syncPercentage = 100;
                
                syncBar.style.width = `${gameState.syncPercentage}%`;
                statusText.innerText = "PATTERN MATCHED. INTEGRATING...";
                
                if(gameState.syncPercentage >= 100) {
                    gameWin();
                } else {
                    setTimeout(nextLevel, 1000);
                }
            }
        }

        function gameOver() {
            gameState.isPlaying = false;
            gameState.isPlayerTurn = false;
            statusText.innerText = "LINK FAILED. DESYNCHRONIZED.";
            statusText.classList.add('glitch');
            playTone(100, 'sawtooth', 0.5);
            
            // Shake effect
            document.body.style.transform = "translateX(5px)";
            setTimeout(() => document.body.style.transform = "translateX(-5px)", 50);
            setTimeout(() => document.body.style.transform = "translateX(0)", 100);

            startBtn.disabled = false;
            startBtn.innerText = "RETRY CONNECTION";
        }

        function gameWin() {
            gameState.isPlaying = false;
            statusText.innerText = "SYMBIOSIS ACHIEVED";
            title.innerText = "ONE MIND";
            document.body.classList.add('synced');
            
            // Victory Sound
            playTone(523.25, 'sine', 0.1);
            setTimeout(() => playTone(659.25, 'sine', 0.1), 100);
            setTimeout(() => playTone(783.99, 'sine', 0.4), 200);

            startBtn.disabled = false;
            startBtn.innerText = "RESET SYSTEM";
        }

    </script>
</body>
</html>
