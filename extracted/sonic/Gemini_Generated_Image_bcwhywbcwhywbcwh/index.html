<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serpent's Cove: Guardian of the Deep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            user-select: none;
        }

        /* --- Scenery & Atmosphere --- */
        .scene-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #fdfbfb 0%, #ebedee 20%, #a1c4fd 50%, #c2e9fb 100%); /* Misty sky */
        }

        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #ffe259 0%, #ffa751 100%); /* Sunset/Sunrise hint */
            opacity: 0.3;
            z-index: 0;
        }

        .ocean {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, #20B2AA 0%, #008B8B 40%, #004d4d 100%); /* Teal to dark teal */
            z-index: 1;
            overflow: hidden;
        }

        /* Waves Animation */
        .wave {
            position: absolute;
            width: 200%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 45%;
            animation: drift 10s infinite linear;
            z-index: 2;
        }
        .wave:nth-child(1) { top: -70%; left: -50%; animation-duration: 12s; opacity: 0.3; }
        .wave:nth-child(2) { top: -65%; left: -30%; animation-duration: 15s; opacity: 0.2; animation-direction: reverse; }
        .wave:nth-child(3) { top: -80%; left: -10%; animation-duration: 8s; opacity: 0.1; }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Rocks / Cliffs */
        .cliff {
            position: absolute;
            background: #5D4037; /* Earthy brown */
            z-index: 10;
            box-shadow: inset 10px 10px 20px rgba(0,0,0,0.4);
        }
        
        /* Left Cliff */
        .cliff-left {
            bottom: 0;
            left: 0;
            width: 30vw;
            height: 40vh;
            clip-path: polygon(0% 100%, 100% 100%, 85% 80%, 90% 60%, 60% 40%, 40% 50%, 20% 20%, 0% 30%);
            background: linear-gradient(135deg, #795548 0%, #3E2723 100%);
        }

        /* Right Cliff */
        .cliff-right {
            bottom: 0;
            right: 0;
            width: 40vw;
            height: 50vh;
            clip-path: polygon(10% 100%, 100% 100%, 100% 20%, 80% 10%, 60% 30%, 40% 50%, 20% 80%);
            background: linear-gradient(225deg, #8D6E63 0%, #4E342E 100%);
        }

        /* Background distant cliffs */
        .cliff-bg {
            bottom: 55%;
            right: 0;
            width: 60vw;
            height: 30vh;
            background: #8d6e63;
            opacity: 0.6;
            clip-path: polygon(20% 100%, 100% 100%, 100% 0%, 70% 20%, 50% 10%, 30% 30%, 0% 80%);
            z-index: 0;
        }

        /* Mist Overlay */
        .mist {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(255,255,255,0.2), transparent);
            z-index: 20;
            pointer-events: none;
        }

        /* --- Game Entities --- */
        .entity {
            position: absolute;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            z-index: 5;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            user-select: none;
            /* Bobbing animation */
            animation: bob 2s infinite ease-in-out;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .entity:active {
            transform: scale(0.9);
        }

        .serpent {
            filter: hue-rotate(140deg) drop-shadow(0 0 10px rgba(0, 255, 200, 0.5)); /* Make dragon teal */
        }

        .splash-effect {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 3px solid white;
            border-radius: 50%;
            animation: splashAnim 0.5s forwards;
            pointer-events: none;
            z-index: 6;
        }

        @keyframes splashAnim {
            0% { transform: scale(0); opacity: 1; border-width: 5px; }
            100% { transform: scale(2); opacity: 0; border-width: 0px; }
        }

        .score-popup {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUp 0.8s forwards;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* --- UI Elements --- */
        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .menu-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .title-text {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00C9FF 0%, #92FE9D 100%);
            color: #0f172a;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            box-shadow: 0 0 20px rgba(0, 201, 255, 0.4);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 201, 255, 0.6);
        }

        .health-bar {
            width: 150px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        .health-fill {
            height: 100%;
            background: #ef4444;
            width: 100%;
            transition: width 0.3s ease;
        }

    </style>
</head>
<body>

    <div class="scene-container" id="game-container">
        <!-- Background Elements -->
        <div class="sky"></div>
        <div class="cliff-bg"></div>
        
        <!-- Ocean & Waves -->
        <div class="ocean">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>

        <!-- Foreground Cliffs -->
        <div class="cliff cliff-left"></div>
        <div class="cliff cliff-right"></div>
        <div class="mist"></div>

        <!-- HUD -->
        <div class="hud" id="hud" style="display: none;">
            <div class="hud-item">
                <span>🛡️</span>
                <div class="health-bar"><div class="health-fill" id="health-fill"></div></div>
            </div>
            <div class="hud-item">
                <span>✨</span>
                <span id="score">0</span>
            </div>
        </div>

        <!-- Start Screen -->
        <div class="menu-overlay" id="start-screen">
            <h1 class="title-text">Serpent's Cove</h1>
            <p class="text-gray-300 text-xl mb-8 max-w-md">
                The ancient sea serpents are rising from the depths! <br>
                Click the <strong>Serpents (🐉)</strong> to banish them. <br>
                Protect the <strong>Dolphins (🐬)</strong> and <strong>Seals (🦭)</strong>—do not disturb them!
            </p>
            <button class="btn-primary" onclick="startGame()">Enter the Cove</button>
        </div>

        <!-- Game Over Screen -->
        <div class="menu-overlay" id="game-over-screen" style="display: none;">
            <h1 class="title-text" style="font-size: 3rem;">The Coast is Lost</h1>
            <p class="text-gray-300 text-2xl mb-4">Final Score: <span id="final-score" class="text-white font-bold">0</span></p>
            <button class="btn-primary" onclick="resetGame()">Try Again</button>
        </div>
    </div>

    <script>
        // Game State
        let score = 0;
        let health = 100;
        let isPlaying = false;
        let spawnInterval;
        let difficultyInterval;
        let spawnRate = 1500;
        let entities = [];

        // DOM Elements
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const healthFill = document.getElementById('health-fill');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const hud = document.getElementById('hud');

        // Audio Context (Simple Beeps)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'bad') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            hud.style.display = 'flex';
            
            score = 0;
            health = 100;
            spawnRate = 1500;
            entities = [];
            updateUI();
            isPlaying = true;

            // Clear any existing entities
            document.querySelectorAll('.entity').forEach(e => e.remove());

            // Start Loops
            spawnLoop();
            difficultyLoop();
        }

        function resetGame() {
            startGame();
        }

        function gameOver() {
            isPlaying = false;
            clearTimeout(spawnInterval);
            clearInterval(difficultyInterval);
            hud.style.display = 'none';
            gameOverScreen.style.display = 'flex';
            finalScoreEl.innerText = score;
        }

        function updateUI() {
            scoreEl.innerText = score;
            healthFill.style.width = `${health}%`;
            if (health <= 0) gameOver();
        }

        function spawnLoop() {
            if (!isPlaying) return;
            spawnEntity();
            // Randomize spawn rate slightly
            let nextSpawn = spawnRate * (0.8 + Math.random() * 0.4); 
            spawnInterval = setTimeout(spawnLoop, nextSpawn);
        }

        function difficultyLoop() {
            difficultyInterval = setInterval(() => {
                if (spawnRate > 500) spawnRate -= 50;
            }, 5000);
        }

        function spawnEntity() {
            const typeRoll = Math.random();
            let type = 'serpent';
            let emoji = '🐉';
            let duration = 3000; // Time before it disappears naturally

            // 60% Enemy, 40% Friend
            if (typeRoll > 0.6) {
                type = Math.random() > 0.5 ? 'dolphin' : 'seal';
                emoji = type === 'dolphin' ? '🐬' : '🦭';
                duration = 2500;
            }

            const el = document.createElement('div');
            el.classList.add('entity');
            if (type === 'serpent') el.classList.add('serpent');
            el.innerText = emoji;

            // Position Logic (Keep within water area)
            // Water is roughly bottom 60%, but we want to avoid the very bottom edge and the cliffs
            // X: 10% to 90%
            // Y: Bottom 10% to 50%
            const x = 10 + Math.random() * 80;
            const y = 10 + Math.random() * 40; // bottom percentage

            el.style.left = `${x}%`;
            el.style.bottom = `${y}%`;
            
            // Random Size variation
            const scale = 0.8 + Math.random() * 0.5;
            el.style.transform = `scale(${scale})`;

            // Spawn Animation
            el.style.opacity = '0';
            el.style.transform = `translateY(50px) scale(${scale})`;
            
            container.appendChild(el);

            // Trigger reflow for transition
            requestAnimationFrame(() => {
                el.style.opacity = '1';
                el.style.transform = `translateY(0) scale(${scale})`;
            });

            // Interaction
            el.onmousedown = (e) => {
                if (!isPlaying) return;
                e.stopPropagation();
                handleInteraction(type, el, e.clientX, e.clientY);
            };

            // Despawn Logic
            setTimeout(() => {
                if (el.parentNode) {
                    // If it's a serpent and it despawns naturally, player takes damage
                    if (type === 'serpent') {
                        health -= 10;
                        createPopup(x, y, "-10 HP", "red");
                        updateUI();
                        playSound('bad');
                    }
                    el.style.opacity = '0';
                    el.style.transform = `translateY(50px) scale(${scale})`;
                    setTimeout(() => el.remove(), 300);
                }
            }, duration);
        }

        function handleInteraction(type, el, clientX, clientY) {
            // Visual Splash
            createSplash(clientX, clientY);

            if (type === 'serpent') {
                score += 100;
                createPopup(clientX, clientY, "+100", "#4ade80"); // Green
                playSound('hit');
            } else {
                score -= 50;
                health -= 10;
                createPopup(clientX, clientY, "Don't Touch!", "#f87171"); // Red
                playSound('bad');
            }
            updateUI();

            // Remove entity
            el.style.transition = "transform 0.1s, opacity 0.1s";
            el.style.transform = "scale(0)";
            el.style.opacity = "0";
            setTimeout(() => el.remove(), 100);
        }

        function createSplash(x, y) {
            const splash = document.createElement('div');
            splash.classList.add('splash-effect');
            splash.style.left = (x - 25) + 'px';
            splash.style.top = (y - 25) + 'px';
            container.appendChild(splash);
            setTimeout(() => splash.remove(), 500);
        }

        function createPopup(x, y, text, color) {
            // If x,y are raw coords, use them. If they are percentages (from despawn logic), convert.
            // The despawn logic passes percentages, click passes pixels.
            // Let's normalize: check if x < 100 (likely percentage)
            
            let left, top;
            if (x < 100 && y < 100) {
                 // It's percentage based (from auto-despawn damage)
                 left = (window.innerWidth * (x/100)) + 'px';
                 top = (window.innerHeight - (window.innerHeight * (y/100))) + 'px';
            } else {
                left = x + 'px';
                top = y + 'px';
            }

            const popup = document.createElement('div');
            popup.classList.add('score-popup');
            popup.innerText = text;
            popup.style.color = color;
            popup.style.left = left;
            popup.style.top = top;
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

    </script>
</body>
</html>
