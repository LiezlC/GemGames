<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Void Explorer</title>
    <style>
        :root {
            --color-fire: #ff6b35;
            --color-ice: #00d2ff;
            --color-void: #0a0a12;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--color-void);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 300px;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--color-fire), var(--color-ice));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--color-ice);
        }

        button {
            background: linear-gradient(45deg, var(--color-fire), #ff2a2a);
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--color-fire);
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--color-ice);
            color: var(--color-ice);
        }
        
        button.secondary:hover {
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 15px var(--color-ice);
        }

        /* Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The Portal Effect (CSS) */
        .portal-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10vw;
            height: 10vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,200,100,0) 70%);
            box-shadow: 
                0 0 60px 20px var(--color-fire),
                inset 0 0 40px 10px var(--color-ice);
            opacity: 0.6;
            z-index: 2;
            animation: pulse 4s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; filter: hue-rotate(30deg); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
        }

        /* Instruction Hint */
        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 10;
            animation: fadeHint 3s infinite;
        }

        @keyframes fadeHint {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Cosmic Void</h1>
        
        <div class="control-group">
            <label>Energy Flow Speed</label>
            <input type="range" id="speedRange" min="1" max="20" value="5">
        </div>

        <div class="control-group">
            <label>Chaos Level</label>
            <input type="range" id="chaosRange" min="0" max="100" value="20">
        </div>

        <button id="warpBtn">Initiate Warp Jump</button>
        <button id="spawnBtn" class="secondary">Release Life Form 🦋</button>
    </div>

    <div class="portal-core" id="portal"></div>
    <div class="hint">Click and Drag to disrupt the energy field • Catch the butterflies</div>
    
    <canvas id="canvas-container"></canvas>

    <script>
        /**
         * COSMIC VOID ENGINE
         * Recreating the surreal landscape using HTML5 Canvas particles and flow fields.
         */

        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let butterflies = [];
        let mountains = [];
        
        // State
        let mouse = { x: -1000, y: -1000, active: false };
        let config = {
            speed: 5,
            chaos: 20,
            colorPhase: 0,
            warpMode: false
        };

        // Colors derived from image
        const PALETTE = {
            fire: ['#ff4500', '#ff8c00', '#ffae42', '#ff6b35'],
            ice: ['#00bfff', '#1e90ff', '#87cefa', '#4169e1'],
            void: '#050510'
        };

        // Resize Handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateMountains();
        }
        window.addEventListener('resize', resize);

        // Mountain Generation (Procedural Terrain)
        function generateMountains() {
            mountains = [];
            // Left Mountain
            let pointsL = [];
            for(let i=0; i<width/2; i+=10) {
                let noise = Math.sin(i * 0.02) * 50 + Math.cos(i * 0.05) * 30;
                pointsL.push({x: i, y: height - 100 - (i * 0.5) + noise});
            }
            mountains.push({points: pointsL, color: '#1a1a2e'});

            // Right Mountain
            let pointsR = [];
            for(let i=width; i>width/2; i-=10) {
                let noise = Math.sin(i * 0.03) * 60 + Math.cos(i * 0.08) * 20;
                pointsR.push({x: i, y: height - 100 - ((width-i) * 0.6) + noise});
            }
            mountains.push({points: pointsR, color: '#16213e'});
        }

        // Particle Class
        class Particle {
            constructor(isFire) {
                this.reset(isFire);
            }

            reset(isFire) {
                // Spawn in a circle around the center or random
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * (width > height ? width : height); // Spawn far out
                
                this.x = (width/2) + Math.cos(angle) * radius;
                this.y = (height/2) + Math.sin(angle) * radius;
                
                this.z = Math.random() * 2 + 0.5; // Depth/Size
                this.isFire = isFire !== undefined ? isFire : Math.random() > 0.5;
                
                this.vx = 0;
                this.vy = 0;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.001;
            }

            update() {
                // Calculate vector to center
                const dx = (width/2) - this.x;
                const dy = (height/2) - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Swirling force
                const angle = Math.atan2(dy, dx);
                const swirlAngle = angle + (this.isFire ? 1.5 : -1.5); // Fire swirls one way, Ice the other
                
                // Base speed towards center
                let speed = config.speed * 0.5 * (1 + config.chaos/50);
                
                if (config.warpMode) speed *= 5;

                // Apply forces
                this.vx += Math.cos(swirlAngle) * 0.1;
                this.vy += Math.sin(swirlAngle) * 0.1;
                
                // Pull to center
                this.vx += (dx / dist) * speed * 0.1;
                this.vy += (dy / dist) * speed * 0.1;

                // Mouse Interaction (Repel)
                if (mouse.active) {
                    const mdx = this.x - mouse.x;
                    const mdy = this.y - mouse.y;
                    const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                    if (mdist < 200) {
                        this.vx += (mdx/mdist) * 2;
                        this.vy += (mdy/mdist) * 2;
                    }
                }

                // Friction
                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx;
                this.y += this.vy;

                // Life cycle
                if (dist < 50 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset(this.isFire);
                }
            }

            draw() {
                const palette = this.isFire ? PALETTE.fire : PALETTE.ice;
                const color = palette[Math.floor(Math.random() * palette.length)];
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.z, 0, Math.PI * 2);
                ctx.fillStyle = color;
                
                // Glow effect
                if (config.warpMode) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = color;
                    // Stretch particles in warp
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx*2, this.y - this.vy*2);
                    ctx.strokeStyle = color;
                    ctx.stroke();
                } else {
                    ctx.shadowBlur = 0;
                    ctx.fill();
                }
            }
        }

        // Butterfly Entity
        class Butterfly {
            constructor() {
                this.x = Math.random() * width;
                this.y = height - 50;
                this.size = 20;
                this.angle = Math.random() * Math.PI * 2;
                this.flapSpeed = 0.2;
                this.flap = 0;
                this.targetX = Math.random() * width;
                this.targetY = Math.random() * (height/2);
                this.color = '#00d2ff';
            }

            update() {
                // Move erratically towards target
                this.x += Math.cos(this.angle) * 2;
                this.y += Math.sin(this.angle) * 2;
                
                // Change direction randomly
                if (Math.random() < 0.05) {
                    this.targetX = Math.random() * width;
                    this.targetY = Math.random() * (height/2);
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    this.angle = Math.atan2(dy, dx);
                }

                this.flap += this.flapSpeed;

                // Interaction: Click to catch (remove)
                if (mouse.active) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 30) {
                        createExplosion(this.x, this.y, PALETTE.ice[0]);
                        return false; // Remove
                    }
                }

                // Wrap screen
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;

                return true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI/2);
                
                // Draw Butterfly Shape
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                
                const wingScale = Math.abs(Math.sin(this.flap));
                
                ctx.beginPath();
                // Left Wing
                ctx.ellipse(-8, 0, 8 * wingScale, 15, Math.PI/4, 0, Math.PI*2);
                // Right Wing
                ctx.ellipse(8, 0, 8 * wingScale, 15, -Math.PI/4, 0, Math.PI*2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Explosion Effect
        let explosions = [];
        function createExplosion(x, y, color) {
            for(let i=0; i<20; i++) {
                explosions.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        // Init
        resize();
        for(let i=0; i<400; i++) {
            particles.push(new Particle(i < 200)); // Half fire, half ice
        }
        butterflies.push(new Butterfly());

        // Main Loop
        function animate() {
            // Clear with trail effect
            ctx.fillStyle = config.warpMode ? 'rgba(5, 5, 16, 0.1)' : 'rgba(5, 5, 16, 0.4)';
            ctx.fillRect(0, 0, width, height);

            // Draw Mountains
            mountains.forEach(mtn => {
                ctx.beginPath();
                ctx.moveTo(0, height);
                mtn.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.lineTo(width, height);
                ctx.fillStyle = mtn.color;
                ctx.shadowBlur = 0;
                ctx.fill();
                
                // Edge highlight
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            // Draw Water Reflection (Simple gradient overlay at bottom)
            let gradient = ctx.createLinearGradient(0, height-100, 0, height);
            gradient.addColorStop(0, 'rgba(0, 210, 255, 0.0)');
            gradient.addColorStop(1, 'rgba(0, 210, 255, 0.2)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, height-100, width, 100);

            // Update Particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Update Butterflies
            butterflies = butterflies.filter(b => {
                const alive = b.update();
                if(alive) b.draw();
                return alive;
            });

            // Update Explosions
            explosions = explosions.filter(e => {
                e.x += e.vx;
                e.y += e.vy;
                e.life -= 0.05;
                ctx.fillStyle = e.color;
                ctx.globalAlpha = e.life;
                ctx.beginPath();
                ctx.arc(e.x, e.y, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
                return e.life > 0;
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Event Listeners
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        canvas.addEventListener('mousedown', () => {
            mouse.active = true;
            // Create a burst
            createExplosion(mouse.x, mouse.y, '#ffffff');
        });

        canvas.addEventListener('mouseup', () => {
            mouse.active = false;
        });

        // UI Controls
        document.getElementById('speedRange').addEventListener('input', (e) => {
            config.speed = parseInt(e.target.value);
        });

        document.getElementById('chaosRange').addEventListener('input', (e) => {
            config.chaos = parseInt(e.target.value);
        });

        document.getElementById('spawnBtn').addEventListener('click', () => {
            butterflies.push(new Butterfly());
        });

        const warpBtn = document.getElementById('warpBtn');
        warpBtn.addEventListener('click', () => {
            config.warpMode = !config.warpMode;
            warpBtn.innerText = config.warpMode ? "Disengage Warp" : "Initiate Warp Jump";
            warpBtn.style.background = config.warpMode ? "linear-gradient(45deg, #00d2ff, #0000ff)" : "linear-gradient(45deg, var(--color-fire), #ff2a2a)";
            
            const portal = document.getElementById('portal');
            if(config.warpMode) {
                portal.style.animationDuration = '0.5s';
                portal.style.transform = 'translate(-50%, -50%) scale(3)';
            } else {
                portal.style.animationDuration = '4s';
                portal.style.transform = 'translate(-50%, -50%) scale(1)';
            }
        });

    </script>
</body>
</html>
