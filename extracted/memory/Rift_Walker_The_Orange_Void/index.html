<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift Walker: The Orange Void</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Lato', sans-serif;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }

        /* The Game Container - Matches the Aspect Ratio of the art roughly */
        #game-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #d6d1c4 0%, #e8e0d0 40%, #2b2b2b 100%);
        }

        /* --- Artistic Background Layers --- */
        .painterly-stroke {
            position: absolute;
            filter: blur(20px);
            opacity: 0.8;
        }

        /* The Giant Orange Rift */
        #rift-core {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 90%;
            background: linear-gradient(180deg, #ff8c00 0%, #ff4500 60%, transparent 100%);
            filter: blur(30px);
            z-index: 1;
            animation: pulseRift 4s infinite ease-in-out;
        }

        @keyframes pulseRift {
            0%, 100% { opacity: 0.8; width: 40%; }
            50% { opacity: 1; width: 45%; }
        }

        /* Jagged Mountains (CSS Shapes) */
        .mountain {
            position: absolute;
            bottom: 0;
            width: 50%;
            height: 70%;
            background: #222;
            z-index: 2;
        }
        .mountain.left {
            left: 0;
            clip-path: polygon(0 0, 30% 20%, 10% 40%, 60% 60%, 20% 80%, 100% 100%, 0% 100%);
            background: linear-gradient(90deg, #1a1a1a, #333);
        }
        .mountain.right {
            right: 0;
            clip-path: polygon(100% 0, 70% 15%, 90% 35%, 40% 65%, 80% 85%, 0% 100%, 100% 100%);
            background: linear-gradient(-90deg, #1a1a1a, #3d3d3d);
        }

        /* Foreground Ground */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to top, #000 0%, #2d2d2d 100%);
            z-index: 3;
            clip-path: polygon(0 20%, 20% 0%, 50% 20%, 80% 0%, 100% 20%, 100% 100%, 0% 100%);
        }

        /* --- Game Entities --- */
        
        /* The Hero */
        #hero {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 60px;
            z-index: 10;
            transition: left 0.1s ease-out;
        }

        .cape {
            position: absolute;
            top: 10px;
            left: 5px;
            width: 30px;
            height: 40px;
            background: #b91c1c; /* Red/Dark Orange Cape */
            clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
            transform-origin: top center;
            animation: capeFlutter 0.2s infinite alternate;
        }

        @keyframes capeFlutter {
            from { transform: rotate(5deg) skewX(5deg); }
            to { transform: rotate(-5deg) skewX(-5deg); }
        }

        .body-shape {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 20px;
            height: 50px;
            background: black;
            border-radius: 5px;
        }
        
        .head-shape {
            position: absolute;
            top: 0;
            left: 12px;
            width: 16px;
            height: 16px;
            background: black;
            border-radius: 50%;
        }

        /* Obstacles (Falling Rocks/Energy) */
        .obstacle {
            position: absolute;
            background: #333;
            z-index: 5;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .title-font {
            font-family: 'Cinzel', serif;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        .btn {
            background: linear-gradient(45deg, #ff8c00, #ff4500);
            border: none;
            padding: 15px 40px;
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff4500;
        }

        .hidden {
            display: none !important;
        }

        /* Particles */
        .particle {
            position: absolute;
            background: rgba(255, 140, 0, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="game-stage">
        <!-- Background Artsy Elements -->
        <div id="rift-core"></div>
        <div class="mountain left"></div>
        <div class="mountain right"></div>
        
        <!-- Dynamic Game Elements Container -->
        <div id="world-container"></div>

        <!-- Foreground -->
        <div id="ground"></div>

        <!-- The Player -->
        <div id="hero">
            <div class="cape"></div>
            <div class="body-shape"></div>
            <div class="head-shape"></div>
        </div>

        <!-- UI -->
        <div id="ui-layer">
            <div class="flex justify-between items-start text-white">
                <div>
                    <h2 class="text-xl opacity-70">DISTANCE</h2>
                    <p id="score-display" class="text-4xl font-bold title-font">0m</p>
                </div>
                <div class="text-right">
                    <h2 class="text-xl opacity-70">HEALTH</h2>
                    <div class="flex gap-1" id="health-display">
                        <span class="text-2xl text-orange-500">♥</span>
                        <span class="text-2xl text-orange-500">♥</span>
                        <span class="text-2xl text-orange-500">♥</span>
                    </div>
                </div>
            </div>
            <div class="text-center text-white opacity-50 text-sm mb-4">
                Use Mouse or Touch to Move | Dodge the Debris
            </div>
        </div>

        <!-- Screens -->
        <div id="start-screen">
            <h1 class="text-6xl text-white title-font mb-2 text-center">RIFT WALKER</h1>
            <p class="text-orange-200 text-xl mb-8 italic">"Into the unknown, the fire calls..."</p>
            <button class="btn" onclick="startGame()">ENTER THE VOID</button>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1 class="text-6xl text-white title-font mb-2 text-center">FALLEN</h1>
            <p class="text-gray-300 text-xl mb-4">The rift consumed you.</p>
            <p class="text-orange-400 text-3xl title-font mb-8">Distance: <span id="final-score">0</span>m</p>
            <button class="btn" onclick="resetGame()">RISE AGAIN</button>
        </div>
    </div>

    <script>
        // --- Game Config ---
        const state = {
            isPlaying: false,
            score: 0,
            health: 3,
            speed: 5,
            spawnRate: 60, // Frames between spawns
            frame: 0,
            heroX: 50, // Percentage
            obstacles: [],
            particles: []
        };

        // --- DOM Elements ---
        const hero = document.getElementById('hero');
        const world = document.getElementById('world-container');
        const scoreEl = document.getElementById('score-display');
        const healthEl = document.getElementById('health-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const gameStage = document.getElementById('game-stage');

        // --- Input Handling ---
        document.addEventListener('mousemove', (e) => {
            if (!state.isPlaying) return;
            updateHeroPosition(e.clientX);
        });

        document.addEventListener('touchmove', (e) => {
            if (!state.isPlaying) return;
            updateHeroPosition(e.touches[0].clientX);
        }, { passive: false });

        function updateHeroPosition(clientX) {
            const stageWidth = gameStage.clientWidth;
            let percent = (clientX / stageWidth) * 100;
            // Clamp to screen
            percent = Math.max(5, Math.min(95, percent));
            state.heroX = percent;
            hero.style.left = `${percent}%`;
            
            // Rotate hero slightly based on movement direction
            // (Simplified for this demo)
        }

        // --- Game Loop ---
        function startGame() {
            state.isPlaying = true;
            state.score = 0;
            state.health = 3;
            state.speed = 0.5; // Initial speed
            state.obstacles = [];
            state.particles = [];
            world.innerHTML = ''; // Clear old obstacles
            updateHealthUI();
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            startGame();
        }

        function gameOver() {
            state.isPlaying = false;
            finalScoreEl.innerText = Math.floor(state.score);
            gameOverScreen.classList.remove('hidden');
        }

        function gameLoop() {
            if (!state.isPlaying) return;

            state.frame++;
            state.score += 0.1;
            state.speed += 0.0005; // Slowly increase difficulty

            scoreEl.innerText = `${Math.floor(state.score)}m`;

            // Spawn Obstacles
            if (state.frame % Math.floor(60 / state.speed) === 0 || Math.random() < 0.02) {
                spawnObstacle();
            }

            // Spawn Ambient Particles (Ash)
            if (state.frame % 10 === 0) {
                spawnParticle();
            }

            updateObstacles();
            updateParticles();

            requestAnimationFrame(gameLoop);
        }

        // --- Obstacle Logic ---
        function spawnObstacle() {
            const el = document.createElement('div');
            el.classList.add('obstacle');
            
            // Randomize size and type
            const size = Math.random() * 40 + 20;
            const type = Math.random() > 0.8 ? 'energy' : 'rock';
            
            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            
            // Random X position
            const startX = Math.random() * 90 + 5;
            el.style.left = `${startX}%`;
            el.style.top = '-50px';

            // Visuals based on type
            if (type === 'energy') {
                el.style.background = '#ff4500';
                el.style.borderRadius = '50%';
                el.style.boxShadow = '0 0 15px #ff8c00';
            } else {
                // Jagged rock clip path
                el.style.background = '#222';
                el.style.clipPath = 'polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%)';
            }

            world.appendChild(el);

            state.obstacles.push({
                el: el,
                x: startX,
                y: -10, // Percentage top
                speed: (Math.random() * 0.5 + 0.5) + (state.speed * 0.1),
                type: type
            });
        }

        function updateObstacles() {
            for (let i = state.obstacles.length - 1; i >= 0; i--) {
                const obs = state.obstacles[i];
                obs.y += obs.speed;
                obs.el.style.top = `${obs.y}%`;

                // Collision Detection
                // Hero is at bottom 10%, approx height 10% of screen
                // Simple rect collision check in percentages
                const heroY = 90; // Hero foot position roughly
                const heroWidthPercent = 5; // Approx width of hero in %
                
                // Check if obstacle is at hero height
                if (obs.y > 80 && obs.y < 95) {
                    // Check X overlap
                    if (Math.abs(obs.x - state.heroX) < (heroWidthPercent + 2)) {
                        takeDamage();
                        removeObstacle(i);
                        continue;
                    }
                }

                // Remove if off screen
                if (obs.y > 100) {
                    createExplosion(obs.x, 100);
                    removeObstacle(i);
                }
            }
        }

        function removeObstacle(index) {
            const obs = state.obstacles[index];
            if (obs && obs.el.parentNode) {
                obs.el.parentNode.removeChild(obs.el);
            }
            state.obstacles.splice(index, 1);
        }

        function takeDamage() {
            state.health--;
            updateHealthUI();
            
            // Screen shake effect
            gameStage.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
            setTimeout(() => gameStage.style.transform = 'none', 200);

            // Flash red
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = 0;
            flash.style.left = 0;
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'rgba(255,0,0,0.3)';
            flash.style.zIndex = 99;
            gameStage.appendChild(flash);
            setTimeout(() => flash.remove(), 100);

            if (state.health <= 0) {
                gameOver();
            }
        }

        function updateHealthUI() {
            let hearts = '';
            for(let i=0; i<state.health; i++) hearts += '<span class="text-2xl text-orange-500">♥</span>';
            healthEl.innerHTML = hearts;
        }

        // --- Particle System (Ash & Explosions) ---
        function spawnParticle() {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 4 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = '-10px';
            p.style.opacity = Math.random();
            
            world.appendChild(p);
            
            state.particles.push({
                el: p,
                y: -2,
                x: parseFloat(p.style.left),
                speedY: Math.random() * 0.5 + 0.2,
                speedX: Math.random() * 0.2 - 0.1,
                life: 100
            });
        }

        function createExplosion(x, y) {
            // Create a few particles at impact
            for(let i=0; i<5; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.background = '#555';
                p.style.width = '6px';
                p.style.height = '6px';
                p.style.left = `${x}%`;
                p.style.top = `${y}%`;
                world.appendChild(p);

                state.particles.push({
                    el: p,
                    y: y,
                    x: x,
                    speedY: -(Math.random() * 1 + 0.5), // Upwards
                    speedX: Math.random() * 2 - 1,
                    life: 30
                });
            }
        }

        function updateParticles() {
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.y += p.speedY;
                p.x += p.speedX;
                p.life--;

                p.el.style.top = `${p.y}%`;
                p.el.style.left = `${p.x}%`;
                p.el.style.opacity = p.life / 50;

                if (p.life <= 0 || p.y > 105) {
                    if(p.el.parentNode) p.el.parentNode.removeChild(p.el);
                    state.particles.splice(i, 1);
                }
            }
        }

    </script>
</body>
</html>
