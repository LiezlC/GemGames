<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Guardian of the Arch</title>
    <style>
        :root {
            --sky-top: #a8e6cf;
            --sky-mid: #ffd3b6;
            --sky-bot: #ffaaa5;
            --rock-dark: #6d4c41;
            --rock-light: #8d6e63;
            --giant-color: #00897b;
            --giant-highlight: #4db6ac;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-mid), var(--sky-bot));
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            perspective: 1000px;
        }

        /* --- Background Elements --- */
        .sun-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,211,182,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- The Arch --- */
        .arch-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-60%);
            width: 500px;
            height: 600px;
            z-index: 1;
            pointer-events: none;
        }
        
        .arch-shape {
            fill: var(--rock-light);
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.3));
        }

        .portal-glow {
            position: absolute;
            top: 30%;
            left: 25%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, #fff 0%, #ffd700 20%, transparent 70%);
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 0;
            mix-blend-mode: screen;
        }

        /* --- The Giant --- */
        .giant {
            position: absolute;
            bottom: 15%;
            right: 20%;
            width: 180px;
            height: 350px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .giant:hover {
            transform: scale(1.02);
        }

        .giant-head {
            width: 60px;
            height: 80px;
            background: var(--giant-highlight);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            z-index: 4;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2);
        }

        .giant-eyes {
            position: absolute;
            top: 40%;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
        }

        .eye {
            width: 12px;
            height: 8px;
            background: #ff4081;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4081;
            animation: blink 4s infinite;
        }

        .antlers {
            position: absolute;
            bottom: 80%;
            width: 140px;
            height: 100px;
            z-index: 3;
        }

        .antler-path {
            fill: none;
            stroke: #4a635d;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .giant-robe {
            margin-top: -20px;
            width: 100%;
            height: 100%;
            background: var(--giant-color);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .robe-fold {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 40%, rgba(0,0,0,0.2) 50%, transparent 60%);
        }

        /* --- The Player (Small Figure) --- */
        .player {
            position: absolute;
            bottom: 12%;
            left: 40%;
            width: 40px;
            height: 80px;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 0.5s ease;
        }

        .player-head {
            width: 15px;
            height: 15px;
            background: #333;
            border-radius: 50%;
            position: relative;
        }
        
        .player-antlers {
            position: absolute;
            bottom: 80%;
            width: 30px;
            height: 20px;
        }

        .player-body {
            width: 20px;
            height: 60px;
            background: #333;
            border-radius: 10px 10px 0 0;
        }

        /* --- Terrain --- */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15%;
            background: var(--rock-dark);
            z-index: 2;
            clip-path: polygon(0% 100%, 0% 20%, 10% 10%, 20% 30%, 30% 10%, 40% 25%, 50% 5%, 60% 25%, 70% 10%, 80% 30%, 90% 10%, 100% 20%, 100% 100%);
        }

        .rocks-foreground {
            position: absolute;
            bottom: -20px;
            width: 100%;
            height: 200px;
            z-index: 5;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }

        .rock {
            background: var(--rock-light);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
        }

        /* --- Interactive Elements --- */
        .bird {
            position: absolute;
            width: 30px;
            height: 20px;
            z-index: 6;
            cursor: pointer;
            opacity: 0.8;
        }
        
        .bird svg {
            width: 100%;
            height: 100%;
            fill: #333;
        }

        .branch {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 6;
            cursor: grab;
            stroke: #5d4037;
            stroke-width: 2;
            fill: none;
            animation: float 3s ease-in-out infinite;
        }

        /* --- UI --- */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #5d4037;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .meter-container {
            margin-top: 10px;
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border: 1px solid #5d4037;
            border-radius: 5px;
            overflow: hidden;
        }

        #spirit-meter {
            width: 0%;
            height: 100%;
            background: var(--giant-color);
            transition: width 0.3s ease;
        }

        #dialogue-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            background: rgba(255,255,255,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--giant-color);
            text-align: center;
            font-weight: bold;
            color: var(--giant-color);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        /* --- Animations --- */
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fly {
            from { transform: translateX(-100px) translateY(0); }
            to { transform: translateX(120vw) translateY(-50px); }
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: gold;
            border-radius: 50%;
            pointer-events: none;
            animation: fadeUp 1s forwards;
        }

        @keyframes fadeUp {
            to { transform: translateY(-50px); opacity: 0; }
        }

        /* Ascension State */
        body.ascended .portal-glow {
            opacity: 1;
            transform: scale(3);
        }
        body.ascended .giant, body.ascended .player {
            filter: brightness(0);
            transition: filter 2s;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Background Sun -->
        <div class="sun-glow"></div>

        <!-- The Arch -->
        <div class="arch-container">
            <div class="portal-glow" id="portal"></div>
            <svg viewBox="0 0 200 300" class="arch-shape" width="100%" height="100%">
                <!-- Rough rock arch shape -->
                <path d="M20,300 L20,150 Q20,50 100,50 Q180,50 180,150 L180,300 L140,300 L140,160 Q140,100 100,100 Q60,100 60,160 L60,300 Z" />
            </svg>
        </div>

        <!-- The Giant -->
        <div class="giant" id="giant" onclick="interactGiant()">
            <div class="antlers">
                <svg viewBox="0 0 100 80" width="100%" height="100%">
                    <path class="antler-path" d="M50,80 C40,60 20,50 10,20 M25,45 L35,25 M50,80 C60,60 80,50 90,20 M75,45 L65,25" />
                </svg>
            </div>
            <div class="giant-head">
                <div class="giant-eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>
            <div class="giant-robe">
                <div class="robe-fold"></div>
            </div>
        </div>

        <!-- The Player -->
        <div class="player" id="player">
            <div class="player-antlers">
                <svg viewBox="0 0 50 40" width="100%" height="100%">
                    <path fill="none" stroke="#333" stroke-width="2" d="M25,40 C20,30 10,20 5,5 M25,40 C30,30 40,20 45,5" />
                </svg>
            </div>
            <div class="player-head"></div>
            <div class="player-body"></div>
        </div>

        <!-- Ground -->
        <div class="ground"></div>
        <div class="rocks-foreground">
            <div class="rock" style="width: 100px; height: 60px;"></div>
            <div class="rock" style="width: 150px; height: 80px;"></div>
            <div class="rock" style="width: 80px; height: 50px;"></div>
            <div class="rock" style="width: 120px; height: 70px;"></div>
        </div>

        <!-- UI -->
        <div id="ui-layer">
            <h1>Ritual of the Arch</h1>
            <div class="meter-container">
                <div id="spirit-meter"></div>
            </div>
            <small>Collect Spirits (Birds) & Memories (Branches)</small>
        </div>

        <div id="dialogue-box">
            "Bring me the fractured memories of this land..."
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const meter = document.getElementById('spirit-meter');
        const dialogue = document.getElementById('dialogue-box');
        const player = document.getElementById('player');
        const giant = document.getElementById('giant');
        
        let score = 0;
        const maxScore = 100;
        let gameWon = false;

        const phrases = [
            "The sky remembers...",
            "More... the portal hungers.",
            "Do you hear the whispers?",
            "The ancient pact is nearly sealed.",
            "We are almost ready to ascend."
        ];

        function updateScore(amount) {
            if (gameWon) return;
            score = Math.min(score + amount, maxScore);
            meter.style.width = score + '%';
            
            // Visual feedback
            spawnParticles(player.getBoundingClientRect().left + 20, player.getBoundingClientRect().top);

            if (score >= maxScore) {
                winGame();
            } else if (score % 20 === 0) {
                showDialogue(phrases[Math.floor(score/20) - 1]);
            }
        }

        function showDialogue(text) {
            dialogue.innerText = text;
            dialogue.style.opacity = 1;
            setTimeout(() => {
                dialogue.style.opacity = 0;
            }, 3000);
        }

        function spawnParticles(x, y) {
            for(let i=0; i<5; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + (Math.random() * 20 - 10) + 'px';
                p.style.top = y + (Math.random() * 20 - 10) + 'px';
                container.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function interactGiant() {
            if (gameWon) return;
            showDialogue("Bring me offerings. Catch the birds or find the branches.");
        }

        function createBird() {
            if (gameWon) return;
            const bird = document.createElement('div');
            bird.className = 'bird';
            bird.innerHTML = `<svg viewBox="0 0 30 20"><path d="M0,10 Q5,0 15,10 T30,10" fill="none" stroke="#333" stroke-width="2"/></svg>`;
            
            // Random start height
            const top = Math.random() * 40 + 10; // 10% to 50% height
            bird.style.top = top + '%';
            bird.style.left = '-50px';
            
            // Animation
            const duration = Math.random() * 5 + 5; // 5-10s
            bird.style.transition = `transform ${duration}s linear`;
            
            container.appendChild(bird);

            // Trigger move after append
            requestAnimationFrame(() => {
                bird.style.transform = `translateX(${window.innerWidth + 100}px)`;
            });

            // Click interaction
            bird.onclick = (e) => {
                e.stopPropagation();
                updateScore(10);
                bird.style.transition = 'transform 0.5s ease';
                bird.style.transform += ' scale(0) rotate(360deg)';
                setTimeout(() => bird.remove(), 500);
            };

            // Cleanup
            setTimeout(() => {
                if(bird.parentNode) bird.remove();
            }, duration * 1000);
        }

        function createBranch() {
            if (gameWon) return;
            const branch = document.createElement('div');
            branch.className = 'branch';
            // Random fractured shape
            const pathD = `M10,50 L30,30 L${20 + Math.random()*20},10 L50,${Math.random()*20}`;
            branch.innerHTML = `<svg viewBox="0 0 60 60"><path d="${pathD}" stroke="#5d4037" stroke-width="2" fill="none"/></svg>`;
            
            branch.style.top = (Math.random() * 50 + 20) + '%';
            branch.style.left = (Math.random() * 80 + 10) + '%';
            
            container.appendChild(branch);

            branch.onclick = (e) => {
                e.stopPropagation();
                updateScore(15);
                branch.style.transition = 'all 0.5s ease';
                branch.style.top = '80%'; // Move to player
                branch.style.left = '40%';
                branch.style.opacity = 0;
                setTimeout(() => branch.remove(), 500);
            };

            setTimeout(() => {
                if(branch.parentNode) {
                    branch.style.opacity = 0;
                    setTimeout(() => branch.remove(), 1000);
                }
            }, 6000);
        }

        function winGame() {
            gameWon = true;
            showDialogue("THE PATH IS OPEN.");
            document.body.classList.add('ascended');
            
            // Move player into arch
            player.style.left = '48%'; // Center
            player.style.bottom = '15%';
            setTimeout(() => {
                player.style.transform = 'scale(0)';
                player.style.opacity = '0';
            }, 2000);
        }

        // Game Loop
        setInterval(createBird, 2000);
        setInterval(createBranch, 3500);

        // Initial dialogue
        setTimeout(() => {
            showDialogue("The Arch is dormant. Awaken it.");
        }, 1000);

    </script>
</body>
</html>
